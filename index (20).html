<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台灣歷史時間軸 - 四角爭霸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap');


        :root {
            --table-green: radial-gradient(circle, #064e3b 0%, #022c22 80%, #02140f 100%);
            --wood-border: linear-gradient(135deg, #78350f 0%, #451a03 50%, #1c1917 100%);
        }


        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #090d16;
            overscroll-behavior: none;
            overflow: hidden;
            color: #f8fafc;
        }


        .serif-font { font-family: 'Noto Serif TC', serif; }


        /* 麻將桌底色與木質感邊框 */
        .mahjong-table {
            background: var(--table-green);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            position: relative;
        }


        .table-border {
            border: 10px solid #292524;
            border-image: var(--wood-border) 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }


        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }


        /* 迷你卡牌與緊湊堆疊 */
        .mini-card-container {
            transition: all 0.2s ease-out;
            margin-left: -12px; /* 縮小重疊距離適應並列 */
        }
        .mini-card-container:first-child { margin-left: 0; }
        .mini-card-container:hover {
            transform: translateY(-8px);
            z-index: 30;
        }
        
        .mini-card {
            transition: all 0.3s ease;
            box-shadow: -4px 0 10px rgba(0,0,0,0.4);
        }
        .mini-card:hover {
            border-color: #fbbf24;
            box-shadow: -2px 10px 20px rgba(245, 158, 11, 0.5);
        }


        /* 中間公海時間軸 */
        .timeline-scroll {
            scroll-behavior: smooth;
        }
        .timeline-scroll::-webkit-scrollbar { height: 8px; }
        .timeline-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.6); border-radius: 4px; }


        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 25px rgba(245, 158, 11, 0.9); }
        }
        .gap-pulse {
            animation: pulse-gold 1.5s infinite;
            background: rgba(245, 158, 11, 0.25) !important;
            border-color: #f59e0b !important;
        }


        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-scale-up { animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* ===== 大廳樣式 ===== */
        .lobby-bg {
            background: radial-gradient(ellipse at 20% 20%, #1a3a2a 0%, #0a1f15 40%, #050d0a 100%);
            position: relative;
            overflow: hidden;
        }
        .lobby-lantern {
            position: absolute;
            width: 28px; height: 40px;
            border-radius: 50% 50% 40% 40%;
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
            box-shadow: 0 0 20px currentColor;
        }
        @keyframes swing { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
        @keyframes floatUp { 0%{transform:translateY(0) rotate(0);opacity:0.7} 100%{transform:translateY(-80px) rotate(15deg);opacity:0} }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            animation: floatUp 4s ease-in infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .lobby-deco { animation: shimmer 2.5s ease-in-out infinite; }
        @keyframes fadeInDown { from{transform:translateY(-30px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes fadeInUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .fade-in-down { animation: fadeInDown 0.8s ease forwards; }
        .fade-in-up { animation: fadeInUp 0.8s ease forwards; }
        .lobby-btn {
            position: relative; overflow: hidden;
            transition: all 0.3s ease;
        }
        .lobby-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        .lobby-btn:hover::before { opacity: 1; }
        .lobby-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
        /* 無限挑戰特別按鈕 */
        .btn-infinite {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #2563eb 100%);
            border: 1px solid rgba(139,92,246,0.5);
        }
        /* 排行榜 */
        .leaderboard-row:nth-child(1) .lb-rank { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .leaderboard-row:nth-child(2) .lb-rank { color: #c0c0c0; }
        .leaderboard-row:nth-child(3) .lb-rank { color: #cd7f32; }
        /* 英文小鍵盤 */
        .kb-key {
            background: linear-gradient(180deg, #374151 0%, #1f2937 100%);
            border: 1px solid #4b5563;
            border-bottom: 3px solid #111827;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #f9fafb;
            transition: all 0.08s;
            user-select: none;
            display: flex; align-items: center; justify-content: center;
        }
        .kb-key:active, .kb-key.pressed {
            border-bottom-width: 1px;
            transform: translateY(2px);
            background: linear-gradient(180deg, #4b5563 0%, #374151 100%);
        }
        .kb-key.space-key { flex: 1; }
        .kb-key.del-key { background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); border-color: #991b1b; }
        /* 遊戲結束震動 */
        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,50%,90%{transform:translateX(-8px)} 30%,70%{transform:translateX(8px)} }
        .shake { animation: shake 0.5s ease; }
        /* 大廳飄落金葉 */
        @keyframes leafFall {
            0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0.8}
            50%{transform:translateY(40vh) rotate(180deg) translateX(30px);opacity:0.6}
            100%{transform:translateY(90vh) rotate(360deg) translateX(-20px);opacity:0}
        }
        .leaf { animation: leafFall linear infinite; position:absolute; font-size:16px; pointer-events:none; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col select-none text-slate-100">


    <!-- 全螢幕輔助 -->
    <div id="fs-helper" class="fixed inset-0 bg-black/90 z-[110] flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
        <div class="glass-panel p-8 sm:p-12 rounded-3xl max-w-md border border-amber-500/30">
            <i class="fas fa-expand text-6xl text-amber-500 mb-6 animate-pulse"></i>
            <h2 class="text-3xl font-black mb-4 serif-font text-yellow-400">進入歷史牌局</h2>
            <p class="text-slate-300 mb-8">為確保「四角對戰佈局」完美呈現，請點擊下方開啟全螢幕模式。</p>
            <button onclick="requestStartGame()" class="bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-4 px-10 rounded-xl text-lg shadow-lg">
                開啟並載入遊戲
            </button>
        </div>
    </div>


    <!-- 頂部資訊列 (極簡) -->
    <div id="game-header" class="hidden bg-black/80 border-b border-emerald-900/50 text-white px-4 py-2 shadow-lg flex justify-between items-center z-[60] absolute top-0 w-full h-[40px]">
        <div class="flex items-center gap-3">
            <span class="text-amber-400 font-bold text-sm tracking-widest" id="display-round">第 1 回合</span>
            <button onclick="handleHomeClick()" class="w-7 h-7 flex items-center justify-center text-[12px] text-slate-400 hover:text-white border border-slate-600 hover:border-amber-500 rounded bg-slate-800 transition-all shadow-inner group" title="返回主畫面">
                <i class="fas fa-home group-hover:scale-110"></i>
            </button>
        </div>
        <div class="flex items-center gap-4 text-xs font-mono">
            <div class="text-amber-300"><i class="fas fa-clock mr-1"></i><span id="game-timer">00:00</span></div>
            <div class="text-slate-300 border-l border-slate-600 pl-4"><i class="fas fa-layer-group mr-1"></i>剩餘: <span id="game-deck-count" class="font-bold">0</span></div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="audioManager.toggle()" id="btn-audio" class="text-amber-500 hover:text-amber-300 px-2"><i class="fas fa-volume-mute"></i></button>
            <button onclick="toggleFullscreen()" class="text-slate-400 hover:text-white px-2"><i class="fas fa-expand"></i></button>
        </div>
    </div>


    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-2 rounded-full text-white font-bold text-sm opacity-0 transition-all duration-300 pointer-events-none shadow-2xl glass-panel"></div>


    <!-- 遊戲容器 -->
    <div id="app" class="flex-1 w-full h-full relative"></div>


    <!-- 自定義確認對話框 (抽離至全域) -->
    <div id="confirm-modal" class="fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="glass-panel p-6 sm:p-8 rounded-2xl max-w-sm w-full border border-amber-500/30 shadow-2xl animate-scale-up text-center">
            <div class="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                <i class="fas fa-door-open text-3xl text-amber-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 serif-font">結束當前牌局？</h3>
            <p class="text-slate-400 text-sm mb-6 leading-relaxed">目前的遊戲進度將會遺失，確定要返回主畫面嗎？</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-sm transition-colors">
                    繼續比賽
                </button>
                <button onclick="confirmQuitGame()" class="flex-1 py-3 px-4 rounded-xl bg-gradient-to-r from-red-600 to-orange-700 hover:from-red-500 hover:to-orange-600 text-white font-bold text-sm shadow-lg transition-all">
                    確定退出
                </button>
            </div>
        </div>
    </div>


    <script>
        // --- Web Audio (Enhanced) ---
        const audioManager = {
            ctx: null, isMuted: true,
            bgmSequence: null, nextNoteTime: 0, currentNoteIndex: 0,
            lobbyBgmSeq: null, lobbyNoteIdx: 0, lobbyNextTime: 0,
            bgmMode: 'lobby', // 'lobby' | 'game'

            // MP3 音樂元素
            lobbyAudio: null, gameAudio: null,

            // 遊戲中緊張 BGM（快速小調）
            gameScale: [220, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440],
            gamePattern: [0,2,4,2,3,5,4,2, 1,3,5,3,2,4,3,1, 0,2,3,4,5,4,3,2, 1,2,4,5,7,5,4,2],
            gameTempo: 160,

            // 大廳溫馨 BGM（慢速和弦琶音）
            lobbyScale: [261.63, 329.63, 392.00, 523.25, 659.25],
            lobbyPattern: [0,2,1,3,2,4,-1, 0,1,2,1,0,-1,-1, 2,3,4,3,2,1,-1, 0,2,4,2,0,-1,-1],
            lobbyTempo: 60,

            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                // 初始化 MP3 Audio 元素（放在同資料夾即可）
                if (!this.lobbyAudio) {
                    this.lobbyAudio = new Audio('lobby.mp3');
                    this.lobbyAudio.loop = true;
                    this.lobbyAudio.volume = 0.5;
                    this.lobbyAudio.load();
                }
                if (!this.gameAudio) {
                    this.gameAudio = new Audio('battle.mp3');
                    this.gameAudio.loop = true;
                    this.gameAudio.volume = 0.5;
                    this.gameAudio.load();
                }
            },

            // 嘗試播放 mp3，若失敗則用 Web Audio 合成
            _tryPlayMp3(audio, fallbackFn) {
                if (this.isMuted) return;
                const p = audio.play();
                if (p !== undefined) {
                    p.catch(() => { fallbackFn(); });
                }
            },
            _stopMp3(audio) {
                try { audio.pause(); audio.currentTime = 0; } catch(e) {}
            },

            toggle() {
                this.init(); if (this.ctx.state === 'suspended') this.ctx.resume();
                this.isMuted = !this.isMuted;
                const btn = document.querySelector('#btn-audio i');
                if(btn) btn.className = this.isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
                const lobbyBtn = document.querySelector('#lobby-audio-btn i');
                if(lobbyBtn) lobbyBtn.className = this.isMuted ? 'fas fa-volume-mute text-base' : 'fas fa-volume-up text-base';
                if (this.isMuted) { this.stopBGM(); this.stopLobbyBGM(); }
                else {
                    this.playSFX('select');
                    if (this.bgmMode === 'lobby') this.startLobbyBGM();
                    else this.startBGM();
                }
            },

            createNote(freq, time, vol=0.08, type='sine', decay=1.2) {
                if(this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + decay);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(time); osc.stop(time + decay + 0.1);
            },

            playSFX(event) {
                if(this.isMuted || !this.ctx) return;
                const t = this.ctx.currentTime;
                if(event==='click') this.createNote(392, t, 0.1, 'sine', 0.15);
                else if(event==='select') this.createNote(523.25, t, 0.12, 'sine', 0.2);
                else if(event==='card') { // 抽牌音效
                    this.createNote(880, t, 0.06, 'sine', 0.08);
                    this.createNote(1046.5, t+0.05, 0.05, 'sine', 0.1);
                }
                else if(event==='correct') {
                    [523.25,659.25,783.99,1046.5].forEach((f,i) => this.createNote(f, t+i*0.09, 0.15, 'sine', 0.4));
                }
                else if(event==='wrong') {
                    // 低沉蜂鳴
                    const osc=this.ctx.createOscillator(), g=this.ctx.createGain();
                    osc.type='sawtooth'; osc.frequency.setValueAtTime(180,t); osc.frequency.exponentialRampToValueAtTime(60,t+0.4);
                    g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
                    osc.connect(g); g.connect(this.ctx.destination); osc.start(t); osc.stop(t+0.5);
                    // 加上裂碎聲
                    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.3,this.ctx.sampleRate);
                    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
                    const src=this.ctx.createBufferSource(), g2=this.ctx.createGain();
                    src.buffer=buf; g2.gain.setValueAtTime(0.08,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
                    src.connect(g2); g2.connect(this.ctx.destination); src.start(t);
                }
                else if(event==='gameover') {
                    // 遊戲結束：下降音階
                    [523.25,466.16,415.30,369.99,329.63,293.66,261.63].forEach((f,i)=>
                        this.createNote(f, t+i*0.12, 0.15, 'triangle', 0.3));
                }
                else if(event==='win') {
                    [261.63,329.63,392.00,523.25,659.25,783.99,1046.50,1318.51].forEach((f,i)=>
                        this.createNote(f, t+i*0.07, 0.18, 'sine', 0.5));
                }
                else if(event==='lobby_enter') {
                    [523.25,659.25,783.99].forEach((f,i) => this.createNote(f, t+i*0.1, 0.1, 'sine', 0.6));
                }
            },

            // 大廳 BGM
            scheduleLobbyNote() {
                while(this.lobbyNextTime < this.ctx.currentTime + 0.1) {
                    let n = this.lobbyPattern[this.lobbyNoteIdx];
                    if(n !== -1) {
                        const f = this.lobbyScale[n];
                        this.createNote(f, this.lobbyNextTime, 0.04, 'sine', 1.5);
                        // 加和聲
                        if(n+2 < this.lobbyScale.length) this.createNote(this.lobbyScale[n+2]*0.5, this.lobbyNextTime, 0.02, 'sine', 2.0);
                    }
                    this.lobbyNextTime += 60.0 / this.lobbyTempo;
                    this.lobbyNoteIdx = (this.lobbyNoteIdx+1) % this.lobbyPattern.length;
                }
                this.lobbyBgmSeq = requestAnimationFrame(() => this.scheduleLobbyNote());
            },
            startLobbyBGM() {
                if(this.isMuted) return;
                this.stopLobbyBGM(); this.stopBGM();
                this.bgmMode='lobby';
                if(this.lobbyAudio) {
                    const p = this.lobbyAudio.play();
                    if(p !== undefined) p.catch(() => {
                        // mp3 不存在，改用 Web Audio 合成
                        if(!this.ctx) return;
                        this.lobbyNextTime = this.ctx.currentTime + 0.1;
                        this.lobbyNoteIdx = 0;
                        this.scheduleLobbyNote();
                    });
                } else if(this.ctx) {
                    this.lobbyNextTime = this.ctx.currentTime + 0.1;
                    this.lobbyNoteIdx = 0;
                    this.scheduleLobbyNote();
                }
            },
            stopLobbyBGM() {
                if(this.lobbyBgmSeq) { cancelAnimationFrame(this.lobbyBgmSeq); this.lobbyBgmSeq=null; }
                if(this.lobbyAudio) { try { this.lobbyAudio.pause(); this.lobbyAudio.currentTime=0; } catch(e){} }
            },

            // 遊戲 BGM（緊張）
            scheduleNote() {
                while(this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    let n = this.gamePattern[this.currentNoteIndex];
                    if(n !== -1) {
                        const f = this.gameScale[n];
                        this.createNote(f, this.nextNoteTime, 0.035, 'square', 0.18);
                        // 低頻鼓點
                        if(this.currentNoteIndex % 8 === 0) {
                            const d=this.ctx.createOscillator(), dg=this.ctx.createGain();
                            d.type='sine'; d.frequency.setValueAtTime(80,this.nextNoteTime); d.frequency.exponentialRampToValueAtTime(40,this.nextNoteTime+0.1);
                            dg.gain.setValueAtTime(0.12,this.nextNoteTime); dg.gain.exponentialRampToValueAtTime(0.001,this.nextNoteTime+0.15);
                            d.connect(dg); dg.connect(this.ctx.destination); d.start(this.nextNoteTime); d.stop(this.nextNoteTime+0.2);
                        }
                        // 拍板 hi-hat
                        if(this.currentNoteIndex % 4 === 2) {
                            const buf=this.ctx.createBuffer(1,Math.floor(this.ctx.sampleRate*0.05),this.ctx.sampleRate);
                            const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1);
                            const s=this.ctx.createBufferSource(), hg=this.ctx.createGain(), hf=this.ctx.createBiquadFilter();
                            s.buffer=buf; hf.type='highpass'; hf.frequency.value=8000;
                            hg.gain.setValueAtTime(0.05,this.nextNoteTime); hg.gain.exponentialRampToValueAtTime(0.001,this.nextNoteTime+0.05);
                            s.connect(hf); hf.connect(hg); hg.connect(this.ctx.destination); s.start(this.nextNoteTime);
                        }
                    }
                    this.nextNoteTime += 60.0 / this.gameTempo;
                    this.currentNoteIndex = (this.currentNoteIndex+1) % this.gamePattern.length;
                }
                this.bgmSequence = requestAnimationFrame(() => this.scheduleNote());
            },
            startBGM() {
                if(this.isMuted) return;
                this.stopLobbyBGM(); this.stopBGM();
                this.bgmMode='game';
                if(this.gameAudio) {
                    const p = this.gameAudio.play();
                    if(p !== undefined) p.catch(() => {
                        // mp3 不存在，改用 Web Audio 合成
                        if(!this.ctx) return;
                        this.nextNoteTime = this.ctx.currentTime + 0.1;
                        this.currentNoteIndex = 0;
                        this.scheduleNote();
                    });
                } else if(this.ctx) {
                    this.nextNoteTime = this.ctx.currentTime + 0.1;
                    this.currentNoteIndex = 0;
                    this.scheduleNote();
                }
            },
            stopBGM() {
                if(this.bgmSequence) { cancelAnimationFrame(this.bgmSequence); this.bgmSequence=null; }
                if(this.gameAudio) { try { this.gameAudio.pause(); this.gameAudio.currentTime=0; } catch(e){} }
            },

            switchToGameBGM() { this.stopLobbyBGM(); if(!this.isMuted) { if(this.ctx) this.ctx.resume().then(()=>this.startBGM()); else this.startBGM(); } },
            switchToLobbyBGM() { this.stopBGM(); if(!this.isMuted) { if(this.ctx) this.ctx.resume().then(()=>this.startLobbyBGM()); else this.startLobbyBGM(); } }
        };


        // --- 全螢幕與狀態 ---
        async function requestStartGame() {
            try {
                if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            } catch (err) { console.warn("Fullscreen API blocked, continuing in windowed mode."); }
            document.getElementById('fs-helper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('fs-helper').style.display = 'none';
                document.getElementById('game-header').classList.remove('hidden');
                audioManager.init();
                // 自動播放大廳 BGM
                if(audioManager.ctx) {
                    audioManager.isMuted = false;
                    const btn = document.querySelector('#btn-audio i');

        const wikiImageCache = {}; const fetchingWiki = new Set();
        const noPicSvg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='200' viewBox='0 0 150 200'><rect width='150' height='200' fill='%231e293b'/><text x='75' y='110' font-family='sans-serif' font-size='12' text-anchor='middle' fill='%2364748b'>史料無影像</text></svg>";
        function renderWikiImage(wikiTitle) {
            if (!wikiTitle) return noPicSvg;
            if (wikiImageCache[wikiTitle]) return wikiImageCache[wikiTitle];
            if (!fetchingWiki.has(wikiTitle)) {
                fetchingWiki.add(wikiTitle);
                fetch(`https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=300&origin=*`)
                    .then(res => res.json()).then(data => {
                        const pid = Object.keys(data.query.pages)[0];
                        wikiImageCache[wikiTitle] = data.query.pages[pid]?.thumbnail?.source || noPicSvg;
                        document.querySelectorAll(`img[data-wiki="${wikiTitle}"]`).forEach(img => { img.src = wikiImageCache[wikiTitle]; img.classList.remove('opacity-0'); });
                    }).catch(() => { wikiImageCache[wikiTitle] = noPicSvg; });
            }
            return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='200' viewBox='0 0 150 200'><rect width='150' height='200' fill='%230f172a'/></svg>";
        }

        // --- 狀態與遊戲邏輯 ---
        const ANIMAL_ICONS = ['fa-dog', 'fa-cat', 'fa-dragon', 'fa-frog', 'fa-hippo', 'fa-otter', 'fa-fish', 'fa-spider'];
        
        // ===== 排行榜資料 (localStorage) =====
        const LEADERBOARD_KEY = 'tw_history_solo_lb';
        const getLeaderboard = () => { try { return JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || '[]'); } catch(e){ return []; } };
        const saveLeaderboard = (lb) => { try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(lb)); } catch(e){} };
        const addToLeaderboard = (name, cardsPlaced, seconds) => {
            const lb = getLeaderboard();
            lb.push({ name, cardsPlaced, seconds, difficulty: state.soloDifficulty || 1, date: new Date().toLocaleDateString('zh-TW') });
            lb.sort((a,b) => {
                if (b.cardsPlaced !== a.cardsPlaced) return b.cardsPlaced - a.cardsPlaced;
                // 同張數：難度高者排前（difficulty 3 > 2 > 1）
                if ((b.difficulty||1) !== (a.difficulty||1)) return (b.difficulty||1) - (a.difficulty||1);
                // 難度相同：時間少者排前
                return a.seconds - b.seconds;
            });
            saveLeaderboard(lb.slice(0, 20));
        };

        let state = {
            screen: 'menu', mode: 'normal', isVsAI: false, aiDifficulty: 0.7,
            deck: [], timeline: [], players: [], currentPlayerIndex: 0, 
            selectedCardId: null, previewCard: null, roundNum: 1, winners: [],
            gameSeconds: 0, gameTimerInterval: null,
            // 回合結束追蹤：記錄本回合已打完牌的玩家 id
            roundFinishers: [],
            // 殊死戰：僅剩這些玩家繼續，其餘已淘汰
            deathMatchPlayers: null,
            // 殊死戰本回合答對者
            deathMatchCorrect: [],
            // 時間軸年代顯示：第一次配對成功後才顯示
            firstMatchDone: false,
            // 無限挑戰模式
            isSoloInfinite: false,
            soloCard: null,          // 當前抽到的牌
            soloPlaced: 0,           // 成功放置張數
            soloFailed: false,       // 是否失敗
            soloFailedCard: null,    // 放錯的那張牌
            soloDifficulty: 1        // 考驗難度 (1/2/3)
        };


        // 新增：退出邏輯處理
        const handleHomeClick = () => {
            audioManager.playSFX('select');
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        };


        const closeConfirmModal = () => {
            audioManager.playSFX('click');
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
        };


        const confirmQuitGame = () => {
            audioManager.playSFX('click');
            stopTimer();
            audioManager.switchToLobbyBGM();
            state.screen = 'menu';
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
            render();
        };


        const shuffle = (array) => { for(let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; };
        const formatYear = (year) => year < 0 ? `西元前 ${Math.abs(year)} 年` : `西元 ${year} 年`;
        const formatTime = (seconds) => `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;


        const startTimer = () => { clearInterval(state.gameTimerInterval); state.gameSeconds = 0; state.gameTimerInterval = setInterval(() => { state.gameSeconds++; document.getElementById('game-timer').innerText = formatTime(state.gameSeconds); }, 1000); };
        const stopTimer = () => clearInterval(state.gameTimerInterval);


        const showToast = (message, isSuccess, duration = 3000) => {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess ? `<i class="fas fa-check-circle mr-2 text-green-400"></i> ${message}` : `<i class="fas fa-times-circle mr-2 text-red-400"></i> ${message}`;
            toast.className = `fixed top-12 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-2 rounded-full text-white font-bold text-sm transition-all duration-300 shadow-2xl glass-panel border-b-2 ${isSuccess ? 'border-green-500' : 'border-red-500'}`;
            toast.style.opacity = '1'; toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translate(-50%, -10px)'; }, duration);
        };


        const startGame = (playerCount, selectedPeriods, aiDifficulty, questionDifficulty) => {
            audioManager.playSFX('click');
            let filteredCards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if (filteredCards.length < playerCount * 4 + 1) return alert('題庫不足！請增加時代或降低難度。');
            
            state.aiDifficulty = parseFloat(aiDifficulty);
            state.deck = shuffle([...filteredCards]);
            state.timeline = [state.deck.pop()];
            state.players = [];
            
            let icons = shuffle([...ANIMAL_ICONS]);
            
            if (state.isVsAI) {
                state.players.push({ id: 0, name: '玩家 1', icon: icons[0], isAI: false, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: 'BL' });
                state.players.push({ id: 1, name: '玩家 2 (AI)', icon: icons[1], isAI: true, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: 'TR' });
            } else {
                const corners = ['BL', 'BR', 'TL', 'TR']; // 依序分配給 1, 2, 3, 4
                for(let i = 0; i < playerCount; i++) {
                    state.players.push({ id: i, name: `玩家 ${i + 1}`, icon: icons[i], isAI: false, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: corners[i] });
                }
            }
            
            state.currentPlayerIndex = 0; state.roundNum = 1; state.selectedCardId = null; state.previewCard = null;
            state.roundFinishers = []; state.deathMatchPlayers = null; state.deathMatchCorrect = []; state.firstMatchDone = false;
            document.getElementById('display-round').innerText = `第 1 回合`;
            document.getElementById('game-deck-count').innerText = state.deck.length;
            document.getElementById('game-header').classList.remove('hidden');
            
            startTimer(); audioManager.switchToGameBGM(); state.screen = 'play'; transitionToTurn();
        };


        const transitionToTurn = () => {
            state.selectedCardId = null; state.previewCard = null;
            if (state.players[state.currentPlayerIndex].isAI) { render(); setTimeout(executeAITurn, 1800); }
            else render();
        };


        const executeAITurn = () => {
            const ai = state.players[state.currentPlayerIndex];
            if (!ai.hand.length) return endTurn();
            const card = ai.hand[Math.floor(Math.random() * ai.hand.length)];
            state.selectedCardId = card.id; render(); 

            setTimeout(() => {
                // 找出所有合法插入位置
                let valid = [];
                for (let i = 0; i <= state.timeline.length; i++) {
                    if (i === 0 && card.year <= state.timeline[0].year) valid.push(i);
                    else if (i === state.timeline.length && card.year >= state.timeline[i-1].year) valid.push(i);
                    else if (i > 0 && i < state.timeline.length && card.year >= state.timeline[i-1].year && card.year <= state.timeline[i].year) valid.push(i);
                }

                let idx;
                if (valid.length === 0) {
                    // 理論上不應發生，但若有重複年份造成無合法位置，找最接近的位置
                    let minDiff = Infinity;
                    idx = 0;
                    for (let i = 0; i <= state.timeline.length; i++) {
                        const ref = i === 0 ? state.timeline[0].year : state.timeline[i-1].year;
                        const diff = Math.abs(card.year - ref);
                        if (diff < minDiff) { minDiff = diff; idx = i; }
                    }
                } else if (Math.random() < state.aiDifficulty) {
                    // 高難度：從合法位置中選
                    idx = valid[Math.floor(Math.random() * valid.length)];
                } else {
                    // 低難度：故意選錯（從非合法位置選，若全都合法就隨機）
                    const allPositions = Array.from({length: state.timeline.length + 1}, (_, i) => i);
                    const wrong = allPositions.filter(i => !valid.includes(i));
                    idx = wrong.length ? wrong[Math.floor(Math.random() * wrong.length)] : valid[Math.floor(Math.random() * valid.length)];
                }
                handleGapClick(idx, true);
            }, 1000);
        };


        // 殊死戰輔助：給所有殊死戰玩家各補一張牌
        const dealDeathMatchCards = () => {
            state.deathMatchPlayers.forEach(pid => {
                const p = state.players.find(x => x.id === pid);
                if (p && state.deck.length) p.hand = [state.deck.pop()];
                else if (p) p.hand = [];
            });
            document.getElementById('game-deck-count').innerText = state.deck.length;
        };

        // 進入殊死戰：清空所有人手牌，僅保留殊死戰玩家，各抽一張
        const enterDeathMatch = (finisherIds) => {
            showToast(`⚔️ ${finisherIds.length} 人同時清牌！殊死戰開始！`, true, 4000);
            audioManager.playSFX('correct');
            state.deathMatchPlayers = finisherIds;
            state.deathMatchCorrect = []; // 本殊死戰回合答對者
            // 清空所有人手牌
            state.players.forEach(p => { p.hand = []; });
            dealDeathMatchCards();
            // 從第一位殊死戰玩家開始
            const firstIdx = state.players.findIndex(p => p.id === finisherIds[0]);
            if (firstIdx !== -1) state.currentPlayerIndex = firstIdx;
            document.getElementById('display-round').innerText = `⚔️ 殊死戰`;
            transitionToTurn();
        };

        const handleGapClick = (insertIndex, isAITurn = false) => {
            const p = state.players[state.currentPlayerIndex];
            if (!isAITurn && p.isAI) return; 
            if (!state.selectedCardId) return showToast("請先點選一張手牌！", false) || audioManager.playSFX('wrong');

            const cIdx = p.hand.findIndex(c => c.id === state.selectedCardId);
            const card = p.hand[cIdx];

            let ok = false;
            if (insertIndex === 0) ok = card.year <= state.timeline[0].year;
            else if (insertIndex === state.timeline.length) ok = card.year >= state.timeline[insertIndex-1].year;
            else ok = card.year >= state.timeline[insertIndex-1].year && card.year <= state.timeline[insertIndex].year;

            if (ok) {
                audioManager.playSFX('correct');
                showToast(`🎯 ${p.name} 排列正確！`, true);
                state.timeline.splice(insertIndex, 0, card);
                p.hand.splice(cIdx, 1);
                if (!state.firstMatchDone) { state.firstMatchDone = true; }
                // 殊死戰：記錄答對者
                if (state.deathMatchPlayers) {
                    if (!state.deathMatchCorrect) state.deathMatchCorrect = [];
                    state.deathMatchCorrect.push(p.id);
                }
            } else {
                audioManager.playSFX('wrong');
                showToast(`❌ 答錯！【${card.title}】發生於 ${formatYear(card.year)}`, false, 4000);
                // 殊死戰答錯：牌放回牌堆，手牌清空（不補牌）
                if (state.deathMatchPlayers) {
                    state.deck.unshift(card); shuffle(state.deck);
                    p.hand.splice(cIdx, 1);
                } else {
                    state.deck.unshift(card); shuffle(state.deck); p.hand.splice(cIdx, 1);
                    if (state.deck.length) p.hand.push(state.deck.pop());
                }
            }
            
            state.selectedCardId = null; state.previewCard = null;
            document.getElementById('game-deck-count').innerText = state.deck.length;
            render();

            // 一般模式：清牌登記等回合結束
            if (!state.deathMatchPlayers && !p.hand.length) {
                if (!state.roundFinishers.includes(p.id)) state.roundFinishers.push(p.id);
            }
            setTimeout(endTurn, 2000);
        };

        const endTurn = () => {
            // ── 殊死戰模式 ──
            if (state.deathMatchPlayers) {
                // 找下一位殊死戰玩家
                let next = (state.currentPlayerIndex + 1) % state.players.length;
                let tries = 0;
                while (!state.deathMatchPlayers.includes(state.players[next].id) && tries < state.players.length) {
                    next = (next + 1) % state.players.length; tries++;
                }
                // 判斷是否完成一輪（回到起始位置）
                const firstDeathIdx = state.players.findIndex(p => p.id === state.deathMatchPlayers[0]);
                const wrapsRound = next === firstDeathIdx || state.deathMatchPlayers.length === 1;

                if (wrapsRound) {
                    // 殊死戰回合結算
                    const correct = (state.deathMatchCorrect || []).slice();
                    state.deathMatchCorrect = [];
                    if (correct.length === 1) {
                        // 唯一答對者獲勝
                        endGame(state.players.find(p => p.id === correct[0]));
                        return;
                    }
                    if (correct.length === 0) {
                        // 全部答錯，繼續殊死戰，各抽一張
                        showToast('⚔️ 無人答對！繼續殊死拼殺！', false, 3000);
                    } else {
                        // 多人答對，淘汰答錯者，縮小殊死戰名單
                        state.deathMatchPlayers = correct;
                        if (state.deathMatchPlayers.length === 1) {
                            endGame(state.players.find(p => p.id === state.deathMatchPlayers[0]));
                            return;
                        }
                        showToast(`⚔️ ${correct.length} 人答對！繼續殊死拼殺！`, true, 3000);
                    }
                    // 所有殊死戰玩家再抽一張
                    dealDeathMatchCards();
                    // 從殊死戰第一人重新開始
                    state.currentPlayerIndex = state.players.findIndex(p => p.id === state.deathMatchPlayers[0]);
                    transitionToTurn();
                    return;
                }
                state.currentPlayerIndex = next;
                transitionToTurn();
                return;
            }

            // ── 一般模式 ──
            let next = (state.currentPlayerIndex + 1) % state.players.length;
            const wrapsRound = next <= state.currentPlayerIndex;
            state.currentPlayerIndex = next;

            if (wrapsRound) {
                const finishers = state.roundFinishers.slice();
                state.roundFinishers = [];
                if (finishers.length >= 2) {
                    enterDeathMatch(finishers);
                    return;
                } else if (finishers.length === 1) {
                    endGame(state.players.find(p => p.id === finishers[0]));
                    return;
                }
                document.getElementById('display-round').innerText = `第 ${++state.roundNum} 回合`;
            }
            transitionToTurn();
        };

        const endGame = (winner) => { stopTimer(); audioManager.playSFX('win'); setTimeout(()=>audioManager.switchToLobbyBGM(),1500); state.winners = [winner]; state.screen = 'gameover'; render(); };


        const openPreview = (cardId, isCurrentPlayer) => {
            audioManager.playSFX('select');
            let found = null;
            state.players.forEach(p => { const c = p.hand.find(x => x.id === cardId); if(c) found = {card: c, isOwner: p.id === state.players[state.currentPlayerIndex].id}; });
            if(found) { state.previewCard = found; render(); }
        };


        const confirmSelectCard = () => {
            audioManager.playSFX('click'); state.selectedCardId = state.previewCard.card.id; state.previewCard = null; render();
            showToast(`請選擇中央的「發光隙縫」插入史料`, true, 3000);
        };


        // --- 畫面渲染 ---
        
        // 渲染極小化手牌 (公開正面)
        const renderMiniCard = (card, isCurrentActive, isOwnerActive) => {
            const isSelected = state.selectedCardId === card.id;
            const borderStyle = isSelected ? 'border-amber-400 shadow-[0_0_15px_#f59e0b]' : 'border-slate-700/80';
            
            return `
            <div onclick="openPreview(${card.id})" class="mini-card-container cursor-pointer relative ${isOwnerActive ? 'hover:-translate-y-2 hover:z-20' : 'opacity-80'}">
                <div class="mini-card w-12 h-[72px] sm:w-14 sm:h-[84px] bg-slate-200 rounded border-2 ${borderStyle} flex flex-col p-0.5 overflow-hidden">
                    <div class="h-[60%] w-full bg-slate-900 flex items-center justify-center">
                        <img src="${renderWikiImage(card.wiki)}" data-wiki="${card.wiki}" class="object-cover w-full h-full opacity-0 transition-opacity" onerror="this.src='${noPicSvg}'; this.classList.remove('opacity-0');"/>
                    </div>
                    <div class="h-[40%] w-full flex items-center justify-center bg-white px-0.5 border-t border-slate-300">
                        <p class="font-bold text-[7px] sm:text-[8px] text-center leading-[1.1] serif-font text-slate-800 line-clamp-2 break-all">${card.title}</p>
                    </div>
                    ${isSelected ? `<div class="absolute -top-1 -right-1 bg-amber-500 text-white rounded-full w-3 h-3 flex items-center justify-center text-[7px] shadow"><i class="fas fa-check"></i></div>` : ''}
                </div>
            </div>`;
        };


        const renderTimelineCard = (card, forceHideYear = false) => {
            const showYear = state.firstMatchDone && !forceHideYear;
            return `
            <div class="w-24 h-36 sm:w-32 sm:h-44 bg-gradient-to-b from-amber-50 to-orange-50 rounded-lg shadow-xl border-2 border-amber-300 flex flex-col overflow-hidden relative shrink-0 transform transition hover:scale-105 hover:-translate-y-2 hover:z-20 cursor-pointer" onclick="audioManager.playSFX('select'); ${showYear ? `showToast('${card.title} : ${card.desc}', true, 4000)` : `showToast('${card.title}', true, 3000)`};">
                <div class="absolute inset-1 border border-amber-700/10 pointer-events-none rounded"></div>
                <div class="h-[45%] w-full p-2 flex items-center justify-center text-center border-b border-amber-600/30 bg-white/60">
                    <p class="font-bold text-xs sm:text-sm text-amber-950 serif-font leading-tight line-clamp-2" title="${card.title}">${card.title}</p>
                </div>
                <div class="h-[55%] w-full flex flex-col items-center justify-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=')]">
                    ${showYear
                        ? `<p class="font-black text-sm sm:text-base text-amber-800 drop-shadow">${formatYear(card.year)}</p>
                           <p class="text-[9px] text-amber-700 mt-1 font-bold bg-amber-200/50 px-1.5 rounded">${ALL_PERIODS.find(p=>p.id===card.period).name.slice(0,2)}</p>`
                        : `<p class="font-black text-sm sm:text-base text-amber-800/40 drop-shadow select-none">？年</p>
                           <p class="text-[9px] text-amber-700/40 mt-1 font-bold bg-amber-200/30 px-1.5 rounded">待揭曉</p>`
                    }
                </div>
            </div>
        `};


        const renderGap = (index, showHighlight) => `
            <div class="flex items-center justify-center px-1 shrink-0 cursor-pointer group h-full" onclick="handleGapClick(${index})">
                <div class="w-8 sm:w-12 h-28 sm:h-32 border-2 border-dashed rounded-lg flex items-center justify-center transition-all ${showHighlight ? 'gap-pulse border-amber-400' : 'border-emerald-700/40 bg-black/10 group-hover:bg-amber-500/15 group-hover:border-amber-400/50'}">
                    <i class="fas fa-plus text-[10px] sm:text-xs ${showHighlight ? 'text-amber-300' : 'text-emerald-800 group-hover:text-amber-400'}"></i>
                </div>
            </div>
        `;


        // 偵測橫向/直向模式
        const isLandscape = () => window.innerWidth > window.innerHeight;

        // 渲染四角玩家
        // 橫向：玩家狀態靠左，手牌在狀態右側（水平排列），面板貼近上下邊
        // 直向：狀態在上，手牌在下（原本樣式）
        const renderCornerPlayer = (p, activePId) => {
            if(!p) return '';
            const isActive = p.id === activePId;
            const landscape = isLandscape();

            // 殊死戰狀態
            const inDeathMatch = state.deathMatchPlayers !== null;
            const isEliminated = inDeathMatch && !state.deathMatchPlayers.includes(p.id);
            const hasPlayedDeath = inDeathMatch && state.deathMatchPlayers.includes(p.id) && p.hand.length === 0 && !isActive;
            const deathCorrect = inDeathMatch && (state.deathMatchCorrect || []).includes(p.id);
            
            let deathBadge = '';
            if (isEliminated) {
                deathBadge = `<span class="text-[7px] text-slate-500 font-bold">☠️ 淘汰</span>`;
            } else if (hasPlayedDeath) {
                deathBadge = deathCorrect
                    ? `<span class="text-[7px] text-green-400 font-bold animate-pulse">✅ 答對</span>`
                    : `<span class="text-[7px] text-red-400 font-bold">❌ 答錯</span>`;
            } else if (inDeathMatch && state.deathMatchPlayers.includes(p.id) && !isActive) {
                deathBadge = `<span class="text-[7px] text-amber-400/70 font-bold">⚔️ 待出</span>`;
            }

            // 定位：橫向時盡量靠上下邊，讓中間時間軸有空間
            let posClass = '';
            if (landscape) {
                if(p.corner === 'TL') posClass = 'top-10 left-1';
                if(p.corner === 'TR') posClass = 'top-10 right-1';
                if(p.corner === 'BL') posClass = 'bottom-1 left-1';
                if(p.corner === 'BR') posClass = 'bottom-1 right-1';
            } else {
                if(p.corner === 'TL') posClass = 'top-12 left-2 sm:left-4';
                if(p.corner === 'TR') posClass = 'top-12 right-2 sm:right-4';
                if(p.corner === 'BL') posClass = 'bottom-4 left-2 sm:left-4';
                if(p.corner === 'BR') posClass = 'bottom-4 right-2 sm:right-4';
            }

            // 四種顏色風格
            const colorStyles = [
                { bg: 'bg-red-950/70', border: 'border-red-600/50', iconTxt: 'text-red-400', nameBg: 'bg-red-900/60' },
                { bg: 'bg-blue-950/70', border: 'border-blue-600/50', iconTxt: 'text-blue-400', nameBg: 'bg-blue-900/60' },
                { bg: 'bg-green-950/70', border: 'border-green-600/50', iconTxt: 'text-green-400', nameBg: 'bg-green-900/60' },
                { bg: 'bg-yellow-950/70', border: 'border-yellow-600/50', iconTxt: 'text-yellow-400', nameBg: 'bg-yellow-900/60' }
            ];
            const cStyle = colorStyles[p.id % 4];

            const eliminatedStyle = isEliminated ? 'opacity-30 grayscale pointer-events-none' : '';
            const avatarStyle = isActive 
                ? 'bg-amber-500 text-white ring-2 ring-amber-500/50 shadow-[0_0_10px_#f59e0b] scale-105' 
                : `bg-slate-800/80 border border-slate-600 ${cStyle.iconTxt} opacity-80`;
            const activeContainerStyle = isEliminated
                ? ''
                : isActive ? 'ring-2 ring-amber-500/50 shadow-[0_0_20px_rgba(245,158,11,0.2)] scale-[1.02] z-30' : 'opacity-90';

            if (landscape) {
                return `
                    <div class="absolute ${posClass} flex flex-row items-center gap-1 z-20 pointer-events-auto p-1 rounded-xl border ${cStyle.border} ${cStyle.bg} backdrop-blur-md transition-all duration-300 ${activeContainerStyle} ${eliminatedStyle}">
                        <div class="flex flex-col items-center gap-1 shrink-0">
                            <div class="w-7 h-7 rounded-lg flex items-center justify-center text-sm transition-all duration-300 ${avatarStyle}">
                                <i class="fas ${p.icon}"></i>
                            </div>
                            <div class="${cStyle.nameBg} px-1 py-0.5 rounded text-[8px] font-bold text-center border border-white/20 ${isActive?'text-amber-300':'text-slate-200'} leading-tight">
                                ${p.name.replace(' (AI)','')}${p.isAI?'<br><span class="text-blue-300">AI</span>':''}<br><span class="opacity-70">(${p.hand.length})</span>
                            </div>
                            <div class="min-h-[12px] flex items-center justify-center">
                                ${deathBadge}
                                ${!deathBadge && isActive && p.isAI ? `<span class="text-[7px] text-blue-300 animate-pulse font-bold text-center"><i class="fas fa-cog fa-spin"></i><br>思考</span>` : ''}
                                ${!deathBadge && isActive && !p.isAI ? `<span class="text-[7px] text-amber-400 animate-bounce font-bold text-center"><i class="fas fa-hand-point-up"></i><br>出牌</span>` : ''}
                            </div>
                        </div>
                        <div class="flex flex-row items-center gap-0">
                            ${p.hand.map(card => renderMiniCard(card, true, isActive)).join('')}
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="absolute ${posClass} flex flex-col items-center gap-1.5 z-20 pointer-events-auto p-1.5 sm:p-2 rounded-xl border ${cStyle.border} ${cStyle.bg} backdrop-blur-md transition-all duration-300 ${activeContainerStyle} ${eliminatedStyle}">
                        <div class="flex flex-row items-center justify-center gap-2 w-full px-1">
                            <div class="w-6 h-6 sm:w-8 sm:h-8 rounded-lg flex items-center justify-center text-sm sm:text-base transition-all duration-300 ${avatarStyle}">
                                <i class="fas ${p.icon}"></i>
                            </div>
                            <div class="flex flex-col items-start">
                                <div class="${cStyle.nameBg} px-1.5 py-0.5 rounded text-[9px] sm:text-[10px] font-bold text-center border border-white/20 ${isActive?'text-amber-300':'text-slate-200'}">
                                    ${p.name} <span class="opacity-70 ml-0.5">(${p.hand.length})</span>
                                </div>
                                <div class="h-3 flex items-center mt-0.5">
                                    ${deathBadge}
                                    ${!deathBadge && isActive && p.isAI ? `<span class="text-[8px] text-blue-300 animate-pulse font-bold"><i class="fas fa-cog fa-spin mr-0.5"></i>思考中</span>` : ''}
                                    ${!deathBadge && isActive && !p.isAI ? `<span class="text-[8px] text-amber-400 animate-bounce font-bold"><i class="fas fa-hand-point-up mr-0.5"></i>你的回合</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-row justify-center pl-1 sm:pl-2 pr-1 pt-1">
                            ${p.hand.map(card => renderMiniCard(card, true, isActive)).join('')}
                        </div>
                    </div>
                `;
            }
        };


        const renderGameTable = () => {
            const activeId = state.players[state.currentPlayerIndex].id;
            const hasSelection = state.selectedCardId !== null;


            return `
                <div class="absolute inset-0 mahjong-table table-border pointer-events-none">
                    
                    <!-- 四角玩家 -->
                    ${state.players.map(p => renderCornerPlayer(p, activeId)).join('')}


                    <!-- 中央時間軸海 (最大化拉長) -->
                    <div id="timeline-area" class="absolute ${isLandscape() ? 'top-[40px] bottom-[1px] left-[180px] right-[180px]' : 'top-[140px] bottom-[130px] left-2 right-2 sm:left-12 sm:right-12'} flex flex-col items-center justify-center pointer-events-auto">

                                    <div class="absolute bottom-2 left-2 right-2 flex justify-between items-end">
                                        <span class="text-[10px] font-bold bg-amber-600/80 text-white px-1.5 py-0.5 rounded backdrop-blur-sm shadow">${formatYear(card.year)}</span>
                                        <span class="text-[10px] text-slate-300 bg-black/60 px-1.5 py-0.5 rounded backdrop-blur-sm">${ALL_PERIODS.find(p=>p.id===card.period).name.slice(0,2)}</span>
                                    </div>
                                </div>
                                <div class="p-3">
                                    <h3 class="font-bold text-sm text-slate-100 mb-1 group-hover:text-amber-400 transition-colors line-clamp-1 flex items-center gap-1" title="${card.title}">
                                        ${card.title}
                                        <i class="fas fa-chevron-right text-[8px] text-slate-600 group-hover:text-amber-500/70 transition-colors ml-auto shrink-0"></i>
                                    </h3>
                                    <p class="text-[10px] text-slate-400 line-clamp-3 leading-relaxed" title="${card.desc}">${card.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>`}
                </div>
            </div>
            `;
        };



        // ===== 無限挑戰模式邏輯 =====
        const startSoloInfinite = (selectedPeriods, questionDifficulty) => {
            audioManager.playSFX('click');
            let cards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if(cards.length < 5) return alert('題庫不足！請增加時代或降低難度。');
            state.isSoloInfinite = true;
            state.deck = shuffle([...cards]);
            state.timeline = [state.deck.pop()]; // 起始一張
            state.soloPlaced = 0;
            state.soloFailed = false;
            state.soloFailedCard = null;
            state.soloDifficulty = questionDifficulty;
            state.soloCard = state.deck.pop(); // 第一張待放牌
            state.selectedCardId = state.soloCard ? state.soloCard.id : null;
            startTimer();
            audioManager.switchToGameBGM();
            state.screen = 'soloPlay';
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('display-round').innerText = '無限挑戰';
            document.getElementById('game-deck-count').innerText = state.deck.length;
            render();
        };

        const handleSoloGapClick = (insertIndex) => {
            if(!state.soloCard || state.soloFailed) return;
            const card = state.soloCard;
            let ok = false;
            if(insertIndex === 0) ok = card.year <= state.timeline[0].year;
            else if(insertIndex === state.timeline.length) ok = card.year >= state.timeline[insertIndex-1].year;
            else ok = card.year >= state.timeline[insertIndex-1].year && card.year <= state.timeline[insertIndex].year;

            if(ok) {
                audioManager.playSFX('correct');
                state.timeline.splice(insertIndex, 0, card);
                state.soloPlaced++;
                showToast(`🎯 正確！已成功放置 ${state.soloPlaced} 張`, true, 2000);
                // 抽下一張
                if(state.deck.length > 0) {
                    setTimeout(() => {
                        audioManager.playSFX('card');
                        state.soloCard = state.deck.pop();
                        state.selectedCardId = state.soloCard.id;
                        document.getElementById('game-deck-count').innerText = state.deck.length;
                        render();
                    }, 800);
                } else {
                    // 牌庫清空 = 通關
                    state.soloCard = null;
                    setTimeout(() => endSoloGame(true), 1000);
                }
            } else {
                // 答錯立即結束
                audioManager.playSFX('wrong');
                audioManager.playSFX('gameover');
                state.soloFailed = true;
                state.soloFailedCard = card;
                state.screen = 'soloOver';
                stopTimer();
                showToast(`❌ 答錯！【${card.title}】發生於 ${formatYear(card.year)}`, false, 5000);
                // 震動提示
                document.getElementById('app').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('app').classList.remove('shake');
                    render();
                }, 600);
            }
        };

        const endSoloGame = (cleared) => {
            stopTimer();
            audioManager.playSFX(cleared ? 'win' : 'gameover');
            state.soloFailed = !cleared;
            state.screen = 'soloOver';
            render();
        };

        // 英文小鍵盤彈窗
        let nameInputVal = '';
        const renderKeyboard = () => {
            const rows = [
                ['Q','W','E','R','T','Y','U','I','O','P'],
                ['A','S','D','F','G','H','J','K','L'],
                ['Z','X','C','V','B','N','M','⌫']
            ];
            return `
            <div class="fixed inset-0 bg-black/80 z-[200] flex items-end justify-center pb-4 px-2">
                <div class="w-full max-w-sm bg-slate-900 border border-amber-500/30 rounded-2xl p-4 shadow-2xl animate-scale-up">
                    <h3 class="text-center text-amber-400 font-bold text-lg mb-1 serif-font">🏆 留名排行榜</h3>
                    <p class="text-center text-slate-400 text-xs mb-3">成功放置 <span class="text-white font-bold">${state.soloPlaced}</span> 張 · 耗時 <span class="text-white font-bold">${formatTime(state.gameSeconds)}</span></p>
                    <!-- 顯示輸入框 -->
                    <div class="bg-slate-800 border-2 border-amber-500/50 rounded-xl px-4 py-3 mb-3 flex items-center gap-2 min-h-[48px]">
                        <i class="fas fa-user text-amber-500 text-sm"></i>
                        <span id="kb-display" class="text-white font-bold text-lg flex-1">${nameInputVal || '<span class="text-slate-600">輸入名字…</span>'}</span>
                        <span class="w-0.5 h-5 bg-amber-400 animate-pulse"></span>
                    </div>
                    <!-- 鍵盤列 -->
                    ${rows.map((row,ri) => `
                    <div class="flex gap-1 mb-1 justify-center">
                        ${row.map(k => `
                        <button class="kb-key ${k==='⌫'?'del-key':''}" style="width:${k==='⌫'?'44px':'30px'};height:40px;"
                            onclick="soloKbPress('${k}')">
                            ${k==='⌫'?'⌫':k}
                        </button>`).join('')}
                    </div>`).join('')}
                    <!-- 空白與確認 -->
                    <div class="flex gap-1 mt-1">
                        <button class="kb-key flex-1" style="height:40px;" onclick="soloKbPress(' ')">SPACE</button>
                        <button style="height:40px;width:70px;border-radius:8px;background:linear-gradient(135deg,#d97706,#92400e);border:1px solid #f59e0b;color:white;font-weight:bold;font-size:13px;cursor:pointer;" onclick="soloKbConfirm()">確認 ✓</button>
                    </div>
                </div>
            </div>`;
        };

        window.soloKbPress = (k) => {
            if(k==='⌫') { nameInputVal = nameInputVal.slice(0,-1); }
            else if(nameInputVal.length < 12) { nameInputVal += k; }
            const disp = document.getElementById('kb-display');
            if(disp) disp.innerHTML = nameInputVal || '<span class="text-slate-600">輸入名字…</span>';
        };

        window.soloKbConfirm = () => {
            const name = nameInputVal.trim() || 'PLAYER';
            addToLeaderboard(name, state.soloPlaced, state.gameSeconds);
            nameInputVal = '';
            state.screen = 'leaderboard';
            state.isSoloInfinite = false;
            audioManager.switchToLobbyBGM();
            document.getElementById('game-header').classList.add('hidden');
            render();
        };

        // 渲染無限挑戰設定頁
        const renderSoloSetup = () => `
            <div class="absolute inset-0 flex flex-col items-center justify-center p-4 overflow-y-auto z-10 bg-[#02140f]">
                <div class="glass-panel p-6 sm:p-10 rounded-2xl w-full max-w-lg animate-scale-up relative border border-purple-500/30 my-auto">
                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; render();" class="absolute top-6 left-6 text-slate-400 hover:text-amber-400 transition text-sm"><i class="fas fa-arrow-left mr-1"></i> 返回</button>
                    <div class="text-center mb-6 mt-6">
                        <div class="text-5xl mb-2">∞</div>
                        <h2 class="text-2xl font-bold text-purple-300 serif-font">無限挑戰模式</h2>
                        <p class="text-slate-400 text-xs mt-1">每次抽一張，放錯即結束 · 看你能走多遠</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                        <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                            <label class="block text-amber-400 font-bold mb-2 text-xs"><i class="fas fa-layer-group mr-1"></i>考驗難度</label>
                            <select id="soloQDiff" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-xs">
                                <option value="1">簡易</option>
                                <option value="2" selected>中等 (常規)</option>
                                <option value="3">極難 (含冷門)</option>
                            </select>
                        </div>
                        <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                            <label class="block text-amber-400 font-bold mb-2 text-xs"><i class="fas fa-info-circle mr-1"></i>規則說明</label>

                        <label class="block text-amber-400 font-bold mb-3 text-xs"><i class="fas fa-calendar-alt mr-1"></i>時代主題 (複選)</label>

                        </div>
                    </div>
                    <button onclick="
                        const checked = Array.from(document.querySelectorAll('#soloPeriodCheckboxes input:checked')).map(cb=>cb.value);
                        if(!checked.length) return alert('至少選一個時代！');
                        startSoloInfinite(checked, parseInt(document.getElementById('soloQDiff').value));
                    " class="w-full bg-gradient-to-r from-purple-700 to-indigo-700 hover:from-purple-600 hover:to-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg text-sm tracking-widest hover:scale-[1.02] transition-transform">
                        <i class="fas fa-infinity mr-2"></i>開始無限挑戰
                    </button>
                </div>
            </div>
        `;

        // 渲染無限挑戰遊戲桌
        const renderSoloPlay = () => {
            const hasSelection = !!state.soloCard;
            const card = state.soloCard;
            return `
            <div class="absolute inset-0 mahjong-table table-border pointer-events-none">
                <!-- 當前牌展示（底部中央） -->
                <div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-30 pointer-events-auto flex flex-col items-center gap-1">
                    <div class="text-[10px] text-amber-400/80 font-bold tracking-widest">▲ 當前出牌</div>
                    ${card ? `
                    <div class="w-20 h-28 sm:w-24 sm:h-36 bg-gradient-to-b from-amber-50 to-orange-50 rounded-xl shadow-2xl border-4 border-purple-400 flex flex-col overflow-hidden animate-scale-up cursor-default">
                        <div class="h-[50%] w-full bg-slate-800">
                            <img src="${renderWikiImage(card.wiki)}" data-wiki="${card.wiki}" class="w-full h-full object-cover opacity-0 transition-opacity" onerror="this.src='${noPicSvg}'; this.classList.remove('opacity-0');"/>
                        </div>
                        <div class="h-[50%] w-full flex flex-col items-center justify-center bg-white/80 p-1 border-t-2 border-purple-300">
                            <p class="font-bold text-[9px] sm:text-[10px] text-center serif-font text-slate-800 leading-tight line-clamp-2">${card.title}</p>
                            <p class="text-[8px] text-purple-600 font-bold mt-0.5">?</p>
                        </div>
                        <div class="absolute top-1 left-1 bg-purple-600 text-white text-[8px] font-bold px-1 py-0.5 rounded shadow">
                            <i class="fas fa-question"></i>
                        </div>
                    </div>
                    <div class="text-[9px] text-slate-400 font-bold">點選時間軸中的缺口放置</div>
                    ` : '<div class="text-amber-400 font-bold text-sm animate-pulse">⭐ 牌庫已清空！通關！</div>'}
                </div>

                <!-- 左上角統計 -->
                <div class="absolute top-[44px] left-2 z-20 glass-panel px-3 py-2 rounded-xl text-xs border border-purple-500/30">
                    <div class="text-purple-300 font-bold">∞ 無限挑戰</div>
                    <div class="text-white font-bold text-base">${state.soloPlaced} <span class="text-slate-400 text-[10px]">張</span></div>

                </div>

                <!-- 中央時間軸 -->
                <div id="timeline-area" class="absolute ${isLandscape() ? 'top-[40px] bottom-[100px] left-4 right-4' : 'top-[50px] bottom-[130px] left-2 right-2 sm:left-6 sm:right-6'} flex flex-col items-center justify-center pointer-events-auto">
                    <div class="w-full h-full bg-black/40 backdrop-blur-md rounded-2xl border border-purple-500/20 p-2 sm:p-4 shadow-2xl flex flex-col relative">
                        <div class="absolute inset-0 pointer-events-none rounded-2xl shadow-[inset_0_0_50px_rgba(0,0,0,0.8)] border border-white/5"></div>
                        <div class="text-center text-[10px] text-purple-400/60 font-bold tracking-widest mb-1 flex-shrink-0">
                            <i class="fas fa-infinity mr-1"></i> 無限挑戰時間軸 — 點選缺口放置史料牌 <i class="fas fa-infinity ml-1"></i>
                        </div>
                        <div class="flex-1 overflow-x-auto overflow-y-hidden timeline-scroll w-full" id="timelineContainer">
                            <div class="flex items-center h-full min-w-max px-2 sm:px-8 pb-2">
                                ${(() => {
                                    let html = '';
                                    for(let i=0; i<=state.timeline.length; i++) {
                                        html += `<div class="flex items-center justify-center px-1 shrink-0 cursor-pointer group h-full" onclick="handleSoloGapClick(${i})">
                                            <div class="w-8 sm:w-12 h-28 sm:h-32 border-2 border-dashed rounded-lg flex items-center justify-center transition-all ${hasSelection ? 'gap-pulse border-purple-400' : 'border-emerald-700/40 bg-black/10'}">
                                                <i class="fas fa-plus text-[10px] sm:text-xs ${hasSelection ? 'text-purple-300' : 'text-emerald-800'}"></i>
                                            </div>
                                        </div>`;
                                        if(i < state.timeline.length) html += renderTimelineCard(state.timeline[i]);
                                    }
                                    return html;
                                })()}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        };

        // 渲染無限挑戰結束畫面
        const renderSoloOver = () => {
            const showKb = true; // always show keyboard
            nameInputVal = nameInputVal || '';
            const diffNames = { 1: '簡易', 2: '中等', 3: '極難' };
            const diffName = diffNames[state.soloDifficulty] || '中等';
            // 時間軸卡牌年代列表（已成功排列的）
            const timelineHtml = state.timeline.length > 0 ? `
                <div class="mt-4 bg-slate-900/80 rounded-xl p-3 border border-slate-700 text-left">
                    <div class="text-xs text-purple-300 font-bold mb-2"><i class="fas fa-stream mr-1"></i>時間軸上的史料（${state.timeline.length} 張）</div>
                    <div class="max-h-36 overflow-y-auto space-y-1 pr-1">
                        ${state.timeline.map(c => `
                            <div class="flex justify-between items-center text-[11px] py-0.5 border-b border-slate-800">
                                <span class="text-slate-300 truncate mr-2">${c.title}</span>
                                <span class="text-amber-400 font-bold shrink-0">${formatYear(c.year)}</span>
                            </div>`).join('')}
                    </div>
                </div>` : '';
            // 放錯的牌
            const failedHtml = state.soloFailed && state.soloFailedCard ? `
                <div class="mt-3 bg-red-950/60 rounded-xl p-3 border border-red-700/50 text-left">
                    <div class="text-xs text-red-300 font-bold mb-1"><i class="fas fa-times-circle mr-1"></i>放錯的那張牌</div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-red-200 font-bold">${state.soloFailedCard.title}</span>
                        <span class="text-red-400 font-black">${formatYear(state.soloFailedCard.year)}</span>
                    </div>
                    <div class="text-[10px] text-red-400/80 mt-1">${state.soloFailedCard.desc}</div>
                </div>` : '';
            return `
            <div class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center p-6 z-50 overflow-y-auto">
                <div class="glass-panel p-8 sm:p-12 rounded-3xl max-w-md w-full text-center border ${state.soloFailed?'border-red-500/50 shadow-[0_0_50px_rgba(239,68,68,0.2)]':'border-purple-500/50 shadow-[0_0_50px_rgba(139,92,246,0.2)]'} animate-scale-up mb-4">
                    <div class="text-6xl mb-4">${state.soloFailed ? '💥' : '🌟'}</div>
                    <h2 class="text-3xl font-black mb-2 serif-font ${state.soloFailed?'text-red-300':'text-purple-300'}">${state.soloFailed ? '挑戰結束！' : '完美通關！'}</h2>
                    <p class="text-slate-400 text-sm mb-6">${state.soloFailed ? '放置錯誤，記錄已定格' : '牌庫清空，歷史盡在掌握'}</p>
                    <div class="bg-slate-900/80 rounded-xl p-4 mb-2 border border-slate-700 space-y-2">

                        <div class="flex justify-between text-sm"><span class="text-slate-400">考驗難度</span><span class="font-bold text-amber-400">${diffName}</span></div>
                    </div>
                    ${failedHtml}
                    ${timelineHtml}
                    <p class="text-amber-400 text-sm font-bold animate-pulse mt-4">請在下方輸入名字留名排行榜 ↓</p>
                </div>
                ${renderKeyboard()}
            </div>
            `;
        };

        // 渲染排行榜
        const renderLeaderboard = () => {
            const diffNames = { 1: '簡易', 2: '中等', 3: '極難' };
            const diffColors = { 1: 'text-green-400', 2: 'text-amber-400', 3: 'text-red-400' };
            const lb = getLeaderboard().sort((a,b) => {
                if (b.cardsPlaced !== a.cardsPlaced) return b.cardsPlaced - a.cardsPlaced;
                if ((b.difficulty||1) !== (a.difficulty||1)) return (b.difficulty||1) - (a.difficulty||1);
                return a.seconds - b.seconds;
            });
            return `
            <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                <div class="bg-slate-900 border-b border-slate-700 p-4 flex items-center justify-between shadow-lg z-10 shrink-0">
                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; render();" class="text-slate-400 hover:text-white transition px-4 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>返回</button>
                    <h2 class="text-xl font-bold text-amber-500 serif-font"><i class="fas fa-trophy mr-2 text-amber-400"></i>無限挑戰排行榜</h2>
                    <div class="w-20"></div>

                <div class="flex-1 overflow-y-auto p-4 sm:p-8">
                    ${lb.length === 0 ? `
                    <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-4">
                        <i class="fas fa-trophy text-6xl text-slate-700"></i>
                        <p class="text-lg">尚無記錄，快去挑戰！</p>
                        <button onclick="audioManager.playSFX('click'); state.screen='soloSetup'; render();" class="bg-gradient-to-r from-purple-700 to-indigo-700 text-white font-bold py-3 px-8 rounded-xl">開始挑戰</button>
                    </div>` : `
                    <div class="max-w-lg mx-auto space-y-2 pb-12">
                        ${lb.map((entry,i) => `
                        <div class="leaderboard-row flex items-center gap-4 bg-slate-800/80 border ${i===0?'border-yellow-500/50':i===1?'border-slate-500/50':i===2?'border-amber-800/50':'border-slate-700/30'} rounded-xl px-4 py-3 shadow hover:bg-slate-700/80 transition">
                            <div class="lb-rank font-black text-xl w-8 text-center">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>

                            </div>
                        </div>`).join('')}
                        <div class="text-center mt-6">
                            <button onclick="audioManager.playSFX('click'); state.screen='soloSetup'; render();" class="bg-gradient-to-r from-purple-700 to-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:scale-105 transition-transform text-sm"><i class="fas fa-infinity mr-2"></i>再次挑戰</button>

        };

        const render = () => {
            const app = document.getElementById('app');

            if (state.screen === 'menu') app.innerHTML = renderMenu();

                const scroll = document.getElementById('timelineContainer');
                if(scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'soloOver') app.innerHTML = renderSoloOver();
            else if (state.screen === 'leaderboard') { audioManager.switchToLobbyBGM(); app.innerHTML = renderLeaderboard(); }
            else if (state.screen === 'play') {
                app.innerHTML = renderGameTable();
                const scroll = document.getElementById('timelineContainer');
                if (scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'gameover') app.innerHTML = renderGameTable() + renderGameOver();
            else if (state.screen === 'gallery') app.innerHTML = renderGallery();
        };


        window.onload = render;
        window.addEventListener('resize', () => { if (state.screen === 'play' || state.screen === 'gameover') render(); });
    </script>
</body>
</html>
