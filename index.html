    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap');


        :root {
            --table-green: radial-gradient(circle, #064e3b 0%, #022c22 80%, #02140f 100%);
            --wood-border: linear-gradient(135deg, #78350f 0%, #451a03 50%, #1c1917 100%);
        }


        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #090d16;
            overscroll-behavior: none;
            overflow: hidden;
            color: #f8fafc;
        }


        .serif-font { font-family: 'Noto Serif TC', serif; }


        /* 麻將桌底色與木質感邊框 */
        .mahjong-table {
            background: var(--table-green);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            position: relative;
        }


        .table-border {
            border: 10px solid #292524;
            border-image: var(--wood-border) 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }


        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }


        /* 迷你卡牌與緊湊堆疊 */
        .mini-card-container {
            transition: all 0.2s ease-out;
            margin-left: -12px; /* 縮小重疊距離適應並列 */
        }
        .mini-card-container:first-child { margin-left: 0; }
        .mini-card-container:hover {
            transform: translateY(-8px);
            z-index: 30;
        }
        
        .mini-card {
            transition: all 0.3s ease;
            box-shadow: -4px 0 10px rgba(0,0,0,0.4);
        }
        .mini-card:hover {
            border-color: #fbbf24;
            box-shadow: -2px 10px 20px rgba(245, 158, 11, 0.5);
        }


        /* 中間公海時間軸 */
        .timeline-scroll {
            scroll-behavior: smooth;
        }
        .timeline-scroll::-webkit-scrollbar { height: 8px; }
        .timeline-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.6); border-radius: 4px; }


        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 25px rgba(245, 158, 11, 0.9); }
        }
        .gap-pulse {
            animation: pulse-gold 1.5s infinite;
            background: rgba(245, 158, 11, 0.25) !important;
            border-color: #f59e0b !important;
        }


        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-scale-up { animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* ===== 大廳樣式 ===== */
        .lobby-bg {
            background: radial-gradient(ellipse at 20% 20%, #1a3a2a 0%, #0a1f15 40%, #050d0a 100%);
            position: relative;
            overflow: hidden;
        }
        .lobby-lantern {
            position: absolute;
            width: 28px; height: 40px;
            border-radius: 50% 50% 40% 40%;
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
            box-shadow: 0 0 20px currentColor;
        }
        @keyframes swing { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
        @keyframes floatUp { 0%{transform:translateY(0) rotate(0);opacity:0.7} 100%{transform:translateY(-80px) rotate(15deg);opacity:0} }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            animation: floatUp 4s ease-in infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .lobby-deco { animation: shimmer 2.5s ease-in-out infinite; }
        @keyframes fadeInDown { from{transform:translateY(-30px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes fadeInUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .fade-in-down { animation: fadeInDown 0.8s ease forwards; }
        .fade-in-up { animation: fadeInUp 0.8s ease forwards; }
        .lobby-btn {
            position: relative; overflow: hidden;
            transition: all 0.3s ease;
        }
        .lobby-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        .lobby-btn:hover::before { opacity: 1; }
        .lobby-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
        /* 無限挑戰特別按鈕 */

        .leaderboard-row:nth-child(2) .lb-rank { color: #c0c0c0; }
        .leaderboard-row:nth-child(3) .lb-rank { color: #cd7f32; }
        /* 英文小鍵盤 */
        .kb-key {
            background: linear-gradient(180deg, #374151 0%, #1f2937 100%);
            border: 1px solid #4b5563;
            border-bottom: 3px solid #111827;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;

        .kb-key.del-key { background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); border-color: #991b1b; }
        /* 極限殊死對戰倒數計時 */
        @keyframes countdownPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        @keyframes countdownDanger {
            0%,100% { color: #ef4444; text-shadow: 0 0 20px #ef4444, 0 0 40px #ef4444; }
            50% { color: #fca5a5; text-shadow: 0 0 30px #ef4444, 0 0 60px #dc2626; }

        @keyframes extremeFlash {

            50% { background: rgba(239,68,68,0.25); }

        @keyframes timerBar {

            to { width: 0%; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,50%,90%{transform:translateX(-8px)} 30%,70%{transform:translateX(8px)} }
        .shake { animation: shake 0.5s ease; }

        /* 賽程樹狀圖 */
        .bracket-tree-wrap {
            width: 100%;
            overflow-x: auto;
            overflow-y: auto;
            padding: 12px 8px;

        .bracket-tree {

            align-items: center;
            gap: 0;
            min-width: max-content;
            margin: 0 auto;
            padding: 8px 16px 16px;
        }

        /* 冠軍 trophy */
        .bt-champion-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 0;
        }
        .bt-champion-cup {
            background: linear-gradient(135deg,rgba(120,53,15,0.9),rgba(146,64,14,0.8));
            border: 2px solid #fbbf24;
            border-radius: 16px;
            padding: 10px 28px;
            text-align: center;

        @keyframes champGlow {

        /* 連接線 */
        .bt-connector-v {
            width: 2px;
            background: linear-gradient(to bottom, #fbbf24, rgba(251,191,36,0.3));

        .bt-connector-h-row {

            align-items: flex-start;

        }
        .bt-h-line {
            height: 2px;
            background: rgba(251,191,36,0.4);
            flex: 1;
        }
        .bt-matches-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            justify-content: center;
        }
        .bt-match-card {
            background: rgba(15,23,42,0.85);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 12px;
            padding: 10px 14px;
            min-width: 130px;
            max-width: 180px;
            cursor: pointer;

        .bt-match-card.status-playing {
            border-color: rgba(245,158,11,0.7);
            animation: matchPulse 1.2s ease-in-out infinite;
        }
        @keyframes matchPulse {
            0%,100%{ box-shadow: 0 0 8px rgba(245,158,11,0.3); }
            50%{ box-shadow: 0 0 20px rgba(245,158,11,0.7); }
        }

        .bt-player-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            border-radius: 6px;
        }
        .bt-player-row.winner {
            background: rgba(16,185,129,0.15);
            padding: 3px 6px;
            margin: 0 -6px;
        }
        .bt-match-label {
            font-size: 10px;
            color: rgba(251,191,36,0.6);
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 比賽開始按鈕 */
        @keyframes startBtnPulse {
            0%,100%{ box-shadow: 0 0 20px rgba(239,68,68,0.5), 0 0 40px rgba(239,68,68,0.2); }
            50%{ box-shadow: 0 0 40px rgba(239,68,68,0.9), 0 0 80px rgba(239,68,68,0.4); }
        }
        .start-match-btn {
            animation: startBtnPulse 1.5s ease-in-out infinite;
        }
        /* 究極挑戰 — 厲始魔王 */
        @keyframes beastIdle {
            0%,100% { transform: translateY(0) scaleX(1); }
            40% { transform: translateY(-6px) scaleX(1.04); }
            70% { transform: translateY(3px) scaleX(0.97); }
        }
        @keyframes beastAttack {
            0% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(28px) rotate(-8deg) scale(1.15); }
            50% { transform: translateX(-18px) rotate(6deg) scale(1.1); }
            75% { transform: translateX(10px) rotate(-3deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }
        @keyframes beastHeal {
            0%,100% { filter: brightness(1); }
            50% { filter: brightness(2) drop-shadow(0 0 12px #4ade80); }
        }
        .beast-idle { animation: beastIdle 2.4s ease-in-out infinite; }
        .beast-attack { animation: beastAttack 0.7s cubic-bezier(0.36,0.07,0.19,0.97) forwards; }
        .beast-heal { animation: beastHeal 0.8s ease-in-out; }
        @keyframes hpShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .hp-shake { animation: hpShake 0.35s ease; }
        @keyframes streakGlow { 0%,100%{opacity:0.6} 50%{opacity:1; text-shadow:0 0 12px #fbbf24;} }
        .streak-glow { animation: streakGlow 1s ease-in-out infinite; }
        @keyframes correctFlash { 0%{background:rgba(74,222,128,0.3)} 100%{background:transparent} }
        .correct-flash { animation: correctFlash 0.6s ease forwards; }
        @keyframes wrongFlash { 0%{background:rgba(239,68,68,0.4)} 100%{background:transparent} }
        .wrong-flash { animation: wrongFlash 0.6s ease forwards; }
        .num-btn {
            background: linear-gradient(180deg,#1e3a5f 0%,#0f2040 100%);
            border: 1px solid #2563eb88;
            border-bottom: 3px solid #0a1428;
            border-radius: 10px;
            color: #93c5fd;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.08s;
            user-select: none;
            display: flex; align-items: center; justify-content: center;
        }
        .num-btn:active { border-bottom-width:1px; transform:translateY(2px); background:linear-gradient(180deg,#2563eb44 0%,#1e3a5f 100%); }
        .num-btn.bc-btn { background:linear-gradient(180deg,#3b1f6e 0%,#1e0f40 100%); border-color:#7c3aed88; color:#c4b5fd; }
        .num-btn.confirm-btn { background:linear-gradient(135deg,#065f46 0%,#022c22 100%); border-color:#10b98188; border-bottom-color:#011a13; color:#6ee7b7; font-size:0.85rem; }
        .num-btn.del-btn { background:linear-gradient(180deg,#7f1d1d 0%,#450a0a 100%); border-color:#dc262688; border-bottom-color:#200505; color:#fca5a5; }
        /* ===== 橫屏設定頁面適配（手機橫屏 + 小高度平板）===== */
        @media (orientation: landscape) and (max-height: 620px) {
            .setup-outer {
                align-items: center !important;

                padding: 6px !important;
                overflow-y: auto !important;

            }
            .setup-panel {
                padding: 0.6rem 0.85rem !important;
                margin: auto 0 !important;

            }
            .setup-panel .setup-title-area {

            }
        }
        /* ===== 彈跳視窗共用響應式系統 v2 ===== */

        /* --- 基礎：直向單欄 --- */
        .modal-landscape {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: clamp(300px, 92vw, 480px);
            max-height: 96vh;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .modal-img-col {
            width: 100%;
            height: clamp(110px, 26vmin, 200px);
            flex-shrink: 0;
            overflow: hidden;
        }
        .modal-content-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: clamp(0.75rem, 3vmin, 1.5rem);
            overflow-y: auto;
            box-sizing: border-box;
        }
        .modal-icon-lg {
            font-size: clamp(2rem, 7vmin, 3.5rem);
            display: block;
            margin-bottom: clamp(0.4rem, 1.5vmin, 1rem);
        }
        .modal-title-lg {
            font-size: clamp(1.2rem, 4.5vmin, 2rem);
            margin-bottom: clamp(0.3rem, 1vmin, 0.75rem);
        }
        .modal-stat-row {
            font-size: clamp(0.7rem, 2.2vmin, 0.875rem);
            padding: clamp(0.15rem, 0.6vmin, 0.4rem) 0;
        }
        .modal-btn {
            padding: clamp(0.45rem, 2vmin, 0.75rem);
            font-size: clamp(0.75rem, 2.2vmin, 0.9rem);
        }
        .modal-desc {
            font-size: clamp(0.7rem, 2vmin, 0.82rem);
            overflow-y: auto;
        }

        /* --- 橫向：任何橫屏都切雙欄（有圖）或緊湊單欄（無圖） --- */
        @media (orientation: landscape) {
            .modal-landscape.modal-has-img {
                flex-direction: row !important;
                align-items: stretch !important;
                max-width: min(90vw, 680px) !important;
                max-height: 92vh !important;
                overflow: hidden !important;
            }
            .modal-landscape.modal-has-img .modal-img-col {
                width: clamp(150px, 34%, 240px) !important;
                height: auto !important;
                flex-shrink: 0 !important;
            }
            .modal-landscape.modal-has-img .modal-content-col {
                flex: 1 !important;
                overflow-y: auto !important;
                padding: clamp(0.6rem, 2vh, 1.2rem) !important;
            }
            .modal-landscape {
                max-width: min(82vw, 560px) !important;
                max-height: 92vh !important;
                overflow-y: auto !important;
            }
            .modal-icon-lg { font-size: clamp(1.3rem, 4vh, 2.3rem) !important; margin-bottom: clamp(0.15rem, 0.7vh, 0.4rem) !important; }
            .modal-title-lg { font-size: clamp(0.9rem, 2.8vh, 1.4rem) !important; margin-bottom: clamp(0.15rem, 0.6vh, 0.35rem) !important; }
            .modal-stat-row { font-size: clamp(0.6rem, 1.7vh, 0.78rem) !important; padding: clamp(0.08rem, 0.35vh, 0.2rem) 0 !important; }
            .modal-btn { padding: clamp(0.3rem, 1.3vh, 0.55rem) !important; font-size: clamp(0.65rem, 1.8vh, 0.82rem) !important; }
            .modal-desc { font-size: clamp(0.6rem, 1.6vh, 0.76rem) !important; max-height: clamp(44px, 13vh, 100px) !important; margin-bottom: clamp(0.3rem, 1vh, 0.6rem) !important; }
            .modal-hide-landscape { display: none !important; }
        }

        /* --- 小螢幕直向（手機）：更緊湊 --- */
        @media (orientation: portrait) and (max-width: 400px) {

    <!-- 聊天按鈕 -->
    <div id="float-chat-btn" title="世界聊天室">
        💬
        <span id="float-chat-badge">0</span>
    </div>

    <!-- 聊天面板 -->
    <div id="float-chat-panel">
        <div id="float-chat-header">
            <span id="float-chat-header-title">💬 世界聊天室</span>
            <button id="float-chat-close" onclick="floatChatToggle()" title="關閉">✕</button>
        </div>
        <div id="float-chat-name-bar">
            <label>暱稱：</label>
            <input id="float-chat-nickname" maxlength="12" placeholder="輸入暱稱…" />
        </div>
        <div id="float-chat-messages"></div>
        <div id="float-chat-input-area">
            <input id="float-chat-input" maxlength="80" placeholder="輸入訊息，按 Enter 發送…" onkeydown="if(event.key==='Enter')floatChatSend()"/>
            <button id="float-chat-send" onclick="floatChatSend()">發送</button>
        </div>
    </div>

    <script>
    // ===== 懸浮聊天室邏輯 =====
    (function() {
        /* ---- 常數 ---- */
        const MSG_TTL      = 60 * 60 * 1000;   // 留言存活時間：1小時
        const MSG_MAX      = 100;               // 最多保留幾則
        const CHAT_DB_PATH = 'world_chat';      // Firebase Realtime DB 路徑
        const MY_UID       = 'u' + Date.now().toString(36) + Math.random().toString(36).substr(2,4);

        /* ---- 狀態 ---- */
        let isOpen        = false;
        let unreadCount   = 0;
        let chatListener  = null;
        let localMessages = [];       // 本地快取（已排序、已過濾）
        let lastReadTime  = Date.now();
        let initialized   = false;
        let savedNickname = localStorage.getItem('fchat_nickname') || '';

        /* ---- DOM refs ---- */
        const btnEl    = document.getElementById('float-chat-btn');
        const panelEl  = document.getElementById('float-chat-panel');
        const badgeEl  = document.getElementById('float-chat-badge');
        const msgsEl   = document.getElementById('float-chat-messages');
        const inputEl  = document.getElementById('float-chat-input');
        const nickEl   = document.getElementById('float-chat-nickname');

        if (savedNickname) nickEl.value = savedNickname;
        nickEl.addEventListener('change', () => {
            localStorage.setItem('fchat_nickname', nickEl.value.trim());
        });

        /* ---- 拖曳：按鈕 ---- */
        makeDraggable(btnEl, null, () => floatChatToggle());

        /* ---- 拖曳：面板（透過 header 拖曳）---- */
        const headerEl = document.getElementById('float-chat-header');
        makeDraggableFree(panelEl, headerEl);

        /* ---- 切換開關 ---- */
        window.floatChatToggle = function() {
            isOpen = !isOpen;
            panelEl.style.display = isOpen ? 'flex' : 'none';
            if (isOpen) {
                unreadCount = 0;
                badgeEl.style.display = 'none';
                lastReadTime = Date.now();
                if (!initialized) initChat();
                else scrollToBottom();
                inputEl.focus();
            }
        };

        /* ---- 發送訊息 ---- */
        window.floatChatSend = function() {
            const text = inputEl.value.trim();
            if (!text) return;
            let nickname = nickEl.value.trim() || '匿名玩家';
            localStorage.setItem('fchat_nickname', nickname);

            if (!window.firebaseReady || !window.firebaseDB) {
                alert('Firebase 尚未就緒，請稍後再試');
                return;
            }

            inputEl.value = '';
            const db  = window.firebaseDB;
            const now = Date.now();
            const key = now + '_' + Math.random().toString(36).substr(2,5);
            const msgRef = window.firebaseRef(db, CHAT_DB_PATH + '/' + key);
            window.firebaseSet(msgRef, {
                uid:  MY_UID,
                name: nickname,
                text: text,
                time: now
            }).catch(e => console.warn('Chat send error:', e));

            // 發完順便清理過期訊息
            cleanupExpired();
        };

        /* ---- 初始化 Firebase 監聽 ---- */
        function initChat() {
            if (initialized) return;
            if (!window.firebaseReady || !window.firebaseDB) {
                // Firebase 尚未就緒，稍後重試
                setTimeout(initChat, 800);
                return;
            }
            initialized = true;

            const db = window.firebaseDB;
            const chatRef = window.firebaseRef(db, CHAT_DB_PATH);

            chatListener = window.firebaseOnValue(chatRef, (snapshot) => {
                const raw = [];
                snapshot.forEach(child => {
                    raw.push({ id: child.key, ...child.val() });
                });
                // 排序舊→新
                raw.sort((a, b) => a.time - b.time);

                const now = Date.now();
                const cutoff = now - MSG_TTL;
                let toKeep = raw.filter(m => m.time > cutoff);

                // 超過100則：只保留最新100則
                if (toKeep.length > MSG_MAX) {
                    const overflow = toKeep.slice(0, toKeep.length - MSG_MAX);
                    toKeep = toKeep.slice(toKeep.length - MSG_MAX);
                    // 刪除 Firebase 上多餘的訊息
                    overflow.forEach(m => {
                        window.firebaseRemove(window.firebaseRef(db, CHAT_DB_PATH + '/' + m.id)).catch(e => e);
                    });
                }

                // 刪除過期的
                raw.filter(m => m.time <= cutoff).forEach(m => {
                    window.firebaseRemove(window.firebaseRef(db, CHAT_DB_PATH + '/' + m.id)).catch(e => e);
                });

                // 計算未讀
                const hasNew = toKeep.some(m => m.time > lastReadTime && m.uid !== MY_UID);
                if (hasNew && !isOpen) {
                    const newCount = toKeep.filter(m => m.time > lastReadTime && m.uid !== MY_UID).length;
                    unreadCount = newCount;
                    badgeEl.innerText = unreadCount > 9 ? '9+' : String(unreadCount);
                    badgeEl.style.display = 'block';
                }
                if (isOpen) {
                    lastReadTime = now;
                    unreadCount = 0;
                    badgeEl.style.display = 'none';
                }

                localMessages = toKeep;
                renderMessages();
            });
        }

        /* ---- 渲染訊息 ---- */
        function renderMessages() {
            const wasAtBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 60;
            msgsEl.innerHTML = localMessages.map(m => {
                const isMe = m.uid === MY_UID;
                const t = new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (m.isSystem) {
                    return `<div class="fchat-msg-system">✨ ${escapeHtml(m.name || '')} ${escapeHtml(m.text || '')}</div>`;
                }
                return `<div class="fchat-msg-wrap ${isMe ? 'me' : 'other'}">
                    <div class="fchat-msg-meta">${escapeHtml(m.name)} <span style="opacity:0.6">${t}</span></div>
                    <div class="fchat-msg-bubble">${escapeHtml(m.text)}</div>
                </div>`;
            }).join('');
            if (wasAtBottom || isOpen) scrollToBottom();
        }

        /* ---- 定期清理過期訊息 ---- */
        function cleanupExpired() {
            if (!window.firebaseReady || !window.firebaseDB) return;
            const db = window.firebaseDB;
            const cutoff = Date.now() - MSG_TTL;
            localMessages.filter(m => m.time <= cutoff).forEach(m => {
                window.firebaseRemove(window.firebaseRef(db, CHAT_DB_PATH + '/' + m.id)).catch(e => e);
            });
        }
        setInterval(cleanupExpired, 5 * 60 * 1000); // 每5分鐘自動清理

        /* ---- 工具 ---- */
        function scrollToBottom() {
            setTimeout(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }, 40);
        }
        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* ---- 拖曳：懸浮按鈕（點擊 vs 拖曳區分）---- */
        function makeDraggable(el, handle, onClickFn) {
            const dragEl = handle || el;
            let startX, startY, origRight, origBottom, moved;
            dragEl.addEventListener('mousedown', startDrag);
            dragEl.addEventListener('touchstart', startDrag, { passive: true });

            function startDrag(e) {
                moved = false;
                const pt = e.touches ? e.touches[0] : e;
                startX = pt.clientX;
                startY = pt.clientY;
                const rect = el.getBoundingClientRect();
                origRight  = window.innerWidth  - rect.right;
                origBottom = window.innerHeight - rect.bottom;
                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('mouseup',  onEnd);
                document.addEventListener('touchend', onEnd);
            }
            function onMove(e) {
                const pt = e.touches ? e.touches[0] : e;
                const dx = pt.clientX - startX;
                const dy = pt.clientY - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
                if (!moved) return;
                if (e.cancelable) e.preventDefault();
                let newRight  = Math.max(4, Math.min(window.innerWidth  - 52, origRight  - dx));
                let newBottom = Math.max(4, Math.min(window.innerHeight - 52, origBottom - dy));
                el.style.right  = newRight  + 'px';
                el.style.bottom = newBottom + 'px';
                el.style.left   = 'auto';
                el.style.top    = 'auto';
            }
            function onEnd() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup',  onEnd);
                document.removeEventListener('touchend', onEnd);
                if (!moved && onClickFn) onClickFn();
            }
        }

        /* ---- 拖曳：面板（透過 header）---- */
        function makeDraggableFree(panelElem, handleElem) {
            let startX, startY, origLeft, origTop;
            handleElem.addEventListener('mousedown', startDrag);
            handleElem.addEventListener('touchstart', startDrag, { passive: true });

            function startDrag(e) {
                const pt = e.touches ? e.touches[0] : e;
                startX = pt.clientX;
                startY = pt.clientY;
                const rect = panelElem.getBoundingClientRect();
                origLeft = rect.left;
                origTop  = rect.top;
                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('mouseup',  onEnd);
                document.addEventListener('touchend', onEnd);
            }
            function onMove(e) {
                if (e.cancelable) e.preventDefault();
                const pt = e.touches ? e.touches[0] : e;
                const dx = pt.clientX - startX;
                const dy = pt.clientY - startY;
                let newLeft = Math.max(4, Math.min(window.innerWidth  - 40, origLeft + dx));
                let newTop  = Math.max(4, Math.min(window.innerHeight - 40, origTop  + dy));
                panelElem.style.left   = newLeft + 'px';
                panelElem.style.top    = newTop  + 'px';
                panelElem.style.right  = 'auto';
                panelElem.style.bottom = 'auto';
            }
            function onEnd() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup',  onEnd);
                document.removeEventListener('touchend', onEnd);
            }
        }

        // Firebase 就緒後自動初始化監聽（即使面板關著也預先監聽以計算未讀）
        function waitForFirebase() {
            if (window.firebaseReady && window.firebaseDB) {
                initChat();
            } else {
                setTimeout(waitForFirebase, 600);
            }
        }
        waitForFirebase();
    })();
    </script>

    <script>
        // --- Web Audio (Enhanced) ---
        const audioManager = {
            ctx: null, isMuted: true,
            bgmSequence: null, nextNoteTime: 0, currentNoteIndex: 0,
            lobbyBgmSeq: null, lobbyNoteIdx: 0, lobbyNextTime: 0,
            bgmMode: 'lobby', // 'lobby' | 'game'

            // MP3 音樂元素
            lobbyAudio: null, gameAudio: null, resultAudio: null,

            // 遊戲中緊張 BGM（快速小調）
            gameScale: [220, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440],
            gamePattern: [0,2,4,2,3,5,4,2, 1,3,5,3,2,4,3,1, 0,2,3,4,5,4,3,2, 1,2,4,5,7,5,4,2],
            gameTempo: 160,

            // 大廳溫馨 BGM（慢速和弦琶音）
            lobbyScale: [261.63, 329.63, 392.00, 523.25, 659.25],
            lobbyPattern: [0,2,1,3,2,4,-1, 0,1,2,1,0,-1,-1, 2,3,4,3,2,1,-1, 0,2,4,2,0,-1,-1],
            lobbyTempo: 60,

            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                // 初始化 MP3 Audio 元素（放在同資料夾即可）
                if (!this.lobbyAudio) {
                    this.lobbyAudio = new Audio('lobby.mp3');
                    this.lobbyAudio.loop = true;
                    this.lobbyAudio.volume = 0.5;
                    this.lobbyAudio.load();
                }
                if (!this.gameAudio) {
                    this.gameAudio = new Audio('battle.mp3');
                    this.gameAudio.loop = true;
                    this.gameAudio.volume = 0.5;
                    this.gameAudio.load();
                }
                if (!this.resultAudio) {
                    this.resultAudio = new Audio('result.mp3');
                    this.resultAudio.loop = true;
                    this.resultAudio.volume = 0.5;
                    this.resultAudio.load();
                }
            },

            // 嘗試播放 mp3，若失敗則用 Web Audio 合成
            _tryPlayMp3(audio, fallbackFn) {
                if (this.isMuted) return;
                const p = audio.play();
                if (p !== undefined) {
                    p.catch(() => { fallbackFn(); });
                }
            },
            _stopMp3(audio) {
                try { audio.pause(); audio.currentTime = 0; } catch(e) {}
            },

            toggle() {
                this.init(); if (this.ctx.state === 'suspended') this.ctx.resume();
                this.isMuted = !this.isMuted;
                const btn = document.querySelector('#btn-audio i');
                if(btn) btn.className = this.isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
                const lobbyBtn = document.querySelector('#lobby-audio-btn i');
                if(lobbyBtn) lobbyBtn.className = this.isMuted ? 'fas fa-volume-mute text-base' : 'fas fa-volume-up text-base';
                if (this.isMuted) { this.stopBGM(); this.stopLobbyBGM(); this.stopResultBGM(); }
                else {
                    this.playSFX('select');
                    if (this.bgmMode === 'lobby') this.startLobbyBGM();
                    else if (this.bgmMode === 'result') this.switchToResultBGM();
                    else this.startBGM();
                }
            },

            createNote(freq, time, vol=0.08, type='sine', decay=1.2) {
                if(this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + decay);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(time); osc.stop(time + decay + 0.1);
            },

            playSFX(event) {
                if(this.isMuted || !this.ctx) return;
                const t = this.ctx.currentTime;
                if(event==='click') this.createNote(392, t, 0.1, 'sine', 0.15);
                else if(event==='select') this.createNote(523.25, t, 0.12, 'sine', 0.2);
                else if(event==='card') { // 抽牌音效
                    this.createNote(880, t, 0.06, 'sine', 0.08);
                    this.createNote(1046.5, t+0.05, 0.05, 'sine', 0.1);
                }
                else if(event==='correct') {
                    [523.25,659.25,783.99,1046.5].forEach((f,i) => this.createNote(f, t+i*0.09, 0.15, 'sine', 0.4));
                }
                else if(event==='wrong') {
                    // 低沉蜂鳴
                    const osc=this.ctx.createOscillator(), g=this.ctx.createGain();
                    osc.type='sawtooth'; osc.frequency.setValueAtTime(180,t); osc.frequency.exponentialRampToValueAtTime(60,t+0.4);
                    g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
                    osc.connect(g); g.connect(this.ctx.destination); osc.start(t); osc.stop(t+0.5);
                    // 加上裂碎聲
                    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.3,this.ctx.sampleRate);
                    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
                    const src=this.ctx.createBufferSource(), g2=this.ctx.createGain();
                    src.buffer=buf; g2.gain.setValueAtTime(0.08,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
                    src.connect(g2); g2.connect(this.ctx.destination); src.start(t);
                }
                else if(event==='gameover') {
                    // 遊戲結束：下降音階
                    [523.25,466.16,415.30,369.99,329.63,293.66,261.63].forEach((f,i)=>
                        this.createNote(f, t+i*0.12, 0.15, 'triangle', 0.3));
                }
                else if(event==='win') {
                    [261.63,329.63,392.00,523.25,659.25,783.99,1046.50,1318.51].forEach((f,i)=>
                        this.createNote(f, t+i*0.07, 0.18, 'sine', 0.5));
                }
                else if(event==='lobby_enter') {
                    [523.25,659.25,783.99].forEach((f,i) => this.createNote(f, t+i*0.1, 0.1, 'sine', 0.6));
                }
            },

            // 大廳 BGM
            scheduleLobbyNote() {
                while(this.lobbyNextTime < this.ctx.currentTime + 0.1) {
                    let n = this.lobbyPattern[this.lobbyNoteIdx];
                    if(n !== -1) {
                        const f = this.lobbyScale[n];
                        this.createNote(f, this.lobbyNextTime, 0.04, 'sine', 1.5);
                        // 加和聲
                        if(n+2 < this.lobbyScale.length) this.createNote(this.lobbyScale[n+2]*0.5, this.lobbyNextTime, 0.02, 'sine', 2.0);
                    }
                    this.lobbyNextTime += 60.0 / this.lobbyTempo;
                    this.lobbyNoteIdx = (this.lobbyNoteIdx+1) % this.lobbyPattern.length;
                }
                this.lobbyBgmSeq = requestAnimationFrame(() => this.scheduleLobbyNote());
            },
            startLobbyBGM() {
                if(this.isMuted) return;
                this.stopLobbyBGM(); this.stopBGM();
                this.bgmMode='lobby';
                if(this.lobbyAudio) {
                    const p = this.lobbyAudio.play();
                    if(p !== undefined) p.catch(() => {
                        // mp3 不存在，改用 Web Audio 合成
                        if(!this.ctx) return;
                        this.lobbyNextTime = this.ctx.currentTime + 0.1;
                        this.lobbyNoteIdx = 0;
                        this.scheduleLobbyNote();
                    });
                } else if(this.ctx) {
                    this.lobbyNextTime = this.ctx.currentTime + 0.1;
                    this.lobbyNoteIdx = 0;
                    this.scheduleLobbyNote();
                }
            },
            stopLobbyBGM() {
                if(this.lobbyBgmSeq) { cancelAnimationFrame(this.lobbyBgmSeq); this.lobbyBgmSeq=null; }
                if(this.lobbyAudio) { try { this.lobbyAudio.pause(); this.lobbyAudio.currentTime=0; } catch(e){} }
            },

            // 遊戲 BGM（緊張）
            scheduleNote() {
                while(this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    let n = this.gamePattern[this.currentNoteIndex];
                    if(n !== -1) {
                        const f = this.gameScale[n];
                        this.createNote(f, this.nextNoteTime, 0.035, 'square', 0.18);
                        // 低頻鼓點
                        if(this.currentNoteIndex % 8 === 0) {
                            const d=this.ctx.createOscillator(), dg=this.ctx.createGain();
                            d.type='sine'; d.frequency.setValueAtTime(80,this.nextNoteTime); d.frequency.exponentialRampToValueAtTime(40,this.nextNoteTime+0.1);
                            dg.gain.setValueAtTime(0.12,this.nextNoteTime); dg.gain.exponentialRampToValueAtTime(0.001,this.nextNoteTime+0.15);
                            d.connect(dg); dg.connect(this.ctx.destination); d.start(this.nextNoteTime); d.stop(this.nextNoteTime+0.2);
                        }
                        // 拍板 hi-hat
                        if(this.currentNoteIndex % 4 === 2) {
                            const buf=this.ctx.createBuffer(1,Math.floor(this.ctx.sampleRate*0.05),this.ctx.sampleRate);
                            const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1);
                            const s=this.ctx.createBufferSource(), hg=this.ctx.createGain(), hf=this.ctx.createBiquadFilter();
                            s.buffer=buf; hf.type='highpass'; hf.frequency.value=8000;
                            hg.gain.setValueAtTime(0.05,this.nextNoteTime); hg.gain.exponentialRampToValueAtTime(0.001,this.nextNoteTime+0.05);
                            s.connect(hf); hf.connect(hg); hg.connect(this.ctx.destination); s.start(this.nextNoteTime);
                        }
                    }
                    this.nextNoteTime += 60.0 / this.gameTempo;
                    this.currentNoteIndex = (this.currentNoteIndex+1) % this.gamePattern.length;
                }
                this.bgmSequence = requestAnimationFrame(() => this.scheduleNote());
            },
            startBGM() {
                if(this.isMuted) return;
                this.stopLobbyBGM(); this.stopBGM();
                this.bgmMode='game';
                if(this.gameAudio) {
                    const p = this.gameAudio.play();
                    if(p !== undefined) p.catch(() => {
                        // mp3 不存在，改用 Web Audio 合成
                        if(!this.ctx) return;
                        this.nextNoteTime = this.ctx.currentTime + 0.1;
                        this.currentNoteIndex = 0;
                        this.scheduleNote();
                    });
                } else if(this.ctx) {
                    this.nextNoteTime = this.ctx.currentTime + 0.1;
                    this.currentNoteIndex = 0;
                    this.scheduleNote();
                }
            },
            stopBGM() {
                if(this.bgmSequence) { cancelAnimationFrame(this.bgmSequence); this.bgmSequence=null; }
                if(this.gameAudio) { try { this.gameAudio.pause(); this.gameAudio.currentTime=0; } catch(e){} }
            },
            stopResultBGM() {
                if(this.resultAudio) { try { this.resultAudio.pause(); this.resultAudio.currentTime=0; } catch(e){} }
            },

            switchToGameBGM() { this.stopLobbyBGM(); this.stopResultBGM(); if(!this.isMuted) { if(this.ctx) this.ctx.resume().then(()=>this.startBGM()); else this.startBGM(); } },
            switchToLobbyBGM() { this.stopBGM(); this.stopResultBGM(); if(!this.isMuted) { if(this.ctx) this.ctx.resume().then(()=>this.startLobbyBGM()); else this.startLobbyBGM(); } },
            switchToResultBGM() {
                this.stopBGM(); this.stopLobbyBGM();
                this.bgmMode = 'result';
                if(this.isMuted || !this.resultAudio) return;
                if(this.ctx) this.ctx.resume().catch(()=>{});
                const p = this.resultAudio.play();
                if(p !== undefined) p.catch(()=>{});
            }
        };


        // --- 全螢幕與狀態 ---
        async function requestStartGame() {

        const wikiImageCache = {}; const fetchingWiki = new Set();
        const noPicSvg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='200' viewBox='0 0 150 200'><rect width='150' height='200' fill='%231e293b'/><text x='75' y='110' font-family='sans-serif' font-size='12' text-anchor='middle' fill='%2364748b'>史料無影像</text></svg>";
        // 預先為所有卡牌觸發圖片載入（圖鑑打開時呼叫）
        function prefetchAllWikiImages() {
            ALL_CARDS.forEach(c => { if (c.wiki) renderWikiImage(c.wiki); });
        }
        function renderWikiImage(wikiTitle) {
            if (!wikiTitle) return noPicSvg;
            if (wikiImageCache[wikiTitle]) return wikiImageCache[wikiTitle];
            if (!fetchingWiki.has(wikiTitle)) {
                fetchingWiki.add(wikiTitle);
                // 嘗試取得 original 大圖 + thumbnail 備援
                fetch(`https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=400&piprop=thumbnail%7Coriginal&origin=*`)
                    .then(res => res.json()).then(data => {
                        const pid = Object.keys(data.query.pages)[0];
                        const page = data.query.pages[pid];
                        const src = page?.original?.source || page?.thumbnail?.source;
                        if (src) {
                            wikiImageCache[wikiTitle] = src;
                            document.querySelectorAll(`img[data-wiki="${wikiTitle}"]`).forEach(img => { img.src = src; img.style.opacity = '1'; });
                        } else {
                            // 備援：從 images 列表抓第一張圖片
                            fetch(`https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=images&format=json&imlimit=5&origin=*`)
                                .then(r => r.json()).then(d2 => {
                                    const p2 = d2.query.pages[Object.keys(d2.query.pages)[0]];
                                    const imgs = (p2?.images || []).filter(im => /\.(jpg|jpeg|png|webp)/i.test(im.title));
                                    if (!imgs.length) { wikiImageCache[wikiTitle] = noPicSvg; return; }
                                    fetch(`https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(imgs[0].title)}&prop=imageinfo&iiprop=url&format=json&iiurlwidth=400&origin=*`)
                                        .then(r => r.json()).then(d3 => {
                                            const fp = d3.query.pages[Object.keys(d3.query.pages)[0]];
                                            const url = fp?.imageinfo?.[0]?.thumburl || fp?.imageinfo?.[0]?.url || noPicSvg;
                                            wikiImageCache[wikiTitle] = url;
                                            document.querySelectorAll(`img[data-wiki="${wikiTitle}"]`).forEach(img => { img.src = url; img.style.opacity = '1'; });
                                        }).catch(() => { wikiImageCache[wikiTitle] = noPicSvg; });
                                }).catch(() => { wikiImageCache[wikiTitle] = noPicSvg; });
                        }
                    }).catch(() => { wikiImageCache[wikiTitle] = noPicSvg; });
            }
            return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='200' viewBox='0 0 150 200'><rect width='150' height='200' fill='%230f172a'/><text x='75' y='105' font-family='sans-serif' font-size='10' text-anchor='middle' fill='%2364748b'>載入中...</text></svg>";
        }


        // --- 178 題完整歷史題庫 ---
        const ALL_PERIODS = [
            { id: 'prehistoric', name: '史前時代' }, { id: 'dutch', name: '荷西時期' }, 
            { id: 'ming', name: '明鄭時期' }, { id: 'qing', name: '清治時期' }, 
            { id: 'japanese', name: '日治時期' }, { id: 'modern', name: '戰後與現代' }
        ];


        const ALL_CARDS = [
            // ══ 史前與原住民族時期 ══
            { id: 1, title: '長濱文化', year: -50000, period: 'prehistoric', level: 1, wiki: '長濱文化', desc: '台灣已知最早的舊石器時代遺址，採集漁獵為主，課本常用此說明遠古人類生活。' },
            { id: 2, title: '圓山文化', year: -3500, period: 'prehistoric', level: 1, wiki: '圓山遺址', desc: '新石器時代代表遺址，以貝塚與玉器聞名，約距今3,000至5,000年前。' },
            { id: 3, title: '十三行文化', year: -200, period: 'prehistoric', level: 1, wiki: '十三行遺址', desc: '鐵器時代代表，有煉鐵作坊與玻璃器等外來物品，距今約1,800至500年前。' },
            { id: 4, title: '陳第《東番記》', year: 1603, period: 'prehistoric', level: 2, wiki: '東番記', desc: '明朝文人陳第隨軍來台，撰寫《東番記》，記錄西南部平埔族群生活，是早期漢人的文字紀錄。' },
            { id: 91, title: '大坌坑文化', year: -5000, period: 'prehistoric', level: 2, wiki: '大坌坑文化', desc: '台灣最早且分布最廣的新石器時代早期文化，以粗繩紋陶器為特徵，被認為與南島語族起源有密切關聯。' },
            { id: 92, title: '卑南文化', year: -2500, period: 'prehistoric', level: 2, wiki: '卑南遺址', desc: '台東卑南遺址所代表的新石器時代晚期文化，以石板棺與精美玉器聞名，為台灣規模最大的史前聚落之一。' },
            { id: 93, title: '芝山岩文化', year: -2000, period: 'prehistoric', level: 2, wiki: '芝山岩遺址', desc: '台北士林的史前遺址，包含多層文化堆積，涵蓋新石器時代至鐵器時代，反映台北盆地悠久的人類居住歷史。' },
            { id: 94, title: '麒麟文化（石棺文化）', year: -1500, period: 'prehistoric', level: 3, wiki: '麒麟文化', desc: '台灣東海岸花蓮、台東一帶的新石器時代晚期文化，以大型石棺墓葬聞名，與後來的阿美族文化有傳承關聯。' },
            { id: 95, title: '南島語族擴散', year: -4000, period: 'prehistoric', level: 2, wiki: '南島語系', desc: '學術界普遍認為台灣是南島語族的發源地之一，原住民族語言保留了大量古老特徵，對研究太平洋民族遷徙有重大意義。' },
            { id: 96, title: '平埔族群分布形成', year: 1000, period: 'prehistoric', level: 2, wiki: '平埔族群', desc: '台灣西部、北部平原形成多元平埔族群聚落，包括西拉雅、道卡斯、巴宰、凱達格蘭等，各有獨特語言與社會制度。' },
            { id: 97, title: '高山原住民族社會形成', year: 500, period: 'prehistoric', level: 2, wiki: '台灣原住民族', desc: '台灣山地形成泰雅、賽夏、布農、鄒、排灣、魯凱、阿美、卑南、達悟等多個族群，各有獨特的社會組織與文化習俗。' },
            { id: 98, title: '琉球原人遺骨', year: -30000, period: 'prehistoric', level: 3, wiki: '左鎮人', desc: '台南左鎮出土的「左鎮人」骨骸，距今約2至3萬年，為台灣目前已知最早的人類化石，可能代表台灣最古老的人類族群。' },
            { id: 99, title: '鳳鼻頭文化', year: -3000, period: 'prehistoric', level: 3, wiki: '鳳鼻頭遺址', desc: '高雄鳳鼻頭遺址代表台灣西南部的新石器時代文化，出土豐富的彩陶與素面陶，是研究台灣南部史前文化的重要遺址。' },
            { id: 100, title: '阿美族漁獵社會', year: 800, period: 'prehistoric', level: 2, wiki: '阿美族', desc: '台灣東部阿美族發展出以母系氏族為核心的社會制度，豐年祭為重要的文化儀式，族人善於漁獵與農耕，是台灣人口最多的原住民族。' },
            { id: 101, title: '排灣族百步蛇信仰', year: 600, period: 'prehistoric', level: 2, wiki: '排灣族', desc: '排灣族形成以貴族制度為核心的社會體系，崇拜百步蛇為祖先象徵，精緻的木雕、陶壺與刺繡是其文化代表，也保有連杯共飲的婚禮習俗。' },
            { id: 102, title: '原住民族與漢人初接觸', year: 1550, period: 'prehistoric', level: 2, wiki: '台灣原住民族', desc: '16世紀中葉，中國閩南漁民與商人開始較頻繁接觸台灣平埔族群，雙方逐漸形成貿易往來關係，是漢原交流的早期紀錄。' },
            { id: 103, title: '達悟族拼板舟文化', year: 700, period: 'prehistoric', level: 2, wiki: '達悟族', desc: '蘭嶼達悟族（雅美族）發展出精湛的拼板舟建造技術，每年舉行飛魚祭迎接飛魚季，形成獨特的海洋文化，是台灣原住民族中唯一定居離島的族群。' },
            { id: 104, title: '賽德克族出草習俗', year: 900, period: 'prehistoric', level: 3, wiki: '賽德克族', desc: '台灣中部山地賽德克族（今獨立認定）形成獨特的「出草」獵首文化，以Gaya（祖訓法則）為最高行為準則，後來在霧社事件中留下歷史印記。' },
            { id: 105, title: '台灣原住民族農業技術', year: 300, period: 'prehistoric', level: 2, wiki: '台灣原住民族', desc: '台灣原住民族在各地發展出適應當地環境的農耕技術，包括小米、芋頭、地瓜等作物的栽培，形成各族群特有的農耕祭儀文化。' },
            { id: 106, title: '布農族八部合音', year: 1000, period: 'prehistoric', level: 2, wiki: '布農族', desc: '台灣中央山脈布農族發展出世界罕見的「八部合音」祈禱小米豐收歌，此音樂形式曾在1943年被日本學者錄音，震驚世界音樂學界。' },

            // ══ 大航海與荷西時期 ══
            { id: 5, title: '葡萄牙人稱台灣為Formosa', year: 1544, period: 'dutch', level: 1, wiki: '福爾摩沙', desc: '葡萄牙船隻經過台灣，驚呼「Formosa」（福爾摩沙），台灣因此登上國際舞台。' },
            { id: 6, title: '荷蘭人占領澎湖', year: 1622, period: 'dutch', level: 2, wiki: '荷蘭統治台灣時期', desc: '荷蘭人先占領澎湖，遭到明朝軍隊驅逐，之後轉往台灣南部建立據點。' },
            { id: 7, title: '荷蘭建熱蘭遮城', year: 1624, period: 'dutch', level: 1, wiki: '熱蘭遮城', desc: '荷蘭人轉往台灣南部大員，建立熱蘭遮城（今安平古堡）與普羅民遮城（今赤崁樓），開啟殖民統治。' },
            { id: 8, title: '西班牙人占領北台灣', year: 1626, period: 'dutch', level: 1, wiki: '西班牙統治台灣時期', desc: '西班牙人從台灣東北角登陸，占領北部，在基隆興建聖薩爾瓦多城。' },
            { id: 9, title: '西班牙建聖多明哥城', year: 1628, period: 'dutch', level: 2, wiki: '聖多明哥城 (台灣)', desc: '西班牙人進軍淡水，興建聖多明哥城（今紅毛城前身），控制北台灣。' },
            { id: 10, title: '新港文書創立', year: 1636, period: 'dutch', level: 2, wiki: '新港文書', desc: '荷蘭傳教士在「新港社」創立學校，用拉丁字母拼寫西拉雅族語言，此文字後被稱為「新港文書」（番仔契）。' },
            { id: 11, title: '荷蘭驅逐西班牙統一台灣', year: 1642, period: 'dutch', level: 1, wiki: '基隆 (荷西時代)', desc: '荷蘭人北上進攻淡水，擊敗西班牙人，結束西班牙在台16年的統治，荷蘭人統一全台主要據點。' },
            { id: 12, title: '郭懷一起義抗荷', year: 1652, period: 'dutch', level: 2, wiki: '郭懷一事件', desc: '漢人墾首郭懷一因不滿荷蘭人苛徵重稅，率領漢人農民起義抗荷，最後失敗。' },
            { id: 107, title: '荷蘭東印度公司（VOC）成立', year: 1602, period: 'dutch', level: 2, wiki: '荷蘭東印度公司', desc: '荷蘭聯合東印度公司（VOC）成立，成為歷史上首家跨國公司，負責對亞洲的貿易與殖民擴張，是後來進占台灣的幕後推手。' },
            { id: 108, title: '荷蘭占領大員建普羅民遮城', year: 1625, period: 'dutch', level: 2, wiki: '普羅民遮城', desc: '荷蘭人在大員（今台南）對岸興建普羅民遮城（今赤崁樓前身），作為行政中心與商業據點，與熱蘭遮城形成一體兩翼的統治格局。' },
            { id: 109, title: '荷蘭推行贌社制度', year: 1630, period: 'dutch', level: 3, wiki: '荷蘭統治台灣時期', desc: '荷蘭殖民當局推行「贌社」（Pacht）制度，將與原住民村社貿易的壟斷權公開標售給漢人商人，形成特殊的殖民經濟體制。' },
            { id: 110, title: '荷蘭推行鹿皮貿易', year: 1632, period: 'dutch', level: 2, wiki: '荷蘭統治台灣時期', desc: '荷蘭時期大量收購台灣梅花鹿皮革，並出口至日本換取銀兩，全盛時期年出口量達十餘萬張，造成台灣梅花鹿後來急遽減少。' },
            { id: 111, title: '荷蘭招募漢人移民開墾', year: 1635, period: 'dutch', level: 2, wiki: '荷蘭統治台灣時期', desc: '荷蘭人積極招募中國閩南漢人渡台從事農業開墾，並徵收人頭稅（每人每月0.25里爾），漢人移民人口因此大幅增加，奠定台灣漢人社會基礎。' },
            { id: 112, title: '麻豆社事件', year: 1629, period: 'dutch', level: 3, wiki: '麻豆溪事件', desc: '荷蘭士兵在麻豆社遭到原住民伏擊全滅（約60人），荷蘭人隨後派兵報復，焚毀麻豆社，此後原住民逐漸被納入荷蘭統治範圍。' },
            { id: 113, title: '荷蘭征服南部原住民聯盟', year: 1636, period: 'dutch', level: 2, wiki: '荷蘭統治台灣時期', desc: '荷蘭召開「地方集會」（Landdag），南台灣各平埔族部落代表到場，象徵性地接受荷蘭統治，荷蘭正式確立對南台灣的政治控制。' },
            { id: 114, title: '荷蘭在台傳教活動', year: 1627, period: 'dutch', level: 2, wiki: '荷蘭統治台灣時期', desc: '荷蘭改革宗教會傳教士干治士（Georgius Candidius）抵台，開始在西拉雅族傳播基督教，並學習原住民語言，是台灣基督教傳播的起點。' },
            { id: 115, title: '荷蘭時期甘蔗種植推廣', year: 1640, period: 'dutch', level: 2, wiki: '荷蘭統治台灣時期', desc: '荷蘭人引進中國農民大規模種植甘蔗，並設立糖廠，台灣砂糖開始大量出口至日本與波斯灣，奠定台灣此後農業生產的基礎模式。' },
            { id: 116, title: '荷蘭時期課徵人頭稅', year: 1633, period: 'dutch', level: 3, wiki: '荷蘭統治台灣時期', desc: '荷蘭當局對在台灣的漢人課徵人頭稅與各種雜稅，漢人因此積怨，成為後來郭懷一起義的社會背景。' },
            { id: 117, title: '荷蘭時期台灣米糧出口', year: 1645, period: 'dutch', level: 3, wiki: '荷蘭統治台灣時期', desc: '荷蘭人推動水稻種植，台灣稻米開始出口至日本與印尼，台灣逐漸成為荷蘭亞洲貿易網絡中重要的糧食供應基地。' },
            { id: 118, title: '荷蘭征服北台灣原住民', year: 1644, period: 'dutch', level: 3, wiki: '荷蘭統治台灣時期', desc: '荷蘭驅逐西班牙後，繼續向北台灣原住民部落推進，召開北台地方集會，宜蘭、淡水一帶部落代表亦被納入荷蘭統治體系。' },

            // ══ 明鄭時期 ══
            { id: 13, title: '鄭成功登陸鹿耳門', year: 1661, period: 'ming', level: 1, wiki: '鄭成功', desc: '鄭成功率領大軍在鹿耳門登陸，圍攻熱蘭遮城，為驅逐荷蘭人的關鍵行動。' },
            { id: 14, title: '荷蘭人撤離台灣', year: 1662, period: 'ming', level: 1, wiki: '鄭成功攻台之役', desc: '荷蘭長官揆一簽字投降，撤離台灣，結束荷蘭38年的統治；同年鄭成功病逝，鄭經繼位。' },
            { id: 15, title: '台南孔廟（全台首學）', year: 1666, period: 'ming', level: 1, wiki: '臺南孔子廟', desc: '諮議參軍陳永華輔政，在台南興建孔廟（今台南孔子廟），被譽為「全臺首學」，並設立學校發展教育。' },
            { id: 16, title: '施琅攻澎湖鄭氏滅亡', year: 1683, period: 'ming', level: 1, wiki: '施琅', desc: '清朝康熙皇帝派施琅率軍進攻澎湖，擊敗鄭氏海軍，鄭克塽投降，鄭氏三代在台21年的統治結束。' },
            { id: 119, title: '鄭芝龍降清', year: 1646, period: 'ming', level: 2, wiki: '鄭芝龍', desc: '鄭成功之父鄭芝龍降清，鄭成功痛斥其背明，自此分道揚鑣，鄭成功以「招討大將軍」號令舊部，誓死抗清，台灣命運由此改變。' },
            { id: 120, title: '鄭成功金廈抗清', year: 1651, period: 'ming', level: 2, wiki: '鄭成功', desc: '鄭成功以金門、廈門為根據地，多次北伐抗清，於南京之役失利後，始將目光轉向台灣作為反清復明的根據地。' },
            { id: 121, title: '鄭成功北伐南京失利', year: 1659, period: 'ming', level: 2, wiki: '鄭成功', desc: '鄭成功率大軍北伐，一度攻至南京城下，卻因輕敵中計慘敗撤退，此後決心攻取台灣作為長期抗清基地。' },
            { id: 122, title: '鄭氏設承天府', year: 1661, period: 'ming', level: 2, wiki: '承天府', desc: '鄭成功攻台後，廢除荷蘭行政體系，改設「承天府」（今台南市）作為行政中心，並設天興、萬年二縣，奠定台灣行政區劃基礎。' },
            { id: 123, title: '陳永華治台推行屯田', year: 1663, period: 'ming', level: 2, wiki: '陳永華', desc: '鄭成功死後，陳永華輔佐鄭經推行屯田制度，讓士兵亦農亦兵，開墾荒地，穩定台灣糧食供給，是明鄭時期最重要的施政之一。' },
            { id: 124, title: '鄭經與三藩聯手反清', year: 1673, period: 'ming', level: 3, wiki: '三藩之亂', desc: '三藩之亂爆發，鄭經趁機出兵攻占閩粵沿海，一度控制廈門等地，但最終三藩戰敗，鄭經被迫退回台灣，大陸反清夢碎。' },
            { id: 125, title: '鄭氏台灣製糖與對外貿易', year: 1665, period: 'ming', level: 2, wiki: '明鄭時期', desc: '明鄭時期延續荷蘭時代的製糖業，並與日本、英國東印度公司進行貿易，以砂糖、鹿皮等換取武器銀兩，維持政權的財政運作。' },
            { id: 126, title: '鄭氏廢東寧王國', year: 1664, period: 'ming', level: 3, wiki: '東寧王國', desc: '鄭成功死後，鄭經初稱「東都明京」，後改稱「東寧」，雖未正式稱王，但實際上已在台灣建立獨立政權，史稱「東寧王國」。' },
            { id: 127, title: '鄭氏與英國東印度公司貿易', year: 1670, period: 'ming', level: 3, wiki: '明鄭時期', desc: '鄭經與英國東印度公司達成貿易協議，允許英國在台灣設立商館，是台灣歷史上最早與西方國家締結正式貿易關係的事例之一。' },
            { id: 128, title: '鄭克塽繼位', year: 1681, period: 'ming', level: 2, wiki: '鄭克塽', desc: '鄭經去世，其子鄭克塽年幼繼位，政局動盪，馮錫範等人掌握實權，鄭氏政權內部矛盾加劇，最終無力抵抗清朝進攻。' },
            { id: 129, title: '明鄭時期製鹽業發展', year: 1665, period: 'ming', level: 3, wiki: '明鄭時期', desc: '陳永華在台南地區設置鹽田（七股等地），組織生產食鹽，供應台灣本島需求並出口貿易，奠定台南鹽業的基礎。' },
            { id: 130, title: '鄭成功設六官制度', year: 1661, period: 'ming', level: 3, wiki: '明鄭時期', desc: '鄭成功參照明朝中央政府體制，在台灣設立「六官」（吏、戶、禮、兵、刑、工）行政體系，是台灣首次建立系統化政府制度。' },
            { id: 131, title: '鄭氏台灣傳入漢文化', year: 1662, period: 'ming', level: 2, wiki: '明鄭時期', desc: '大批閩南移民隨鄭成功軍隊來台，帶來漢人農耕技術、語言文字、民間信仰（媽祖、王爺等），深刻影響台灣漢文化的奠基。' },
            { id: 132, title: '清廷康熙積極謀取台灣', year: 1678, period: 'ming', level: 2, wiki: '施琅', desc: '康熙皇帝重用施琅，積極謀劃攻台，多次籌備水師，對台灣形成軍事壓力。施琅深諳閩南海域地理，成為清廷攻台的關鍵人物。' },
            { id: 133, title: '澎湖海戰（施琅決戰）', year: 1683, period: 'ming', level: 2, wiki: '澎湖海戰 (1683年)', desc: '施琅率清朝水師在澎湖海域大破鄭氏海軍，此役為鄭氏政權滅亡的直接原因，施琅水軍的勝利奠定清廷統一台灣的基礎。' },

            // ══ 清帝國時期 ══
            { id: 17, title: '清廷設台灣府', year: 1684, period: 'qing', level: 1, wiki: '臺灣府', desc: '清廷將台灣納入版圖，設「台灣府」，隸屬於福建省；同時頒布渡台禁令限制移民。' },
            { id: 18, title: '陳賴章開墾大加蚋', year: 1709, period: 'qing', level: 2, wiki: '陳賴章', desc: '陳賴章墾號開始大規模開墾大加蚋地區（今台北市中心），象徵漢人開墾重心北移。' },
            { id: 19, title: '八堡圳完工', year: 1719, period: 'qing', level: 2, wiki: '八堡圳', desc: '彰化八堡圳完工（施世榜籌建），是早期台灣最大的水利工程。' },
            { id: 20, title: '朱一貴事件與六堆', year: 1721, period: 'qing', level: 2, wiki: '朱一貴事件', desc: '南部漢人起義事件，南部客家居民為了自保組成「六堆」義民軍，是清代重要社會動盪背景。' },
            { id: 21, title: '鹿港開港通商', year: 1784, period: 'qing', level: 2, wiki: '鹿港', desc: '清廷正式開放彰化「鹿港」與福建泉州對渡通商，進入「一府二鹿」黃金興起年代。' },
            { id: 22, title: '林爽文事件', year: 1786, period: 'qing', level: 2, wiki: '林爽文事件', desc: '爆發林爽文事件，清代分類械鬥、社會動盪與地方義民廟興起的重要背景。' },
            { id: 23, title: '一府二鹿三艋舺確立', year: 1788, period: 'qing', level: 1, wiki: '艋舺', desc: '「艋舺」開港與貿易興盛，與一府、二鹿並列，確立了「一府二鹿三艋舺」的台灣開發史格局。' },
            { id: 24, title: '台灣開港通商', year: 1860, period: 'qing', level: 1, wiki: '天津條約', desc: '清朝因英法聯軍戰敗簽訂《天津條約》，台灣正式開港通商，陸續開放基隆、淡水、安平、打狗四港。' },
            { id: 25, title: '馬雅各醫生來台', year: 1865, period: 'qing', level: 2, wiki: '馬雅各', desc: '英國長老教會傳教士馬雅各醫生來到台南傳教與行醫，將西方新式醫療傳入南部。' },
            { id: 26, title: '馬偕博士來淡水', year: 1872, period: 'qing', level: 1, wiki: '馬偕', desc: '加拿大長老教會傳教士馬偕博士來到淡水，在北部展開傳教、拔牙醫療與教育工作。' },
            { id: 27, title: '牡丹社事件', year: 1874, period: 'qing', level: 1, wiki: '牡丹社事件', desc: '日本藉口琉球漁民遇害，發動兵力進攻台灣南部原住民，清廷震驚，促使重視台灣防務。' },
            { id: 28, title: '沈葆楨廢渡台禁令', year: 1875, period: 'qing', level: 2, wiki: '沈葆楨', desc: '沈葆楨奉命來台辦理防務，正式廢除渡臺禁令，允許漢人攜家帶眷來台，並實施「開山撫番」。' },
            { id: 29, title: '滬尾偕醫館創立', year: 1880, period: 'qing', level: 2, wiki: '馬偕醫院', desc: '馬偕博士在淡水創立「滬尾偕醫館」，即台灣北部第一所西醫醫院。' },
            { id: 30, title: '牛津學堂創立', year: 1882, period: 'qing', level: 2, wiki: '理學堂大書院', desc: '馬偕博士在淡水創立「理學堂大書院」（牛津學堂），引進西方科學教育。' },
            { id: 31, title: '清法戰爭台灣戰役', year: 1884, period: 'qing', level: 1, wiki: '清法戰爭', desc: '清法戰爭爆發，法軍進攻基隆與淡水，清廷派遣劉銘傳來台督戰，體認到台灣戰略地位的關鍵重要性。' },
            { id: 32, title: '台灣正式建省', year: 1885, period: 'qing', level: 1, wiki: '台灣省', desc: '因前一年清法戰爭的刺激，清廷慈禧太后下詔，台灣正式宣布建省，劉銘傳任首任巡撫。' },
            { id: 33, title: '劉銘傳推動現代化建設', year: 1887, period: 'qing', level: 2, wiki: '劉銘傳', desc: '劉銘傳就任台灣巡撫，開始全面推動現代化建設，包括郵政、電報、西式學堂等。' },
            { id: 34, title: '基隆至台北鐵路通車', year: 1891, period: 'qing', level: 1, wiki: '臺灣鐵路歷史', desc: '劉銘傳主導的台灣第一條鐵路「基隆至台北段」正式完工通車。' },
            { id: 35, title: '台北至新竹鐵路通車', year: 1893, period: 'qing', level: 2, wiki: '臺灣鐵路歷史', desc: '鐵路進一步延伸完工「台北至新竹段」，此後因劉銘傳去職與經費問題暫告中斷。' },
            { id: 36, title: '甲午戰爭', year: 1894, period: 'qing', level: 1, wiki: '甲午戰爭', desc: '清朝與日本因朝鮮問題爆發甲午戰爭，清軍大敗，導致隔年馬關條約割讓台灣。' },

            // ══ 日治時期 ══
            { id: 37, title: '馬關條約割讓台灣', year: 1895, month: 4, period: 'japanese', level: 1, wiki: '馬關條約', desc: '清廷與日本簽訂《馬關條約》，割讓台灣與澎湖，開啟50年的日治時期。' },
            { id: 38, title: '台灣民主國抗日失敗', year: 1895, month: 5, period: 'japanese', level: 1, wiki: '臺灣民主國', desc: '台灣仕紳成立「臺灣民主國」抗日失敗，唐景崧、劉永福逃離，日軍入主台北城。' },
            { id: 39, title: '國語傳習所設立', year: 1896, period: 'japanese', level: 2, wiki: '國語傳習所', desc: '日本總督府在芝山巖成立「國語傳習所」，開始推廣日語教育；同年引進「西部標準時」。' },
            { id: 40, title: '台灣總督府醫學校設立', year: 1899, period: 'japanese', level: 2, wiki: '國立臺灣大學醫學院', desc: '台灣總督府開辦「臺灣總督府臺北師範學校」與「醫學校」，培養本土教師與醫生。' },
            { id: 41, title: '第一次現代戶口調查', year: 1905, period: 'japanese', level: 2, wiki: '臺灣日治時期', desc: '台灣實施第一次現代戶口調查（人口普查），總督府藉此嚴密掌控台灣社會人口與治安。' },
            { id: 42, title: '台灣縱貫鐵路全線通車', year: 1908, period: 'japanese', level: 1, wiki: '縱貫線 (台灣)', desc: '台灣縱貫鐵路（基隆至高雄）全線完工通車，南北「一日生活圈」雛形出現。' },
            { id: 43, title: '噍吧哖事件', year: 1915, period: 'japanese', level: 1, wiki: '噍吧哖事件', desc: '余清芳在台南發動噍吧哖事件（西來庵事件），此為漢人規模最大、也是最後一次的武裝抗日事件。此後抗日方式轉向非武裝。' },
            { id: 44, title: '台灣總督府廳舍落成', year: 1919, period: 'japanese', level: 2, wiki: '臺灣總督府廳舍', desc: '台灣總督府新廳舍（今中華民國總統府建築）落成啟用；同年市區改正計畫逐步落實。' },
            { id: 45, title: '五州二廳行政區劃', year: 1920, period: 'japanese', level: 2, wiki: '臺灣日治時期行政區劃', desc: '地方行政區域大變革，實施「五州二廳」制，許多現代地名（如高雄、打狗改名）於此時定名。' },
            { id: 87, title: '台灣議會設置請願運動', year: 1921, month: 1, period: 'japanese', level: 2, wiki: '臺灣議會設置請願運動', desc: '林獻堂等人向日本帝國議會提出請願，要求設立台灣議會，是日治時期最重要的政治運動之一，共歷時15年、提出15次請願。' },
            { id: 46, title: '台灣文化協會成立', year: 1921, month: 10, period: 'japanese', level: 1, wiki: '臺灣文化協會', desc: '林獻堂、蔣渭水等人成立「臺灣文化協會」，發行《臺灣民報》，並發起「臺灣議會設置請願運動」，抗日手段轉為非武裝的政治與文化運動。' },
            { id: 47, title: '台灣民眾黨成立', year: 1927, period: 'japanese', level: 2, wiki: '臺灣民眾黨 (1927年)', desc: '蔣渭水等人不滿文協分裂，另組「臺灣民眾黨」，為台灣歷史上第一個合法的政黨。' },
            { id: 48, title: '臺北帝國大學成立', year: 1928, period: 'japanese', level: 2, wiki: '國立臺灣大學', desc: '臺北帝國大學（今國立臺灣大學）成立，為日治時期台灣最高學府。' },
            { id: 49, title: '嘉南大圳完工', year: 1930, period: 'japanese', level: 1, wiki: '嘉南大圳', desc: '歷時十年的嘉南大圳完工（八田與一設計），烏山頭水庫啟用，嘉南平原由旱田變穀倉。' },
            { id: 50, title: '霧社事件', year: 1930, month: 10, period: 'japanese', level: 1, wiki: '霧社事件', desc: '原住民莫那·魯道率領賽德克族發動霧社事件，震驚日本當局，為日治後期最慘烈的原住民武裝反抗事件。' },
            { id: 51, title: 'KANO甲子園亞軍', year: 1931, period: 'japanese', level: 2, wiki: '嘉義農林棒球隊', desc: '台灣嘉義農林學校（KANO）棒球隊代表台灣赴日本參加甲子園大賽，榮獲亞軍，漢、原、日三族混合球隊震撼日本。' },
            { id: 52, title: '日月潭水力發電所完工', year: 1934, period: 'japanese', level: 2, wiki: '大觀發電廠', desc: '日月潭水力發電所（大觀發電廠）完工，為台灣工業化提供充足電力。' },
            { id: 53, title: '始政四十周年台灣博覽會', year: 1935, period: 'japanese', level: 2, wiki: '始政四十周年記念臺灣博覽會', desc: '總督府舉辦「始政四十周年紀念臺灣博覽會」展現殖民建設成果；同年舉辦台灣歷史上第一次地方議員選舉。' },
            { id: 54, title: '皇民化運動全面推行', year: 1937, period: 'japanese', level: 1, wiki: '皇民化運動', desc: '中日戰爭全面爆發，總督府廢除報紙漢文欄，全面強制推行皇民化運動（改日姓、說日語、拜神社）。' },
            { id: 55, title: '日本投降台灣光復', year: 1945, month: 8, period: 'japanese', level: 1, wiki: '台灣光復', desc: '第二次世界大戰結束，日本裕仁天皇宣布無條件投降，日本撤離台灣，日治時期結束。' },
            { id: 88, title: '台灣土地調查事業', year: 1898, period: 'japanese', level: 2, wiki: '台灣土地調查事業', desc: '台灣總督府展開土地調查事業，清查全台土地所有權與面積，確立近代土地制度，同時掌握農業資源，是殖民統治的重要基礎工程。' },
            { id: 89, title: '嘉南平原稻米產量全台最高', year: 1934, period: 'japanese', level: 2, wiki: '嘉南大圳', desc: '嘉南大圳完工後，嘉南平原引入充足灌溉水源，稻米及甘蔗產量大幅提升，使嘉南平原成為全台農業生產最豐饒的地區。' },
            { id: 90, title: '新式糖廠成立（台灣製糖株式會社）', year: 1902, period: 'japanese', level: 2, wiki: '台灣製糖株式會社', desc: '日本資本在台南橋頭設立台灣第一座現代化新式糖廠，採用機械化生產，帶動台灣製糖業的近代化，砂糖成為日治時期最重要的出口產品。' },

            // ══ 戰後時期至當代（中華民國時期）══
            { id: 56, title: '台灣光復受降典禮', year: 1945, month: 10, period: 'modern', level: 1, wiki: '台灣光復', desc: '國民政府派代表來台接受日軍投降，並在10月25日舉行台灣地區受降典禮（此後定為台灣光復節）。' },
            { id: 57, title: '二二八事件', year: 1947, month: 2, period: 'modern', level: 1, wiki: '二二八事件', desc: '因查緝私菸衝突，2月28日爆發二二八事件，隨後遭到軍隊鎮壓，造成大量本土菁英與民眾傷亡。' },
            { id: 58, title: '動員戡亂時期臨時條款', year: 1948, period: 'modern', level: 2, wiki: '動員戡亂時期臨時條款', desc: '國民大會通過《動員戡亂時期臨時條款》，凍結憲法，擴大總統權力。' },
            { id: 61, title: '三七五減租', year: 1949, month: 4, period: 'modern', level: 1, wiki: '三七五減租', desc: '推動「三七五減租」土地改革政策，限制地主收租比例，為戰後農村經濟復甦的起點。' },
            { id: 59, title: '台灣戒嚴令頒布', year: 1949, month: 5, period: 'modern', level: 1, wiki: '臺灣戒嚴', desc: '台灣省政府主席陳誠頒布《臺灣省戒嚴令》，台灣進入長達38年的戒嚴與白色恐怖時期。' },
            { id: 62, title: '新台幣發行', year: 1949, month: 6, period: 'modern', level: 2, wiki: '新臺幣', desc: '實施幣制改革，發行新台幣，穩定戰後惡性通貨膨脹。' },
            { id: 60, title: '古寧頭戰役', year: 1949, month: 10, period: 'modern', level: 2, wiki: '古寧頭戰役', desc: '爆發金門古寧頭戰役，國軍擊退共軍，確立了兩岸分治的局勢。' },
            { id: 63, title: '公地放領', year: 1951, period: 'modern', level: 2, wiki: '公地放領', desc: '推動「公地放領」，將政府持有的公有土地低價優先賣給佃農。' },
            { id: 64, title: '耕者有其田', year: 1953, period: 'modern', level: 1, wiki: '耕者有其田', desc: '正式通過並實施「耕者有其田」條例，政府徵收地主超額土地轉賣給佃農，徹底改變台灣農村經濟。' },
            { id: 65, title: '八二三砲戰', year: 1958, period: 'modern', level: 1, wiki: '八二三砲戰', desc: '爆發八二三砲戰，共軍猛烈砲擊金門，國軍成功守住防線。' },
            { id: 66, title: '九年國民義務教育實施', year: 1968, period: 'modern', level: 1, wiki: '中華民國九年國民教育', desc: '全面實施九年國民義務教育，大幅提升國民素質，國民學校改稱「國民小學」、「國民中學」。' },
            { id: 67, title: '中華民國退出聯合國', year: 1971, period: 'modern', level: 1, wiki: '中華民國聯合國會員資格', desc: '聯合國大會通過決議，中華民國退出聯合國，台灣國際外交陷入孤立與轉折點。' },
            { id: 68, title: '十大建設', year: 1973, period: 'modern', level: 1, wiki: '十大建設', desc: '行政院長蔣經國宣布推動「十大建設」（如南北高速公路、台中港、中鋼、中船、鐵路電氣化等），帶動經濟轉型。' },
            { id: 69, title: '中山高速公路全線通車', year: 1978, period: 'modern', level: 1, wiki: '國道一號 (台灣)', desc: '蔣經國就任總統；同年中山高速公路（國道一號）全線通車，縱貫南北，象徵台灣經濟起飛。' },
            { id: 70, title: '台美斷交', year: 1979, month: 1, period: 'modern', level: 1, wiki: '中美斷交', desc: '台美正式斷交，美國承認中共；同年中正國際機場（今桃園國際機場）正式啟用。' },
            { id: 71, title: '美麗島事件', year: 1979, month: 12, period: 'modern', level: 1, wiki: '美麗島事件', desc: '高雄爆發美麗島事件，黨外民主運動領袖遭到大逮捕，後續審判喚醒社會對民主的渴望。' },
            { id: 72, title: '新竹科學工業園區設立', year: 1980, period: 'modern', level: 1, wiki: '新竹科學工業園區', desc: '新竹科學工業園區正式設立，吸引高科技人才回流，台灣由傳統加工出口轉型為電子科技島。' },
            { id: 73, title: '民主進步黨成立', year: 1986, period: 'modern', level: 1, wiki: '民主進步黨', desc: '民主進步黨（民進黨）在台北圓山大飯店宣布成立，推動了台灣的民主進程。' },
            { id: 75, title: '台積電創立', year: 1987, month: 2, period: 'modern', level: 2, wiki: '台灣積體電路製造', desc: '張忠謀創立台積電，開創晶圓代工商業模式，奠定台灣科技產業全球地位。' },

        // --- 狀態與遊戲邏輯 ---
        const ANIMAL_ICONS = ['fa-dog', 'fa-cat', 'fa-dragon', 'fa-frog', 'fa-hippo', 'fa-otter', 'fa-fish', 'fa-spider'];
        
        // ===== 排行榜資料 (Firebase Realtime DB) =====
        // Firebase paths
        const FB_LB_PATH = 'leaderboard/solo';
        const FB_ULT_LB_PATH = 'leaderboard/ultimate';

        // In-memory cache for leaderboards (loaded from Firebase on demand)
        let _soloLBCache = null;
        let _ultLBCache = null;

        // Fetch solo leaderboard from Firebase (returns sorted array)
        const getLeaderboard = async () => {
            if (!window.firebaseReady) return _soloLBCache || [];
            try {
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, FB_LB_PATH));
                if (!snap.exists()) { _soloLBCache = []; return []; }
                const obj = snap.val();
                const arr = Object.values(obj).sort((a,b) => {
                    if (b.cardsPlaced !== a.cardsPlaced) return b.cardsPlaced - a.cardsPlaced;
                    if ((b.difficulty||1) !== (a.difficulty||1)) return (b.difficulty||1) - (a.difficulty||1);
                    return a.seconds - b.seconds;
                }).slice(0, 20);
                _soloLBCache = arr;
                return arr;
            } catch(e) { console.warn('LB fetch error', e); return _soloLBCache || []; }
        };

        // Add a solo entry and push to Firebase immediately
        const addToLeaderboard = async (name, cardsPlaced, seconds) => {
            if (!window.firebaseReady) return;
            const entry = {
                name, cardsPlaced, seconds,
                difficulty: state.soloDifficulty || 1,
                date: new Date().toLocaleDateString('zh-TW'),
                ts: Date.now()
            };
            try {
                const key = Date.now() + '_' + Math.random().toString(36).substr(2,5);
                await window.firebaseSet(window.firebaseRef(window.firebaseDB, FB_LB_PATH + '/' + key), entry);
                // Trim to 20 entries: fetch all, delete extras
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, FB_LB_PATH));
                if (snap.exists()) {
                    const entries = Object.entries(snap.val()).sort(([,a],[,b]) => {
                        if (b.cardsPlaced !== a.cardsPlaced) return b.cardsPlaced - a.cardsPlaced;
                        if ((b.difficulty||1) !== (a.difficulty||1)) return (b.difficulty||1) - (a.difficulty||1);
                        return a.seconds - b.seconds;
                    });
                    if (entries.length > 20) {
                        const toDelete = entries.slice(20);
                        for (const [k] of toDelete) {
                            await window.firebaseRemove(window.firebaseRef(window.firebaseDB, FB_LB_PATH + '/' + k));
                        }
                    }
                }
            } catch(e) { console.warn('LB save error', e); }
        };

        // Fetch ultimate leaderboard from Firebase
        const getUltimateLB = async () => {
            if (!window.firebaseReady) return _ultLBCache || [];
            try {
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, FB_ULT_LB_PATH));
                if (!snap.exists()) { _ultLBCache = []; return []; }
                const obj = snap.val();
                const arr = Object.values(obj).sort((a,b) => {
                    if (b.cleared !== a.cleared) return (b.cleared ? 1 : 0) - (a.cleared ? 1 : 0);
                    if (b.answered !== a.answered) return b.answered - a.answered;
                    if ((b.difficulty||2) !== (a.difficulty||2)) return (b.difficulty||2) - (a.difficulty||2);
                    return a.seconds - b.seconds;
                }).slice(0, 20);
                _ultLBCache = arr;
                return arr;
            } catch(e) { console.warn('ULT LB fetch error', e); return _ultLBCache || []; }
        };

        // Add an ultimate entry and push to Firebase immediately
        const addToUltimateLB = async (name, correct, seconds, hp) => {
            if (!window.firebaseReady) return;
            const cleared = hp <= 0;
            const entry = {
                name, answered: correct, seconds, hp,
                difficulty: state.ultimateDifficulty || 2,
                cleared,
                date: new Date().toLocaleDateString('zh-TW'),
                ts: Date.now()
            };
            try {
                const key = Date.now() + '_' + Math.random().toString(36).substr(2,5);
                await window.firebaseSet(window.firebaseRef(window.firebaseDB, FB_ULT_LB_PATH + '/' + key), entry);
                // Trim to 20 entries
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, FB_ULT_LB_PATH));
                if (snap.exists()) {
                    const entries = Object.entries(snap.val()).sort(([,a],[,b]) => {
                        if (b.cleared !== a.cleared) return (b.cleared ? 1 : 0) - (a.cleared ? 1 : 0);
                        if (b.answered !== a.answered) return b.answered - a.answered;
                        if ((b.difficulty||2) !== (a.difficulty||2)) return (b.difficulty||2) - (a.difficulty||2);
                        return a.seconds - b.seconds;
                    });
                    if (entries.length > 20) {
                        const toDelete = entries.slice(20);
                        for (const [k] of toDelete) {
                            await window.firebaseRemove(window.firebaseRef(window.firebaseDB, FB_ULT_LB_PATH + '/' + k));
                        }
                    }
                }
            } catch(e) { console.warn('ULT LB save error', e); }
        };

        let ultimateNameInputVal = '';

        let state = {
            screen: 'menu', mode: 'normal', isVsAI: false, aiDifficulty: 0.7,
            deck: [], timeline: [], players: [], currentPlayerIndex: 0, 
            selectedCardId: null, previewCard: null, roundNum: 1, winners: [],
            gameSeconds: 0, gameTimerInterval: null,
            // 回合結束追蹤：記錄本回合已打完牌的玩家 id
            roundFinishers: [],
            // 殊死戰：僅剩這些玩家繼續，其餘已淘汰
            deathMatchPlayers: null,
            // 殊死戰本回合答對者
            deathMatchCorrect: [],
            // 極限殊死對戰
            isExtremeDeath: false,
            extremeCountdown: 5,
            extremeCountdownInterval: null,
            extremeSkipped: [],  // 本回合超時放棄者
            // 時間軸年代顯示：第一次配對成功後才顯示
            firstMatchDone: false,
            // 無限挑戰模式
            isSoloInfinite: false,
            soloCard: null,          // 當前抽到的牌
            soloPlaced: 0,           // 成功放置張數
            soloFailed: false,       // 是否失敗
            soloFailedCard: null,    // 放錯的那張牌
            soloDifficulty: 1,       // 考驗難度 (1/2/3)
            // 究極挑戰模式
            isUltimate: false,
            ultimateHP: 3,
            ultimateCard: null,
            ultimateAnswered: 0,
            ultimateCorrect: 0,
            ultimateCorrectStreak: 0,
            ultimateDeck: [],
            ultimateBeastAnim: 'idle',
            ultimateInput: '',
            ultimateIsBC: false,
