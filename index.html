            const tabs = [{ id: 'all', name: '全部' }, ...ALL_PERIODS];

            return `
            <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                <!-- 頂部標題列 -->
                <div class="bg-slate-900 border-b border-slate-700 px-4 pt-4 pb-0 shadow-lg z-10 shrink-0">
                    <div class="flex items-center justify-between mb-3">
                        <button onclick="audioManager.playSFX('click'); window.galleryPeriodFilter='all'; window.gallerySearchQuery=''; window.galleryRelationView=false; window.selectedRelationId=null; state.screen='menu'; document.getElementById('game-header').classList.add('hidden'); render();" class="text-slate-400 hover:text-white transition px-3 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>返回</button>
                        <h2 class="text-xl font-bold text-amber-500 serif-font"><i class="fas fa-book-open mr-2"></i>史料圖鑑</h2>
                    <div class="flex items-center gap-2">
                        <!-- 歷史關聯圖按鈕 -->
                        <button onclick="window.openRelationGraph();"
                            class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold transition-all hover:scale-[1.03] border"
                            style="background:linear-gradient(135deg,#7c3aed22,#4f46e522);border-color:#7c3aed60;color:#a78bfa;">
                            <i class="fas fa-project-diagram text-[11px]"></i>
                            <span class="hidden sm:inline">歷史關聯圖</span>
                            <span class="sm:hidden">關聯</span>
                        </button>
                        <!-- 搜尋列 -->
                        <div class="relative w-36 sm:w-56">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                            <input
                                type="text"
                                id="gallery-search"
                                placeholder="搜尋事件、年份…"
                                value="${window.gallerySearchQuery}"
                                oninput="window.gallerySearchQuery=this.value; render(); const el=document.getElementById('gallery-search'); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length);}"
                                class="w-full bg-slate-800 border border-slate-600 focus:border-amber-500 rounded-lg pl-8 pr-3 py-2 text-white text-xs outline-none transition"
                            />
                        </div>
                    </div>
                    </div>
                    <!-- 時期篩選 Tabs -->
                    <div class="flex gap-1 overflow-x-auto pb-0 hide-scrollbar" style="scrollbar-width:none;">
                        ${tabs.map(t => `
                            <button onclick="audioManager.playSFX('click'); window.galleryPeriodFilter='${t.id}'; render();"
                                class="shrink-0 px-3 py-2 text-xs font-bold rounded-t-lg transition-all border-b-2 ${window.galleryPeriodFilter===t.id ? 'border-amber-500 text-amber-400 bg-amber-500/10' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}">
                                ${t.name}
                            </button>
                        `).join('')}
                        <div class="ml-auto shrink-0 flex items-center pb-1 text-[10px] text-slate-500 pr-1">
                            共 <span class="text-amber-400 font-bold mx-1">${filteredCards.length}</span> 筆
                        </div>
                    </div>
                </div>

                <!-- 卡片列表 -->
                <div class="flex-1 overflow-y-auto p-4 sm:p-8">
                    ${filteredCards.length === 0 ? `
                        <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-3">
                            <i class="fas fa-search text-5xl text-slate-700"></i>
                            <p class="text-base">找不到符合的史料</p>
                            <button onclick="window.gallerySearchQuery=''; window.galleryPeriodFilter='all'; render();" class="text-amber-400 text-sm hover:underline">清除篩選</button>
                        </div>
                    ` : `
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6 max-w-7xl mx-auto pb-12">
                        ${filteredCards.map(card => `
                            <div onclick="openGalleryModal(${card.id});"
                                class="bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700 hover:border-amber-500/70 hover:shadow-amber-500/10 hover:shadow-xl transition-all hover:-translate-y-1 group cursor-pointer relative">
                                <!-- 點擊提示 -->
                                <div class="absolute top-2 right-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="bg-amber-500/90 text-black text-[9px] font-bold px-1.5 py-0.5 rounded shadow flex items-center gap-1">
                                        <i class="fas fa-info-circle text-[8px]"></i> 介紹
                                    </span>
                                </div>
                                <div class="h-32 sm:h-40 bg-slate-900 relative">
                                    <img src="${renderWikiImage(card.wiki)}" data-wiki="${card.wiki}" class="w-full h-full object-cover transition-opacity duration-500" onerror="this.src='${noPicSvg}';"/>
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent group-hover:from-amber-950/80 transition-all"></div>
                                    <div class="absolute bottom-2 left-2 right-2 flex justify-between items-end">
                                        <span class="text-[10px] font-bold bg-amber-600/80 text-white px-1.5 py-0.5 rounded backdrop-blur-sm shadow">${formatYear(card.year)}</span>
                                        <span class="text-[10px] text-slate-300 bg-black/60 px-1.5 py-0.5 rounded backdrop-blur-sm">${ALL_PERIODS.find(p=>p.id===card.period).name.slice(0,2)}</span>
                                    </div>
                                </div>
                                <div class="p-3">
                                    <h3 class="font-bold text-sm text-slate-100 mb-1 group-hover:text-amber-400 transition-colors line-clamp-1 flex items-center gap-1" title="${card.title}">
                                        ${card.title}
                                        <i class="fas fa-chevron-right text-[8px] text-slate-600 group-hover:text-amber-500/70 transition-colors ml-auto shrink-0"></i>
                                    </h3>
                                    <p class="text-[10px] text-slate-400 line-clamp-3 leading-relaxed" title="${card.desc}">${card.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>`}
                </div>
            </div>
            `;
        };



        // ===== 無限挑戰模式邏輯 =====
        const startSoloInfinite = (selectedPeriods, questionDifficulty) => {
            audioManager.playSFX('click');
            let cards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if(cards.length < 5) return alert('題庫不足！請增加時代或降低難度。');
            state.isSoloInfinite = true;
            state.deck = shuffle([...cards]);
            state.timeline = [state.deck.pop()]; // 起始一張（已在renderSoloPlay中以compact模式顯示）
            state.soloPlaced = 0;
            state.soloFailed = false;
            state.soloFailedCard = null;
            state.soloDifficulty = questionDifficulty;
            state.soloCard = state.deck.pop(); // 第一張待放牌
            state.selectedCardId = state.soloCard ? state.soloCard.id : null;
            startTimer();
            audioManager.switchToGameBGM();
            state.screen = 'soloPlay';
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('display-round').innerText = '無限挑戰';
            document.getElementById('game-deck-count').innerText = state.deck.length;
            render();
        };

        const handleSoloGapClick = (insertIndex) => {
            if(!state.soloCard || state.soloFailed) return;
            const card = state.soloCard;
            let ok = false;
            if(insertIndex === 0) ok = card.year <= state.timeline[0].year;
            else if(insertIndex === state.timeline.length) ok = card.year >= state.timeline[insertIndex-1].year;
            else ok = card.year >= state.timeline[insertIndex-1].year && card.year <= state.timeline[insertIndex].year;

            if(ok) {
                audioManager.playSFX('correct');
                state.timeline.splice(insertIndex, 0, card);
                state.soloPlaced++;
                showToast(`🎯 正確！已成功放置 ${state.soloPlaced} 張`, true, 2000);
                // 抽下一張
                if(state.deck.length > 0) {
                    setTimeout(() => {
                        audioManager.playSFX('card');
                        state.soloCard = state.deck.pop();
                        state.selectedCardId = state.soloCard.id;
                        document.getElementById('game-deck-count').innerText = state.deck.length;
                        render();
                    }, 800);
                } else {
                    // 牌庫清空 = 通關
                    state.soloCard = null;
                    setTimeout(() => endSoloGame(true), 1000);
                }
            } else {
                // 答錯立即結束
                audioManager.playSFX('wrong');
                audioManager.playSFX('gameover');
                state.soloFailed = true;
                state.soloFailedCard = card;
                state.screen = 'soloOver';
                stopTimer();
                showToast(`❌ 答錯！【${card.title}】發生於 ${formatYear(card.year)}`, false, 5000);
                // 震動提示
                document.getElementById('app').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('app').classList.remove('shake');
                    render();
                }, 600);
            }
        };

        const endSoloGame = (cleared) => {
            stopTimer();
            audioManager.playSFX(cleared ? 'win' : 'gameover');
            state.soloFailed = !cleared;
            state.screen = 'soloOver';
            render();
        };


        // ===== 究極挑戰模式 =====
        // 階段定義：[起始題號(1-based), 結束題號, 模式]
        // 模式: 'choice2' | 'choice3' | 'choice4' | 'range5' | 'range10' | 'range20' | 'free'
        const ULTIMATE_PHASES = [
            { start: 1,  end: 10,  mode: 'choice2',  label: '二選一',      beastColor: 'gray'  },
            { start: 11, end: 20,  mode: 'choice3',  label: '三選一',      beastColor: 'white' },
            { start: 21, end: 30,  mode: 'choice4',  label: '四選一',      beastColor: 'green' },
            { start: 31, end: 50,  mode: 'range5',   label: '5年內提示',   beastColor: 'yellow'},
            { start: 51, end: 70,  mode: 'range10',  label: '10年內提示',  beastColor: 'red'   },
            { start: 71, end: 90,  mode: 'range20',  label: '20年內提示',  beastColor: 'blue'  },
            { start: 91, end: 100, mode: 'free',     label: '直接輸入',    beastColor: 'black' },
        ];
        const getUltimatePhase = (qNum) => ULTIMATE_PHASES.find(p => qNum >= p.start && qNum <= p.end) || ULTIMATE_PHASES[ULTIMATE_PHASES.length-1];

        const startUltimate = (selectedPeriods, questionDifficulty) => {
            audioManager.playSFX('click');
            let cards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if(cards.length < 5) return alert('題庫不足！請增加時代或降低難度。');
            state.isUltimate = true;
            state.ultimateDeck = shuffle([...cards]);
            state.ultimateHP = 100;       // 百分比血量，100滴
            state.ultimateAnswered = 0;
            state.ultimateCorrect = 0;
            state.ultimateCorrectStreak = 0;
            state.ultimateCard = state.ultimateDeck.pop();
            state.ultimateInput = '';
            state.ultimateIsBC = false;
            state.ultimateLastResult = null;
            state.ultimateBeastAnim = 'idle';
            state.ultimateDifficulty = questionDifficulty;
            state.ultimateCards = [];
            state.ultimateCardMilestone = 10;
            state.ultimateActiveCard = null;
            state.ultimateCardEffect = null;
            // 根據目前題號生成選項
            state.ultimateChoiceOptions = null;
            state.ultimatePlayerHP = 3;
            state.ultimatePlayerStreakForHP = 0;
            startTimer();
            audioManager.switchToGameBGM();
            state.screen = 'ultimatePlay';
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('display-round').innerText = '厲始魔王';
            document.getElementById('game-deck-count').innerText = state.ultimateDeck.length;
            // 第一題先生成選項
            generateUltimateChoiceOptions();
            render();
        };

        // 根據目前階段生成選項
        const PREHISTORIC_YEARS = [-50000, -40000, -30000, -5000, -4000, -3000, -2500, -2000, -1500, 0, 500];

        const generateUltimateChoiceOptions = () => {
            const card = state.ultimateCard;
            if(!card) return;
            const phase = getUltimatePhase(state.ultimateAnswered + 1);
            const correctYear = card.year;
            const mode = phase.mode;
            const isPrehistoric = card.period === 'prehistoric';

            if(mode === 'choice2' || mode === 'choice3' || mode === 'choice4') {
                const count = mode === 'choice2' ? 2 : mode === 'choice3' ? 3 : 4;
                let options = new Set([correctYear]);

                if(isPrehistoric) {
                    // 史前：從其他史前年代中挑誘答（排除正確答案）
                    const otherYears = shuffle(PREHISTORIC_YEARS.filter(y => y !== correctYear));
                    for(let i = 0; i < otherYears.length && options.size < count; i++) {
                        options.add(otherYears[i]);
                    }
                    // 若史前年代不夠，補隨機偏移
                    if(options.size < count) {
                        const range = 10000;
                        let attempts = 0;
                        while(options.size < count && attempts < 200) {
                            const offset = (Math.floor(Math.random() * 9) + 1) * 1000 * (Math.random() < 0.5 ? 1 : -1);
                            const candidate = correctYear + offset;
                            if(!PREHISTORIC_YEARS.includes(candidate)) options.add(candidate);
                            attempts++;
                        }
                    }
                } else {
                    const range = 40;
                    let attempts = 0;
                    while(options.size < count && attempts < 200) {
                        const offset = Math.floor(Math.random() * range * 2) - range;
                        if(offset !== 0) {
                            const candidate = Math.min(correctYear + offset, 2025);
                            if(candidate !== correctYear) options.add(candidate);
                        }
                        attempts++;
                    }
                }
                state.ultimateChoiceOptions = shuffle([...options]);

            } else if(mode === 'range5' || mode === 'range10' || mode === 'range20') {
                state.ultimateChoiceOptions = null;

                if(isPrehistoric) {
                    // 史前範圍提示：用兩個相鄰史前年代包夾正確答案
                    const sorted = [...PREHISTORIC_YEARS].sort((a, b) => a - b);
                    // 找出所有不等於正確答案的年代，從中找包夾對
                    let lo = null, hi = null;
                    // 找比 correctYear 小的最大值（lo）和比 correctYear 大的最小值（hi）
                    const loCandidates = sorted.filter(y => y < correctYear);
                    const hiCandidates = sorted.filter(y => y > correctYear);
                    if(loCandidates.length > 0 && hiCandidates.length > 0) {
                        // 多個候選時，為增加難度可隨機選（但必須包夾正確答案）
                        // lo 從最靠近的 1~2 個裡隨機；hi 同理
                        const loPool = loCandidates.slice(-Math.min(2, loCandidates.length));
                        const hiPool = hiCandidates.slice(0, Math.min(2, hiCandidates.length));
                        lo = loPool[Math.floor(Math.random() * loPool.length)];
                        hi = hiPool[Math.floor(Math.random() * hiPool.length)];
                    } else if(loCandidates.length > 0) {
                        // 正確答案是最大值，取最後兩個 lo
                        lo = loCandidates[loCandidates.length - 2] ?? loCandidates[loCandidates.length - 1];
                        hi = correctYear + Math.abs(correctYear - lo);
                    } else {
                        // 正確答案是最小值，取前兩個 hi
                        hi = hiCandidates[1] ?? hiCandidates[0];
                        lo = correctYear - Math.abs(hi - correctYear);
                    }
                    state.ultimateRangeHint = { lo, hi, delta: Math.round((hi - lo) / 2), correctYear, isPrehistoric: true };
                } else {
                    // 一般範圍提示（原本邏輯）
                    const delta = mode === 'range5' ? 5 : mode === 'range10' ? 10 : 20;
                    const offset = Math.floor(Math.random() * (delta + 1));
                    let lo = correctYear - offset;
                    let hi = lo + delta * 2;
                    // 確保 hi 不超過 2025，若超出則整體往前平移（lo 同步縮減）
                    if(hi > 2025) {
                        const overflow = hi - 2025;
                        hi = 2025;
                        lo = Math.min(lo, lo - overflow);
                    }
                    state.ultimateRangeHint = { lo, hi, delta, correctYear };
                }
            } else {
                state.ultimateChoiceOptions = null;
                state.ultimateRangeHint = null;
            }
        };

        window.ultimateNumPress = (val) => {
            audioManager.playSFX('click');
            if(val === 'BC') {
                state.ultimateIsBC = !state.ultimateIsBC;
            } else if(val === '⌫') {
                state.ultimateInput = state.ultimateInput.slice(0,-1);
            } else if(val === 'OK') {
                confirmUltimateAnswer();
                return;
            } else {
                if(state.ultimateInput.length < 6) state.ultimateInput += val;
            }
            const disp = document.getElementById('ult-input-display');
            if(disp) updateUltimateDisplay();
        };

        const updateUltimateDisplay = () => {
            const disp = document.getElementById('ult-input-display');
            if(!disp) return;
            const val = state.ultimateInput || '＿';
            const prefix = state.ultimateIsBC ? '<span class="text-purple-300">西元前 </span>' : '<span class="text-blue-300">西元 </span>';
            disp.innerHTML = prefix + '<span class="text-white font-black text-2xl">' + val + '</span>' + (state.ultimateInput ? '<span class="text-amber-400"> 年</span>' : '');
        };

        const confirmUltimateAnswer = () => {
            const card = state.ultimateCard;
            if(!card) return;
            const phase = getUltimatePhase(state.ultimateAnswered + 1);
            const mode = phase.mode;
            // 選擇題模式不走這（走 selectChoiceAnswer）
            if(mode === 'choice2' || mode === 'choice3' || mode === 'choice4') return;
            if(!state.ultimateInput) return;

            let guessYear = state.ultimateIsBC ? -parseInt(state.ultimateInput) : parseInt(state.ultimateInput);
            // 範圍提示題：判斷是否在範圍內即算對
            if((mode === 'range5' || mode === 'range10' || mode === 'range20') && state.ultimateRangeHint) {
                const hint = state.ultimateRangeHint;
                if(guessYear >= hint.lo && guessYear <= hint.hi) {
                    processUltimateAnswer(hint.correctYear); // 傳入正確答案讓判斷通過
                } else {
                    processUltimateAnswer(guessYear);
                }
            } else {
                processUltimateAnswer(guessYear);
            }
        };

        // 選擇題選項點擊
        window.selectChoiceAnswer = (year) => {
            audioManager.playSFX('click');
            processUltimateAnswer(year);
        };

        const processUltimateAnswer = (guessYear) => {
            const card = state.ultimateCard;
            if(!card) return;

            const correct = guessYear === card.year;
            state.ultimateAnswered++;
            state.ultimateLastResult = correct ? 'correct' : 'wrong';

            if(correct) {
                audioManager.playSFX('correct');
                state.ultimateCorrect++;
                state.ultimateCorrectStreak++;
                state.ultimatePlayerStreakForHP++;
                // 答對扣魔王血量（100滴血，答對1題扣1滴）
                state.ultimateHP = Math.max(0, state.ultimateHP - 1);
                state.ultimateBeastAnim = 'idle';
                const phaseNow = getUltimatePhase(state.ultimateAnswered);
                const isRangeMode = phaseNow && (phaseNow.mode==='range5'||phaseNow.mode==='range10'||phaseNow.mode==='range20');
                // 每連續答對3題加一滴血（最多3格）
                if(state.ultimatePlayerStreakForHP >= 3) {
                    state.ultimatePlayerStreakForHP = 0;
                    if(state.ultimatePlayerHP < 3) {
                        state.ultimatePlayerHP++;
                        showToast(isRangeMode ? `✅ 命中範圍！正確答案是 ${formatYear(card.year)}　❤️ 連續3題！恢復一滴血！` : `✅ 正確！已對魔王造成傷害 ${state.ultimateCorrect}/100　❤️ 連續3題！恢復一滴血！`, true, 2500);
                    } else {
                        showToast(isRangeMode ? `✅ 命中範圍！正確答案是 ${formatYear(card.year)}　🔥 連續3題！(血量已滿)` : `✅ 正確！已對魔王造成傷害 ${state.ultimateCorrect}/100　🔥 連續3題！(血量已滿)`, true, 2500);
                    }
                } else {
                    showToast(isRangeMode ? `✅ 命中範圍！正確答案是 ${formatYear(card.year)}` : `✅ 正確！已對魔王造成傷害 ${state.ultimateCorrect}/100`, true, 2000);
                }

                // 每答對10題獲得抽卡機會
                if(state.ultimateCorrect >= state.ultimateCardMilestone) {
                    state.ultimateCardMilestone += 10;
                    if(state.ultimateCards.length < 3) {
                        const newCard = drawUltimateCard();
                        state.ultimateCards.push(newCard);
                        showToast(`🃏 獲得卡牌：【${newCard.name}】！（已存 ${state.ultimateCards.length}/3 張）`, true, 3000);
                    } else {
                        showToast(`🃏 答對10題但手牌已滿（3/3），無法再得卡！`, false, 2500);
                    }
                }
            } else {
                audioManager.playSFX('wrong');
                state.ultimateCorrectStreak = 0;
                state.ultimatePlayerStreakForHP = 0; // 中斷連續，重置
                state.ultimatePlayerHP = Math.max(0, state.ultimatePlayerHP - 1);
                state.ultimateBeastAnim = 'attack';
                const hint = state.ultimateRangeHint;
                const hintStr = hint ? `（範圍提示：${hint.lo < 0 ? '西元前'+Math.abs(hint.lo) : hint.lo}～${hint.hi < 0 ? '西元前'+Math.abs(hint.hi) : hint.hi} 年）` : '';
                const hpRemain = state.ultimatePlayerHP > 0 ? `　💔 剩餘血量：${'❤️'.repeat(state.ultimatePlayerHP)}${'🖤'.repeat(3-state.ultimatePlayerHP)}` : `　💀 血量耗盡！`;
                showToast(`❌ 答錯！正確：${formatYear(card.year)}${hintStr}${hpRemain}`, false, 3500);
            }

            // 清除卡牌效果
            state.ultimateCardEffect = null;
            state.ultimateChoiceOptions = null;
            state.ultimateRangeHint = null;

            // 清空輸入
            state.ultimateInput = '';
            state.ultimateIsBC = false;

            // 玩家血量耗盡 → 遊戲結束
            if(state.ultimatePlayerHP <= 0) {
                state.ultimateCard = null;
                state.ultimateBeastAnim = 'idle';
                setTimeout(() => {
                    state.screen = 'ultimateOver';
                    stopTimer();
                    render();
                }, 1200);
                render();
                return;
            }

            // 檢查是否達到100題（魔王血量歸零）或牌庫已空
            if(state.ultimateHP <= 0 || state.ultimateAnswered >= 100) {
                // 通關！
                state.ultimateCard = null;
                state.ultimateBeastAnim = 'idle';
                setTimeout(() => {
                    state.screen = 'ultimateOver';
                    stopTimer();
                    render();
                }, 800);
                return;
            }

            if(state.ultimateDeck.length > 0) {
                state.ultimateCard = state.ultimateDeck.pop();
                document.getElementById('game-deck-count').innerText = state.ultimateDeck.length;
                // 根據新題號生成新選項
                const prevPhase = getUltimatePhase(state.ultimateAnswered);
                const nextPhase = getUltimatePhase(state.ultimateAnswered + 1);

                </div>` : '';
            return `
            <div class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center p-6 z-50 overflow-y-auto">
                <div class="glass-panel p-8 sm:p-12 rounded-3xl max-w-md w-full text-center border ${state.soloFailed?'border-red-500/50 shadow-[0_0_50px_rgba(239,68,68,0.2)]':'border-purple-500/50 shadow-[0_0_50px_rgba(139,92,246,0.2)]'} animate-scale-up mb-4">
                    <div class="text-6xl mb-4">${state.soloFailed ? '💥' : '🌟'}</div>
                    <h2 class="text-3xl font-black mb-2 serif-font ${state.soloFailed?'text-red-300':'text-purple-300'}">${state.soloFailed ? '挑戰結束！' : '完美通關！'}</h2>
                    <p class="text-slate-400 text-sm mb-6">${state.soloFailed ? '放置錯誤，記錄已定格' : '牌庫清空，歷史盡在掌握'}</p>
                    <div class="bg-slate-900/80 rounded-xl p-4 mb-2 border border-slate-700 space-y-2">
                        <div class="flex justify-between text-sm"><span class="text-slate-400">成功放置</span><span class="font-black text-2xl text-white">${state.soloPlaced} 張</span></div>
                        <div class="flex justify-between text-sm"><span class="text-slate-400">通關時間</span><span class="font-bold text-white">${formatTime(state.gameSeconds)}</span></div>
                        <div class="flex justify-between text-sm"><span class="text-slate-400">考驗難度</span><span class="font-bold text-amber-400">${diffName}</span></div>
                    </div>
                    ${failedHtml}
                    ${timelineHtml}
                    <div class="flex flex-col gap-3 mt-5">
                        <button onclick="document.getElementById('solo-kb-overlay').classList.remove('hidden')" class="w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-3 rounded-xl shadow-lg text-sm tracking-widest flex items-center justify-center gap-2">
                            <i class="fas fa-trophy"></i> 輸入排行榜
                        </button>
                        <button onclick="audioManager.playSFX('click'); audioManager.switchToLobbyBGM(); state.screen='menu'; document.getElementById('game-header').classList.add('hidden'); render();" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 rounded-xl text-sm border border-slate-600">
                            返回主選單
                        </button>
                    </div>
                </div>
            </div>
            <div id="solo-kb-overlay" class="hidden fixed inset-0 bg-black/80 z-[200] flex items-end justify-center pb-4 px-2">
                ${renderKeyboard()}
            </div>
            `;
        };

        // 渲染排行榜
        const renderLeaderboard = () => {
            const diffNames = { 1: '簡易', 2: '中等', 3: '極難' };
            const diffColors = { 1: 'text-green-400', 2: 'text-amber-400', 3: 'text-red-400' };
            const lb = getLeaderboard().sort((a,b) => {
                if (b.cardsPlaced !== a.cardsPlaced) return b.cardsPlaced - a.cardsPlaced;
                if ((b.difficulty||1) !== (a.difficulty||1)) return (b.difficulty||1) - (a.difficulty||1);
                return a.seconds - b.seconds;
            });
            return `
            <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                <div class="bg-slate-900 border-b border-slate-700 p-4 flex items-center justify-between shadow-lg z-10 shrink-0">
                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; render();" class="text-slate-400 hover:text-white transition px-4 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>返回</button>
                    <h2 class="text-xl font-bold text-amber-500 serif-font"><i class="fas fa-trophy mr-2 text-amber-400"></i>無限挑戰排行榜</h2>
                    <div class="w-20"></div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 sm:p-8">
                    ${lb.length === 0 ? `
                    <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-4">
                        <i class="fas fa-trophy text-6xl text-slate-700"></i>
                        <p class="text-lg">尚無記錄，快去挑戰！</p>
                        <button onclick="audioManager.playSFX('click'); state.screen='soloSetup'; render();" class="bg-gradient-to-r from-purple-700 to-indigo-700 text-white font-bold py-3 px-8 rounded-xl">開始挑戰</button>
                    </div>` : `
                    <div class="max-w-lg mx-auto space-y-2 pb-12">
                        ${lb.map((entry,i) => `
                        <div class="leaderboard-row flex items-center gap-4 bg-slate-800/80 border ${i===0?'border-yellow-500/50':i===1?'border-slate-500/50':i===2?'border-amber-800/50':'border-slate-700/30'} rounded-xl px-4 py-3 shadow hover:bg-slate-700/80 transition">
                            <div class="lb-rank font-black text-xl w-8 text-center">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-white text-sm truncate">${entry.name}</div>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="text-slate-500 text-[10px]">${entry.date}</span>
                                    <span class="text-[10px] font-bold ${diffColors[entry.difficulty||1]}">${diffNames[entry.difficulty||1]||'中等'}</span>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <div class="font-black text-white text-lg">${entry.cardsPlaced} <span class="text-slate-400 text-xs font-normal">張</span></div>
                                <div class="text-slate-400 text-[11px]">${formatTime(entry.seconds)}</div>
                            </div>
                        </div>`).join('')}
                        <div class="text-center mt-6">
                            <button onclick="audioManager.playSFX('click'); state.screen='soloSetup'; render();" class="bg-gradient-to-r from-purple-700 to-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:scale-105 transition-transform text-sm"><i class="fas fa-infinity mr-2"></i>再次挑戰</button>
                        </div>
                    </div>`}
                </div>
            </div>
            `;
        };

        // 渲染究極挑戰排行榜
        const renderUltimateLeaderboard = () => {
            const diffNames = { 1: '簡易', 2: '中等', 3: '極難' };
            const diffColors = { 1: 'text-green-400', 2: 'text-amber-400', 3: 'text-red-400' };
            const lb = getUltimateLB();
            return `
            <div class="absolute inset-0 flex flex-col z-50" style="background:#090d16;">
                <div class="border-b border-red-900/50 p-4 flex items-center justify-between shadow-lg z-10 shrink-0" style="background:#1a0505;">
                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; render();" class="text-slate-400 hover:text-white transition px-4 py-2 rounded-lg text-sm" style="background:#0a0202;border:1px solid #7f1d1d;"><i class="fas fa-arrow-left mr-2"></i>返回</button>
                    <h2 class="text-xl font-bold serif-font" style="color:#f87171;"><i class="fas fa-skull-crossbones mr-2 text-red-500"></i>究極挑戰排行榜</h2>
                    <div class="w-20"></div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 sm:p-8">
                    ${lb.length === 0 ? `
                    <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-4">
                        <i class="fas fa-skull-crossbones text-6xl" style="color:#7f1d1d;"></i>
                        <p class="text-lg">尚無記錄，快去挑戰厲始魔王！</p>
                        <button onclick="audioManager.playSFX('click'); state.screen='ultimateSetup'; render();" class="text-white font-bold py-3 px-8 rounded-xl" style="background:linear-gradient(135deg,#7f1d1d,#b91c1c);">開始究極挑戰</button>
                    </div>` : `
                    <div class="max-w-lg mx-auto space-y-2 pb-12">
                        ${lb.map((entry,i) => `
                        <div class="leaderboard-row flex items-center gap-4 rounded-xl px-4 py-3 shadow transition" style="background:${i===0?'rgba(127,29,29,0.5)':'rgba(26,5,5,0.8)'};border:1px solid ${i===0?'rgba(239,68,68,0.5)':i===1?'rgba(100,50,50,0.5)':i===2?'rgba(180,70,30,0.4)':'rgba(127,29,29,0.2)'};">
                            <div class="lb-rank font-black text-xl w-8 text-center">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-white text-sm truncate">${entry.name}</span>
                                    ${entry.cleared ? '<span class="text-[10px] bg-emerald-900/60 text-emerald-400 px-1.5 py-0.5 rounded font-bold">通關</span>' : ''}
                                </div>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="text-slate-500 text-[10px]">${entry.date}</span>
                                    <span class="text-[10px] font-bold ${diffColors[entry.difficulty||2]}">${diffNames[entry.difficulty||2]||'中等'}</span>
                                    <span class="text-[10px] text-slate-500">${entry.cleared ? '💯魔王滅' : '魔王剩'+entry.hp+'%'}</span>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <div class="font-black text-white text-lg">${entry.answered} <span class="text-slate-400 text-xs font-normal">題</span></div>
                                <div class="text-slate-400 text-[11px]">${formatTime(entry.seconds)}</div>
                            </div>
                        </div>`).join('')}
                        <div class="text-center mt-6">
                            <button onclick="audioManager.playSFX('click'); state.screen='ultimateSetup'; render();" class="text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:scale-105 transition-transform text-sm" style="background:linear-gradient(135deg,#7f1d1d,#b91c1c);"><i class="fas fa-skull-crossbones mr-2"></i>再戰厲始魔王</button>
                        </div>
                    </div>`}
                </div>
            </div>
            `;
        };

        const render = () => {
            const app = document.getElementById('app');
            const header = document.getElementById('game-header');
            const noHeaderScreens = ['menu', 'setup', 'soloSetup', 'ultimateSetup', 'gallery', 'leaderboard', 'ultimateLeaderboard', 'soloOver', 'ultimateOver'];
            if (noHeaderScreens.includes(state.screen)) {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
            }

            if (state.screen === 'menu') app.innerHTML = renderMenu();
            else if (state.screen === 'setup') app.innerHTML = renderSetup();
            else if (state.screen === 'soloSetup') app.innerHTML = renderSoloSetup();
            else if (state.screen === 'soloPlay') {
                app.innerHTML = renderSoloPlay();
                const scroll = document.getElementById('timelineContainer');
                if(scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'soloOver') app.innerHTML = renderSoloOver();
            else if (state.screen === 'leaderboard') { audioManager.switchToLobbyBGM(); app.innerHTML = renderLeaderboard(); }
            else if (state.screen === 'ultimateLeaderboard') { audioManager.switchToLobbyBGM(); app.innerHTML = renderUltimateLeaderboard(); }
            else if (state.screen === 'play') {
                app.innerHTML = renderGameTable();
                const scroll = document.getElementById('timelineContainer');
                if (scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'gameover') app.innerHTML = renderGameTable() + renderGameOver();
            else if (state.screen === 'gallery') app.innerHTML = renderGallery();
            else if (state.screen === 'ultimateSetup') app.innerHTML = renderUltimateSetup();
            else if (state.screen === 'ultimatePlay') app.innerHTML = renderUltimatePlay();
            else if (state.screen === 'ultimateOver') app.innerHTML = renderUltimateOver();
        };


        // ===== 自適應縮放系統 v2（全平台適配）=====
        // 判斷是否為「flex 填滿」模式：
        //   - 直向（portrait）任何裝置 → 不縮放
        //   - 橫向但寬度 < 1024px（小平板、手機橫屏）→ 不縮放
        //   - 橫向且寬度 >= 1024px（桌機、大平板橫屏）→ 等比縮放
        function isMobileMode() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const isPortrait = vh > vw;
            return isPortrait || vw < 1024;
        }

        // 取得安全可視高度（考慮 iOS Safari 工具列）
        function safeVH() {
            return window.visualViewport ? window.visualViewport.height : window.innerHeight;
        }
        function safeVW() {
            return window.visualViewport ? window.visualViewport.width : window.innerWidth;
        }

        // 基準設計尺寸（桌機橫向縮放用）
        // 設計高度調高到 768，確保平板橫屏也不會切邊
        const LANDSCAPE_DESIGN_H = 768;
        const LANDSCAPE_DESIGN_W_MIN = 1024;

        function applyScale() {
            const vw = safeVW();
            const vh = safeVH();
            const root = document.getElementById('scale-root');
            const app = document.getElementById('app');

            if (isMobileMode()) {
                // ===== 手機/平板直向/小螢幕：取消縮放，flex 填滿 =====
                root.style.width       = vw + 'px';
                root.style.height      = vh + 'px';
                root.style.transform   = 'none';
                root.style.left        = '0px';
                root.style.top         = '0px';
                root.style.position    = 'fixed';
                root.style.display     = 'flex';
                root.style.flexDirection = 'column';
                if (app) {
                    app.style.position  = 'relative';
                    app.style.flex      = '1';
                    app.style.width     = '100%';
                    app.style.height    = '';
                    app.style.minHeight = '0';
                    app.style.inset     = '';
                    app.style.overflow  = 'hidden';
                }
            } else {
                // ===== 桌機/大平板橫向：等比例縮放至填滿視窗 =====
                root.style.display       = 'block';
                root.style.flexDirection = '';
                if (app) {
                    app.style.position  = 'absolute';
                    app.style.flex      = '';
                    app.style.width     = '';
                    app.style.height    = '';
                    app.style.minHeight = '';
                    app.style.inset     = '0';
                    app.style.overflow  = '';
                }
                // 動態計算設計寬度（配合螢幕比例）
                const designH = LANDSCAPE_DESIGN_H;
                const designW = Math.max(LANDSCAPE_DESIGN_W_MIN, Math.round((vw / vh) * designH));
                // 縮放比：同時確保寬高都能放進螢幕
                const scale = Math.min(vw / designW, vh / designH);

                const scaledW = designW * scale;
                const scaledH = designH * scale;
                root.style.width     = designW + 'px';
                root.style.height    = designH + 'px';
                root.style.transform = `scale(${scale})`;
                root.style.position  = 'fixed';
                root.style.left      = ((vw - scaledW) / 2) + 'px';
                root.style.top       = ((vh - scaledH) / 2) + 'px';
            }
        }

        // 監聽 visualViewport（iOS Safari 動態工具列）
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', applyScale);
        }
        // 初始化＆監聽 resize / orientationchange
        applyScale();
        window.addEventListener('resize', applyScale);
        window.addEventListener('orientationchange', () => { setTimeout(applyScale, 200); });
        // ===== 縮放系統結束 =====

        window.onload = () => { applyScale(); render(); };
        window.addEventListener('resize', () => {
            applyScale();
            if (state.screen === 'play' || state.screen === 'gameover' || state.screen === 'menu' || state.screen === 'soloPlay' || state.screen === 'ultimatePlay') render();
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                applyScale();
                render();
            }, 300);
        });
    </script>
</body>
</html>
