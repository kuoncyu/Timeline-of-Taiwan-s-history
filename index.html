        async function champToggleReady() {

        // 生成比賽分組
        // 總人數 2~5 人：2~3人一組（超過3人拆成兩組各維持2~3人）
        // 總人數 6 人以上：每組 3~4 人
        function champGenerateBracket(playerIds, roundNum) {
            // 過濾掉戰情中心（不參與比賽）
            const filteredIds = playerIds.filter(id => !id.startsWith('warroom_'));
            const n = filteredIds.length;
            const shuffled = [...filteredIds].sort(() => Math.random() - 0.5);
            let groups = [];

            if (n <= 3) {
                // 1~3人：直接一組
                groups = [shuffled];
            } else if (n === 4) {
                // 4人：拆成兩組各2人
                groups = [shuffled.slice(0, 2), shuffled.slice(2)];
            } else if (n === 5) {
                // 5人：拆成兩組 (3+2)
                groups = [shuffled.slice(0, 3), shuffled.slice(3)];
            } else {
                // 6人以上：每組 3~4 人
                const groupCount = Math.ceil(n / 4);
                for (let i = 0; i < groupCount; i++) {
                    const start = Math.floor(i * n / groupCount);
                    const end = Math.floor((i + 1) * n / groupCount);
                    groups.push(shuffled.slice(start, end));
                }
            }

            return groups.map((g, i) => ({
                matchId: `r${roundNum}_m${i}`,
                players: g.reduce((acc, pid) => {
                    acc[pid] = { name: champState.players[pid]?.name || pid, status: 'waiting' };
                    return acc;
                }, {}),
                status: 'pending',
                winner: null
            }));
        }

        async function champStartGame() {
            if (!champState.isHost) return;
            const playerIds = Object.keys(champState.players);
            if (playerIds.length < 2) return alert('至少需要2位玩家！');
            const bracket = champGenerateBracket(playerIds, 1);
            const bracketObj = bracket.reduce((acc, m) => { acc[m.matchId] = m; return acc; }, {});
            champState.bracket = bracketObj;
            const db = window.firebaseDB;
            // Step 1: push bracket with grouped status so all clients see the bracket tree
            await window.firebaseUpdate(window.firebaseRef(db, `rooms/${champState.roomCode}`), {

                bracket: bracketObj,
                round: 1,
                brackets_revealed: true,
                match_start: false

            audioManager.playSFX('win');
            state.screen = 'champBracketTree';
            render();
        }

        // ── 賽程表 ──
        function champSetMyCurrentMatch() {
            if (!champState.bracket || !champState.playerId) return;
            for (const [mid, match] of Object.entries(champState.bracket)) {
                if (match.players && match.players[champState.playerId] && match.status !== 'done') {

            champState.currentMatchId = null; // eliminated or champion

                    setTimeout(() => {

                            render();
                        }

            champState.unsubscribes.push(unsub);
            // 監聽整個房間（bracket + waiting_winners + champion + round）

                if (state.screen === 'champBracket' || state.screen === 'champObserve' || state.screen === 'champBracketTree') render();
            });

                        ${myMatch.status === 'pending' ? `<div class="text-slate-400 text-xs">等待開始...</div>` : ''}
                        ${myMatch.status === 'playing' ? `
                        <button onclick="champStartMyGame()" class="champ-btn text-white font-bold py-2 px-6 rounded-lg text-sm" style="background:linear-gradient(135deg,#065f46,#022c22);border:1px solid rgba(16,185,129,0.4);">
                            <i class="fas fa-play mr-2"></i>進入比賽！
                        </button>` : ''}
                        ${myMatch.status === 'done' ? `<div class="text-emerald-400 font-bold text-sm">✅ 本場已結束${myMatch.winner===champState.playerId ? ' — 你晉級了！🏆' : ' — 等待結果'}</div>` : ''}
                    </div>` : `
                    <div class="mb-3 rounded-xl p-3 text-center bg-slate-900/60 border border-slate-700/40">
                        <div class="text-slate-400 text-sm">${isEliminated ? '你已被淘汰，觀賽中...' : '等待下一輪分組...'}</div>
                    </div>`}

                    <!-- 所有比賽列表 -->
                    <div class="text-amber-400 text-xs font-bold mb-2"><i class="fas fa-sitemap mr-1"></i>本輪賽程</div>
                    <div class="space-y-2">
                        ${matches.map(m => `
                        <div class="bracket-match p-3 ${m.status==='done' ? 'done' : m.matchId===myMatchId ? 'active' : ''}">
                            <div class="flex items-center justify-between mb-1.5">
                                <span class="text-amber-400/70 text-[11px] font-bold">${m.matchId}</span>
                                <span class="text-[11px] font-bold ${m.status==='done' ? 'text-emerald-400' : m.status==='playing' ? 'text-amber-400' : 'text-slate-500'}">${m.status==='done' ? '✅ 已完成' : m.status==='playing' ? '⚔️ 進行中' : '⏳ 等待中'}</span>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                ${Object.entries(m.players||{}).map(([pid, p]) => `<span class="player-pill ${m.winner===pid ? 'winner' : ''}">${p.name}${m.winner===pid ? ' 🏆' : ''}</span>`).join('')}
                            </div>
                        </div>`).join('')}
                    </div>
                    ${allDone ? `<div class="mt-3 text-center text-emerald-400 font-bold text-sm">所有場次完成！等待主持人公布下一輪...</div>` : ''}
                </div>
            </div>`;
        };

        // ══════════════════════════════════════════════════
        // 冠軍爭霸戰：Firebase 同步多人對戰引擎
        // ══════════════════════════════════════════════════

        // 我在這場比賽中對應的本地 player index
        champState.myGamePlayerId = null; // 我的 firebase pid
        champState.myGamePlayerIndex = -1; // 對應 state.players 的 index
        champState.gameUnsub = null; // 遊戲狀態監聽取消函式

        // 序列化手牌（只傳 card id）
        function serializeHand(hand) {
            return (hand || []).map(c => c.id);
        }
        // 反序列化手牌
        function deserializeHand(ids) {
            return (ids || []).map(id => ALL_CARDS.find(c => c.id === id)).filter(Boolean);
        }

        // 把完整 state 序列化上傳 Firebase
        function serializeGameState() {
            return {
                timeline: state.timeline.map(c => c.id),
                deck: state.deck.map(c => c.id),
                players: state.players.map(p => ({
                    id: p.id,
                    name: p.name,
                    icon: p.icon,
                    isAI: p.isAI,
                    corner: p.corner,
                    hand: serializeHand(p.hand)
                })),
                currentPlayerIndex: state.currentPlayerIndex,
                roundNum: state.roundNum,
                deckSize: state.deck.length,
                firstMatchDone: state.firstMatchDone,
                deathMatchPlayers: state.deathMatchPlayers || null,
                deathMatchCorrect: state.deathMatchCorrect || [],
                isExtremeDeath: state.isExtremeDeath || false,
                roundFinishers: state.roundFinishers || [],
                extremeSkipped: state.extremeSkipped || [],
                screen: state.screen,
                winners: (state.winners || []).map(w => w ? w.id : null)
            };
        }

        // 把 Firebase 遊戲狀態反序列化到本地 state
        function deserializeGameState(gs) {
            if (!gs) return;
            state.timeline = (gs.timeline || []).map(id => ALL_CARDS.find(c => c.id === id)).filter(Boolean);
            state.deck = (gs.deck || []).map(id => ALL_CARDS.find(c => c.id === id)).filter(Boolean); // ← 還原完整牌堆
            state.players = (gs.players || []).map(p => ({
                id: p.id,
                name: p.name,
                icon: p.icon || 'fa-user',
                isAI: p.isAI || false,
                corner: p.corner,
                hand: deserializeHand(p.hand)
            }));
            state.currentPlayerIndex = gs.currentPlayerIndex || 0;
            state.roundNum = gs.roundNum || 1;
            state.firstMatchDone = gs.firstMatchDone || false;
            state.deathMatchPlayers = gs.deathMatchPlayers || null;
            state.deathMatchCorrect = gs.deathMatchCorrect || [];
            state.isExtremeDeath = gs.isExtremeDeath || false;
            state.roundFinishers = gs.roundFinishers || [];
            state.extremeSkipped = gs.extremeSkipped || [];
            state.selectedCardId = null;
            state.previewCard = null;
        }

        // 上傳遊戲狀態到 Firebase（任何玩家出牌後皆可呼叫）
        async function champSyncGameState(extraFields) {
            if (!champState.roomCode || !champState.currentMatchId) return;
            const db = window.firebaseDB;
            const gs = serializeGameState();
            if (extraFields) Object.assign(gs, extraFields);
            await window.firebaseSet(
                window.firebaseRef(db, `rooms/${champState.roomCode}/match_games/${champState.currentMatchId}`),
                gs
            );
        }

        // 監聽遊戲狀態（所有玩家共用）
        function champListenGameState(matchId) {
            if (champState.gameUnsub) { try { champState.gameUnsub(); } catch(e){} }
            const db = window.firebaseDB;
            const gsRef = window.firebaseRef(db, `rooms/${champState.roomCode}/match_games/${matchId}`);
            const unsub = window.firebaseOnValue(gsRef, (snap) => {
                if (!snap.exists()) return;
                // 若本機正在執行出牌 → endTurn 流程，暫時不接收 Firebase 覆蓋
                if (champState.isWriting) return;
                const gs = snap.val();
                // 所有玩家都接收 Firebase 狀態為唯一來源
                deserializeGameState(gs);
                // 更新 header
                const headerRound = document.getElementById('display-round');
                if (headerRound) headerRound.innerText = `第 ${state.roundNum} 回合`;
                const headerDeck = document.getElementById('game-deck-count');
                if (headerDeck) headerDeck.innerText = gs.deckSize || 0;
                // 遊戲結束
                if (gs.screen === 'gameover' && gs.winners && gs.winners.length > 0) {
                    const winnerId = gs.winners[0];
                    const winner = state.players.find(p => p.id === winnerId);
                    if (winner && state.screen !== 'gameover') {
                        stopTimer();
                        audioManager.playSFX('win');
                        setTimeout(() => audioManager.switchToResultBGM(), 1500);
                        state.winners = [winner]; state.screen = 'gameover';
                    }
                    // 所有玩家都嘗試上報結果到 Firebase（冪等保護：bracket 已是 done 則跳過）
                    if (champState.currentMatchId && champState.roomCode && !champState._resultReported) {
                        champState._resultReported = true;
                        const db = window.firebaseDB;
                        const bracketMatchRef = window.firebaseRef(db, `rooms/${champState.roomCode}/bracket/${champState.currentMatchId}`);
                        window.firebaseGet(bracketMatchRef).then(snap => {
                            if (!snap.exists()) return;
                            const matchData = snap.val();
                            if (matchData.status === 'done') return; // 已上報，跳過
                            // 從 gs.winners[0]（local player id）找到 firebase pid
                            const winnerLocalPlayer = state.players.find(p => p.id === gs.winners[0]);
                            if (!winnerLocalPlayer) return;
                            const winnerFirebasePid = Object.entries(matchData.players || {}).find(([pid, p]) => p.name === winnerLocalPlayer.name)?.[0];
                            if (!winnerFirebasePid) return;
                            champReportMatchResult(winnerFirebasePid);
                        }).catch(() => {});
                    }
                } else if (gs.screen === 'play') {
                    state.screen = 'play';
                }
                render();
            });
            champState.gameUnsub = unsub;
            champState.unsubscribes.push(unsub);
        }

        // ── 玩家出牌動作（冠軍爭霸戰同步版）──
        async function champHandleGapClick(insertIndex) {
            // 只有輪到自己才能出牌
            const curPlayer = state.players[state.currentPlayerIndex];
            if (!curPlayer) return;
            if (curPlayer.id !== champState.myGamePlayerIndex) return; // 不是我的回合
            if (!state.selectedCardId) return showToast('請先點選一張手牌！', false);

            // 標記「正在寫入中」，讓 listener 暫時不覆蓋本地 state
            champState.isWriting = true;

            // 執行本地邏輯（handleGapClick 內部會 setTimeout(endTurn, 2000)）
            handleGapClick(insertIndex, false);

            // 等待 endTurn 完成（2000ms + 緩衝）後再同步，確保 currentPlayerIndex 已更新
            setTimeout(async () => {
                await champSyncGameState();
                champState.isWriting = false; // 解鎖，之後的 Firebase 更新才能覆蓋本地 state
            }, 2200);
        }

        async function champStartMyGame() {
            const db = window.firebaseDB;
            const match = champState.bracket[champState.currentMatchId];
            if (!match) return;
            const matchPlayerIds = Object.keys(match.players); // firebase player IDs
            const myFirebasePid = champState.playerId;
            const myPositionInMatch = matchPlayerIds.indexOf(myFirebasePid);

            // 不再區分 host，任何人都有同等寫入權限
            champState.isChampGameHost = false; // 廢棄，保留以免其他地方參照報錯
            champState.myGamePlayerIndex = myPositionInMatch; // local player index

            // 更新 Firebase 比賽狀態
            await window.firebaseUpdate(window.firebaseRef(db, `rooms/${champState.roomCode}/bracket/${champState.currentMatchId}`), { status: 'playing' });

            const settings = champState.settings;
            champState.inChampGame = true;
            state.isVsAI = false;

            // 先監聽遊戲狀態
            champListenGameState(champState.currentMatchId);

            // 檢查 Firebase 是否已有初始狀態；若無，由排序第一的玩家負責初始化並寫入
            const existingSnap = await window.firebaseGet(
                window.firebaseRef(db, `rooms/${champState.roomCode}/match_games/${champState.currentMatchId}`)
            );
            if (!existingSnap.exists()) {
                if (myPositionInMatch === 0) {
                    // 我是排序第一的玩家，負責初始化遊戲並寫入 Firebase
                    startGame(matchPlayerIds.length, settings.periods, '0.75', settings.difficulty);
                    matchPlayerIds.forEach((fbPid, i) => {
                        if (state.players[i]) {
                            state.players[i].name = match.players[fbPid].name;
                        }
                    });
                    await champSyncGameState();
                }
                // 其他玩家等待 champListenGameState 的 onValue 觸發後自動更新
            }

            audioManager.switchToGameBGM();
            document.getElementById('game-header').classList.remove('hidden');
            state.screen = 'play';
            render();
        }

        // champListenMatchActions 已廢棄：新架構下每位玩家直接寫入完整 game state，
        // 不再需要 Host 轉發 match_actions。保留空函式以防舊程式碼意外呼叫。
        function champListenMatchActions() { /* no-op */ }

        // ── 戰情中心設定 ──
        let warRoomNameInput = 'GM';
        const renderChampWarRoomSetup = () => `
            <div class="absolute inset-0 flex flex-col items-center justify-center p-6 lobby-bg">
                <button onclick="audioManager.playSFX('click'); state.screen='champMenu'; render();" class="absolute top-4 left-4 z-20 text-slate-400 hover:text-amber-400 transition text-sm"><i class="fas fa-arrow-left mr-1"></i> 返回</button>
                <div class="glass-panel p-6 rounded-2xl w-full max-w-sm animate-scale-up border border-yellow-500/40">
                    <h3 class="text-lg font-black text-yellow-400 serif-font mb-4 text-center"><i class="fas fa-chess-king mr-2"></i>戰情中心 主控設定</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs text-amber-400 font-bold mb-1 block">主控名稱</label>
                            <input id="wr-name" type="text" maxlength="8" placeholder="戰情中心" value="${warRoomNameInput}"
                                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-yellow-500 focus:outline-none"
                                oninput="warRoomNameInput=this.value"/>
                        </div>
                        <div>
                            <label class="text-xs text-amber-400 font-bold mb-1 block"><i class="fas fa-layer-group mr-1"></i>考驗難度</label>
                            <select id="wr-diff" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm">
                                <option value="1">簡易</option>
                                <option value="2" selected>中等 (常規)</option>
                                <option value="3">極難 (含冷門)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs text-amber-400 font-bold mb-2 block"><i class="fas fa-calendar-alt mr-1"></i>時代主題</label>
                            <div class="grid grid-cols-2 gap-1">
                                ${ALL_PERIODS.map(p => `<label class="flex items-center gap-2 bg-slate-800/60 p-1.5 rounded cursor-pointer border border-slate-700/50 text-xs"><input type="checkbox" value="${p.id}" class="wr-period-cb h-3 w-3 text-amber-500" ${['qing','japanese','modern'].includes(p.id)?'checked':''}><span class="text-slate-200">${p.name}</span></label>`).join('')}
                            </div>
                        </div>
                        <button onclick="champWarRoomCreate()" class="w-full champ-btn text-white font-bold py-3 rounded-xl text-sm champion-glow" style="background:linear-gradient(135deg,#78350f,#92400e);border:1px solid rgba(251,191,36,0.5);">
                            <i class="fas fa-chess-king mr-2 text-yellow-300"></i>建立戰情中心
                        </button>
                    </div>
                </div>
            </div>
        `;

        async function champWarRoomCreate() {
            const nameEl = document.getElementById('wr-name');
            const diffEl = document.getElementById('wr-diff');
            const name = nameEl ? nameEl.value.trim() : warRoomNameInput;
            const diff = parseInt(diffEl ? diffEl.value : 2);
            const periods = Array.from(document.querySelectorAll('.wr-period-cb:checked')).map(c => c.value);
            if (!periods.length) return alert('請至少選一個時代！');
            if (!window.firebaseReady) return alert('連線中，請稍後再試');

            const code = generateRoomCode();
            const pid = 'warroom_' + generatePlayerId();
            champState.roomCode = code;
            champState.playerName = name || 'GM';
            champState.playerId = pid;
            champState.isHost = true;
            champState.isWarRoom = true;
            champState.settings = { periods, difficulty: diff };

            const db = window.firebaseDB;
            await window.firebaseSet(window.firebaseRef(db, `rooms/${code}`), {
                host: pid,
                isWarRoom: true,
                status: 'waiting',
                settings: { periods, difficulty: diff },
                createdAt: Date.now(),
                players: {}
            });

            state.screen = 'champWarRoomLobby';
            render();
            champWarRoomListen(code);
        }

        function champWarRoomListen(code) {
            champUnsubscribeAll();
            const db = window.firebaseDB;
            const roomRef = window.firebaseRef(db, `rooms/${code}`);
            const unsub = window.firebaseOnValue(roomRef, (snap) => {
                if (!snap.exists()) return;
                const data = snap.val();
                champState.players = data.players || {};
                champState.bracket = data.bracket || null;
                champState.roundNum = data.round || champState.roundNum;
                champState.waitingWinners = data.waiting_winners || {};
                champState.champion = data.champion || null;
                if (data.bracket && state.screen === 'champWarRoomLobby') {
                    state.screen = 'champBracketTree';
                }
                if (state.screen === 'champWarRoomLobby' || state.screen === 'champObserve' || state.screen === 'champBracketTree') render();
            });
            champState.unsubscribes.push(unsub);
            // 監聽 match_games 即時資料（供觀戰模式使用）
            const matchGamesRef = window.firebaseRef(db, `rooms/${code}/match_games`);
            const unsub2 = window.firebaseOnValue(matchGamesRef, (snap) => {
                champState.matchGames = snap.exists() ? snap.val() : {};
                if (state.screen === 'champObserve') render();
            });
            champState.unsubscribes.push(unsub2);
        }

        // ── 戰情中心大廳 ──
        const renderChampWarRoomLobby = () => {
            const players = champState.players || {};
            const playerList = Object.entries(players).filter(([id]) => !id.startsWith('warroom_'));
            const bracket = champState.bracket;
            const allReady = playerList.length >= 2 && playerList.every(([id, p]) => p.ready);
            return `
            <div class="absolute inset-0 flex flex-col lobby-bg overflow-hidden">
                <div class="flex items-center justify-between px-4 py-2 border-b border-amber-900/30 bg-black/60" style="min-height:44px;">
                    <button onclick="champGoBack();" class="text-slate-400 hover:text-red-400 transition text-xs"><i class="fas fa-times mr-1"></i>關閉戰情中心</button>
                    <span class="text-yellow-400 font-black text-sm serif-font"><i class="fas fa-chess-king mr-1"></i>戰情中心</span>
                    <span class="text-amber-400 font-mono font-black text-sm">房號: ${champState.roomCode}</span>
                </div>
                <div class="flex-1 overflow-y-auto p-3 flex flex-col gap-3">
                    <!-- 房號顯示 -->
                    <div class="rounded-xl p-3 text-center" style="background:linear-gradient(135deg,rgba(120,53,15,0.5),rgba(30,15,0,0.7));border:1px solid rgba(251,191,36,0.4);">
                        <div class="text-amber-400 text-xs font-bold mb-1 tracking-widest">參戰房號（分享給玩家）</div>
                        <div class="room-code-display">${champState.roomCode}</div>
                    </div>

                    <!-- 玩家列表 -->
                    <div class="glass-panel rounded-xl p-3 border border-white/5">
                        <div class="text-amber-400 text-xs font-bold mb-2"><i class="fas fa-users mr-1"></i>已加入玩家 (${playerList.length}人)</div>
                        <div class="grid grid-cols-2 gap-1.5 max-h-32 overflow-y-auto">
                            ${playerList.length === 0 ? '<div class="col-span-2 text-slate-500 text-xs text-center py-2">等待玩家加入...</div>' :
                            playerList.map(([id, p]) => {
                                const canKick = !bracket;
                                const kickBtn = canKick
                                    ? '<button onclick="champKickPlayer(\''+id+'\',\''+p.name.replace(/\'/g,"\\\'")+'\')" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.5);color:#f87171;font-weight:900;font-size:14px;width:22px;height:22px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>'
                                    : (p.ready ? '<span style="color:#34d399;font-size:12px;font-weight:bold;">✓</span>' : '<span style="color:#64748b;font-size:11px;">...</span>');
                                return '<div class="flex items-center justify-between bg-slate-800/50 rounded-lg px-2 py-1.5">'
                                     + '<span class="text-white text-xs font-bold truncate">' + p.name + '</span>'
                                     + kickBtn
                                     + '</div>';
                            }).join('')}
                        </div>
                        ${!bracket && playerList.length > 0 ? '<div class="text-slate-500 text-[10px] text-center mt-1.5"><i class="fas fa-hand-pointer mr-1"></i>點擊玩家名稱可將其踢除</div>' : ''}
                    </div>

                    <!-- 分組管理 -->
                    ${!bracket ? `
                    <button onclick="champWarRoomGenerateBracket()" class="w-full champ-btn text-white font-bold py-3 rounded-xl text-sm ${allReady ? 'champion-glow' : 'opacity-60'}" style="background:linear-gradient(135deg,#78350f,#92400e);border:1px solid rgba(251,191,36,0.4);" ${allReady ? '' : 'disabled'}>
                        <i class="fas fa-sitemap mr-2 text-yellow-300"></i>${allReady ? '確認分組！展示賽程' : `等待玩家準備 (${playerList.filter(([id,p])=>p.ready).length}/${playerList.length})`}
                    </button>` : `
                    <!-- 賽程已產生，跳轉到樹狀圖 -->
                    <button onclick="state.screen='champBracketTree'; render();" class="w-full champ-btn text-white font-bold py-3 rounded-xl text-sm champion-glow" style="background:linear-gradient(135deg,#1e3a8a,#1e1b4b);border:1px solid rgba(99,102,241,0.5);">
                        <i class="fas fa-sitemap mr-2 text-indigo-300"></i>查看賽程樹狀圖
                    </button>
                    <!-- 顯示賽程表（摘要） -->
                    <div class="glass-panel rounded-xl p-3 border border-amber-500/20">
                        <div class="text-amber-400 text-xs font-bold mb-2"><i class="fas fa-sitemap mr-1"></i>賽程分組 (第 ${champState.roundNum} 輪)</div>
                        <div class="space-y-2">
                            ${Object.values(bracket).map(m => `
                            <div class="match-observer-card ${champState.observingMatchId===m.matchId ? 'selected' : ''}" onclick="champState.observingMatchId='${m.matchId}'; state.screen='champObserve'; render();">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-amber-400/80 text-[11px] font-bold">${m.matchId}</span>
                                    <span class="text-[10px] font-bold ${m.status==='done' ? 'text-emerald-400' : m.status==='playing' ? 'text-amber-400' : 'text-slate-500'}">${m.status==='done' ? '✅ 完成' : m.status==='playing' ? '⚔️ 進行中' : '⏳ 等待'}</span>
                                </div>
                                <div class="flex flex-wrap gap-1">
                                    ${Object.entries(m.players||{}).map(([pid, p]) => `<span class="text-[11px] ${m.winner===pid ? 'text-emerald-400 font-bold' : 'text-slate-300'}">${p.name}${m.winner===pid ? ' 🏆' : ''}</span>`).join('<span class="text-slate-600 text-xs mx-0.5">vs</span>')}
                                </div>
                            </div>`).join('')}
                        </div>
                        ${(() => {
                            const allDoneLocal = Object.values(bracket).length > 0 && Object.values(bracket).every(m => m.status==='done');
                            const ww = champState.waitingWinners || {};
                            const wwList = Object.entries(ww);
                            const champ = champState.champion;
                            if (champ) return `<div class="mt-2 text-center text-yellow-400 font-bold text-sm">🏆 冠軍：${champ.name}</div>`;
                            if (allDoneLocal) return `
                                ${wwList.length > 0 ? `
                                <div class="mt-2 rounded-lg p-2 border border-emerald-500/30" style="background:rgba(6,78,59,0.25);">
                                    <div class="text-emerald-400 text-[11px] font-bold mb-1"><i class="fas fa-hourglass-half mr-1"></i>晉級等待區</div>
                                    ${wwList.map(([pid,w]) => `<div class="text-emerald-200 text-xs py-0.5">🏆 ${w.name}</div>`).join('')}
                                </div>` : ''}
                                <button onclick="champWarRoomNextRound()" class="w-full champ-btn text-white font-bold py-2 rounded-lg text-sm mt-2 champion-glow" style="background:linear-gradient(135deg,#065f46,#022c22);border:1px solid rgba(16,185,129,0.4);">
                                    <i class="fas fa-arrow-right mr-2"></i>進入下一輪（${wwList.length} 人晉級）
                                </button>`;
                            return '';
                        })()}
                    </div>`}
                </div>
            </div>`;
        };

        async function champWarRoomGenerateBracket() {
            const playerIds = Object.keys(champState.players).filter(id => !id.startsWith('warroom_'));
            if (playerIds.length < 2) return alert('至少需要2位玩家！');
            const matches = champGenerateBracket(playerIds, champState.roundNum);
            const bracketObj = matches.reduce((acc, m) => { acc[m.matchId] = m; return acc; }, {});
            champState.bracket = bracketObj;
            const db = window.firebaseDB;
            await window.firebaseUpdate(window.firebaseRef(db, `rooms/${champState.roomCode}`), {
                status: 'grouped',
                bracket: bracketObj,
                round: champState.roundNum,
                brackets_revealed: true,
                match_start: false
            });
            audioManager.playSFX('win');
            state.screen = 'champBracketTree';
            render();
        }

        async function champWarRoomNextRound() {
            const bracket = champState.bracket || {};
            const allDone = Object.values(bracket).length > 0 && Object.values(bracket).every(m => m.status === 'done');
            if (!allDone) return showToast('尚有場次未完成！', false);

            // 從現有 bracket 收集所有勝者（含名字）
            const winnerMap = {}; // pid -> name
            Object.values(bracket).forEach(m => {
                if (m.winner && m.players && m.players[m.winner]) {
                    winnerMap[m.winner] = m.players[m.winner].name;
                }
            });
            const winners = Object.keys(winnerMap);

            if (winners.length === 1) {
                // 冠軍誕生！
                const champName = winnerMap[winners[0]];
                const db = window.firebaseDB;
                await window.firebaseUpdate(window.firebaseRef(db, `rooms/${champState.roomCode}`), {
                    status: 'champion',
                    champion: { pid: winners[0], name: champName },
                    waiting_winners: null
                });
                launchConfetti();
                render();
                return;
            }

            // 確保 champState.players 含有所有晉級者（供 champGenerateBracket 查名字）
            winners.forEach(pid => {
                if (!champState.players[pid]) {
                    champState.players[pid] = { name: winnerMap[pid], ready: true };
                }
            });

            champState.roundNum++;
            const matches = champGenerateBracket(winners, champState.roundNum);
            const bracketObj = matches.reduce((acc, m) => { acc[m.matchId] = m; return acc; }, {});
            champState.bracket = bracketObj;
            const db = window.firebaseDB;
            await window.firebaseUpdate(window.firebaseRef(db, `rooms/${champState.roomCode}`), {
                status: 'grouped',
                bracket: bracketObj,
                round: champState.roundNum,
                match_start: false,
                waiting_winners: null  // 清空等待區，準備接收新一輪勝者
            });
            audioManager.playSFX('win');
            state.screen = 'champBracketTree';
            render();
        }

        // ── 戰情中心：踢除玩家 ──
        function champKickPlayer(playerId, playerName) {
            // 只有戰情中心管理員可操作
            if (!champState.isWarRoom) return;
            // 顯示確認彈窗
            const overlay = document.createElement('div');
            overlay.id = 'kick-confirm-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);';
            overlay.innerHTML = `
                <div style="background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(239,68,68,0.4);border-radius:16px;padding:24px;max-width:280px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.8);">
                    <div style="font-size:2rem;margin-bottom:8px;">⚠️</div>
                    <div style="color:#fbbf24;font-weight:900;font-size:1rem;margin-bottom:6px;">踢除玩家</div>
                    <div style="color:#e2e8f0;font-size:0.85rem;margin-bottom:20px;">確定要將 <span style="color:#f87171;font-weight:bold;">${playerName}</span> 踢出房間？</div>
                    <div style="display:flex;gap:10px;">
                        <button onclick="document.getElementById('kick-confirm-overlay').remove();"
                            style="flex:1;background:#1e293b;border:1px solid #334155;color:#94a3b8;font-weight:bold;padding:10px;border-radius:10px;cursor:pointer;font-size:0.85rem;">
                            取消
                        </button>
                        <button onclick="champConfirmKick('${playerId}'); document.getElementById('kick-confirm-overlay').remove();"
                            style="flex:1;background:linear-gradient(135deg,#991b1b,#7f1d1d);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;font-weight:bold;padding:10px;border-radius:10px;cursor:pointer;font-size:0.85rem;">
                            <i class="fas fa-user-times mr-1"></i>踢除
                        </button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            // 點擊背景也可關閉
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        }

        async function champConfirmKick(playerId) {
            const db = window.firebaseDB;
            try {
                await window.firebaseRemove(window.firebaseRef(db, `rooms/${champState.roomCode}/players/${playerId}`));
                // 同步本地狀態
                if (champState.players && champState.players[playerId]) {
                    delete champState.players[playerId];
                }
                showToast('已踢除玩家', true);
                render();
            } catch(e) {
                showToast('踢除失敗，請重試', false);
            }
        }

        // ── 戰情中心：比賽開始（所有組同時開始）──
        async function champWarRoomStartAllMatches() {
            if (!champState.isHost || !champState.bracket) return;
            const db = window.firebaseDB;
            // Mark all matches as 'playing' and set match_start flag
            const updates = {};
            Object.keys(champState.bracket).forEach(mid => {
                updates[`rooms/${champState.roomCode}/bracket/${mid}/status`] = 'playing';
            });
            updates[`rooms/${champState.roomCode}/status`] = 'playing';
            updates[`rooms/${champState.roomCode}/match_start`] = true;
            updates[`rooms/${champState.roomCode}/match_start_time`] = Date.now();
            await window.firebaseUpdate(window.firebaseRef(db, '/'), updates);
            audioManager.playSFX('win');
            render();
        }

        // ── 賽程樹狀圖（戰情中心視角）──
        function renderBracketTreeSVG(bracket) {
            // Build rounds history from matchId names r1_m0, r2_m0, etc.
            const matches = Object.values(bracket);
            if (!matches.length) return '<div class="text-slate-500 text-xs text-center py-4">無賽程資料</div>';

            // Group by round number
            const roundMap = {};
            matches.forEach(m => {
                const rMatch = m.matchId.match(/^r(\d+)/);
                const r = rMatch ? parseInt(rMatch[1]) : 1;
                if (!roundMap[r]) roundMap[r] = [];
                roundMap[r].push(m);
            });
            const rounds = Object.keys(roundMap).map(Number).sort((a,b) => a-b);
            const maxRound = Math.max(...rounds);

            // Find overall winner (if only 1 match in last round and it's done)
            const lastRoundMatches = roundMap[maxRound] || [];
            const overallWinner = lastRoundMatches.length === 1 && lastRoundMatches[0].status === 'done'
                ? lastRoundMatches[0].players?.[lastRoundMatches[0].winner]
                : null;

            // Render: top = champion, then connectors, then rounds bottom-to-top
            // We display rounds in order: champion zone → round N (最新/決賽) → ... → round 1 (初賽)
            const roundsDesc = [...rounds].reverse(); // latest round first (top)

            let html = '<div class="bracket-tree">';

            // Champion trophy
            html += `<div class="bt-champion-zone">
                <div class="bt-champion-cup ${overallWinner ? 'has-winner' : ''}">
                    <div style="font-size:1.8rem;">🏆</div>
                    <div style="font-size:0.75rem;font-weight:900;color:#fbbf24;margin-top:2px;">${overallWinner ? overallWinner.name : '冠軍'}</div>
                    <div style="font-size:0.6rem;color:rgba(253,230,138,0.7);">${overallWinner ? '已誕生！' : '待定'}</div>
                </div>
            </div>`;

            // For each round top-down
            roundsDesc.forEach((r, ri) => {
                const rMatches = roundMap[r] || [];
                const isFirstRound = r === Math.min(...rounds);
                const roundLabel = isFirstRound ? '初賽' : r === maxRound ? (rMatches.length === 1 ? '決賽' : `第${r}輪`) : `第${r}輪`;

                // Connector line from above
                html += `<div class="bt-connector-v" style="height:${ri === 0 ? 28 : 18}px;"></div>`;

                // Round label
                html += `<div style="font-size:10px;color:rgba(251,191,36,0.5);font-weight:700;letter-spacing:0.1em;margin-bottom:6px;text-align:center;">${roundLabel}</div>`;

                // Matches row
                html += `<div class="bt-matches-row">`;
                rMatches.forEach((m, mi) => {
                    const statusClass = m.status === 'done' ? 'status-done' : m.status === 'playing' ? 'status-playing' : '';
                    const statusLabel = m.status === 'done' ? '✅完成' : m.status === 'playing' ? '⚔️進行中' : '⏳等待';
                    const players = Object.entries(m.players || {});

                    html += `<div class="bt-match-card ${statusClass}" onclick="if(champState.isWarRoom){champState.observingMatchId='${m.matchId}'; state.screen='champObserve'; render();}">`;
                    html += `<div class="bt-match-label"><span>${m.matchId}</span><span style="color:${m.status==='done'?'#34d399':m.status==='playing'?'#fbbf24':'#64748b'}">${statusLabel}</span></div>`;
                    players.forEach(([pid, p]) => {
                        const isWinner = m.winner === pid;
                        html += `<div class="bt-player-row ${isWinner ? 'winner' : ''}">
                            <span style="font-size:10px;">${isWinner ? '🏆' : '👤'}</span>
                            <span style="font-size:12px;font-weight:${isWinner?'900':'600'};color:${isWinner?'#34d399':'#cbd5e1'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;">${p.name}</span>
                        </div>`;
                    });
                    html += `</div>`; // bt-match-card
                });
                html += `</div>`; // bt-matches-row
            });

            html += '</div>'; // bracket-tree
            return html;
        }

        const renderChampBracketTree = () => {
            const bracket = champState.bracket || {};
            const allStarted = Object.values(bracket).every(m => m.status === 'playing' || m.status === 'done');
            const matchList = Object.values(bracket);
            const doneCount = matchList.filter(m => m.status === 'done').length;
            const allDone = matchList.length > 0 && doneCount === matchList.length;
            const isWarRoom = champState.isWarRoom;
            const waitingWinners = champState.waitingWinners || {};
            const waitingList = Object.entries(waitingWinners);
            const champion = champState.champion;

            // 晉級等待區 HTML
            const waitingZoneHtml = waitingList.length > 0 ? `
                <div class="px-4 pt-2 pb-0">
                    <div class="rounded-xl p-3 border border-emerald-500/40" style="background:rgba(6,78,59,0.35);">
                        <div class="text-emerald-400 text-xs font-bold mb-2">
                            <i class="fas fa-hourglass-half mr-1"></i>晉級等待區 (${waitingList.length}/${matchList.length} 場完成)
                        </div>
                        <div class="flex flex-wrap gap-1.5">
                            ${waitingList.map(([pid, w]) => `
                            <div class="flex items-center gap-1 bg-emerald-900/50 border border-emerald-500/40 rounded-lg px-2 py-1">
                                <span class="text-emerald-400 text-xs">🏆</span>
                                <span class="text-emerald-200 text-xs font-bold">${w.name}</span>
                                <span class="text-emerald-600 text-[10px]">(${w.matchId})</span>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>` : '';

            // 冠軍誕生 HTML
            const championHtml = champion ? `
                <div class="px-4 pt-2 pb-0">
                    <div class="rounded-xl p-4 border-2 border-yellow-400/70 text-center" style="background:linear-gradient(135deg,rgba(120,53,15,0.8),rgba(30,15,0,0.9));">
                        <div style="font-size:2rem;">🏆</div>
                        <div class="text-yellow-300 font-black text-base mt-1">冠軍誕生！</div>
                        <div class="text-yellow-100 font-black text-xl mt-1">${champion.name}</div>
                    </div>
                </div>` : '';

            // 勝者個人等待區提示（非戰情中心，本人在等待區中）
            const myPid = champState.playerId;
            const amIWaiting = champState._isInWaitingZone && myPid && waitingWinners[myPid];
            const myWaitingHtml = (!isWarRoom && amIWaiting) ? `
                <div class="px-4 pt-2 pb-0">
                    <div class="rounded-xl p-3 border-2 border-emerald-400/60 text-center" style="background:linear-gradient(135deg,rgba(6,78,59,0.6),rgba(2,44,34,0.8));animation:pulse-gold 2s infinite;">
                        <div style="font-size:1.5rem;">🏆</div>
                        <div class="text-emerald-300 font-black text-sm mt-1">你已晉級！正在等待區中</div>
                        <div class="text-emerald-500 text-xs mt-1">等待其他場次結束，下一輪即將開始...</div>
                    </div>
                </div>` : '';

            return `
            <div class="absolute inset-0 flex flex-col lobby-bg overflow-hidden">
                <div class="flex items-center justify-between px-4 py-2 border-b border-amber-900/30 bg-black/60" style="min-height:44px;">
                    <button onclick="${isWarRoom ? "state.screen='champWarRoomLobby'; render();" : "champGoBack();"}" class="text-slate-400 hover:text-amber-400 transition text-xs">
                        <i class="fas fa-arrow-left mr-1"></i>${isWarRoom ? '返回戰情中心' : '離開'}
                    </button>
                    <span class="text-yellow-400 font-black text-sm serif-font"><i class="fas fa-sitemap mr-1"></i>賽程總覽</span>
                    <span class="text-amber-400 font-mono text-xs">第 ${champState.roundNum} 輪</span>
                </div>
                ${championHtml}
                ${myWaitingHtml}
                ${waitingZoneHtml}
                <div class="flex-1 overflow-auto bracket-tree-wrap">
                    ${renderBracketTreeSVG(bracket)}
                </div>
                ${isWarRoom ? `
                <div class="px-4 py-3 border-t border-amber-900/30 bg-black/60 flex gap-2">
                    ${champion ? `
                    <div class="flex-1 text-center text-yellow-400 font-bold text-sm py-3">
                        <i class="fas fa-crown mr-2"></i>🏆 ${champion.name} 榮獲冠軍！
                    </div>` : !allStarted ? `
                    <button onclick="champWarRoomStartAllMatches()" class="flex-1 start-match-btn text-white font-black py-3 rounded-xl text-base" style="background:linear-gradient(135deg,#7f1d1d,#b91c1c);border:2px solid rgba(239,68,68,0.6);">
                        <i class="fas fa-play-circle mr-2 text-yellow-300"></i>比賽開始！各組出發🔥
                    </button>` : allDone ? `
                    <button onclick="champWarRoomNextRound()" class="flex-1 champ-btn text-white font-bold py-3 rounded-xl text-sm champion-glow" style="background:linear-gradient(135deg,#065f46,#022c22);border:1px solid rgba(16,185,129,0.4);">
                        <i class="fas fa-arrow-right mr-2"></i>進入下一輪（${waitingList.length} 人晉級）
                    </button>` : `
                    <div class="flex-1 text-center text-amber-400 font-bold text-sm py-3">
                        <i class="fas fa-fire mr-2"></i>比賽進行中... (${doneCount}/${matchList.length} 組已完成)
                    </div>`}
                </div>` : `
                <div class="px-4 py-3 border-t border-amber-900/30 bg-black/60 text-center">
                    ${champion ? `
                    <div class="text-yellow-400 font-bold text-sm"><i class="fas fa-crown mr-2"></i>🏆 ${champion.name} 榮獲冠軍！</div>` : allDone ? `
                    <div class="text-emerald-400 font-bold text-sm"><i class="fas fa-check-circle mr-2"></i>本輪結束，等待戰情中心安排下一輪...</div>` : allStarted ? `
                    <div class="text-amber-400 font-bold text-sm"><i class="fas fa-fire mr-2"></i>比賽進行中，請稍候...</div>` : `
                    <div class="text-slate-400 text-sm"><i class="fas fa-hourglass-half mr-2"></i>等待戰情中心下令比賽開始...</div>`}
                </div>`}
            </div>`;
        };
        const renderChampObserve = () => {
            const mid = champState.observingMatchId;
            const bracket = champState.bracket || {};
            const matchList = Object.values(bracket);
            const match = mid ? bracket[mid] : null;
            // 即時遊戲資料（從 match_games 取得）
            const matchGames = champState.matchGames || {};
            const gs = mid ? (matchGames[mid] || null) : null;

            // 從 gs 建立玩家牌況對照（index → { handCount, placedCount }）
            // gs.players[i].hand = 手牌陣列, gs.timeline = 公共時間軸
            // placed 數量 = 初始手牌總數 - 目前手牌 = 不易直接計算，
            // 改用 gs.players[i].hand.length（剩餘手牌）和 gs.deck 尚餘牌堆
            // 比對 match.players 的 pid 順序與 gs.players 順序一致
            const gsPlayerMap = {}; // pid -> { handCount, timelinePlaced }
            if (gs && gs.players && match) {
                const matchPids = Object.keys(match.players || {});
                gs.players.forEach((p, i) => {
                    const pid = matchPids[i];
                    if (pid) {
                        gsPlayerMap[pid] = {
                            handCount: (p.hand || []).length,
                            name: p.name
                        };
                    }
                });
            }
            // timeline 中每個玩家排入的牌數：無法從公共 timeline 區分是誰放的，
            // 改用「初始手牌(7張) - 剩餘手牌」來推算已出牌數
            const INITIAL_HAND = 7;

            // 按狀態排序：進行中優先，然後等待，最後完成
            const statusOrder = { playing: 0, pending: 1, done: 2 };
            const sortedMatches = [...matchList].sort((a, b) =>
                (statusOrder[a.status] ?? 3) - (statusOrder[b.status] ?? 3)
            );

            return `
            <div class="absolute inset-0 flex flex-col lobby-bg overflow-hidden">
                <!-- 頂部導航 -->
                <div class="flex items-center justify-between px-4 py-2 border-b border-amber-900/30 bg-black/60 flex-shrink-0" style="min-height:44px;">
                    <button onclick="state.screen='champBracketTree'; render();" class="text-slate-400 hover:text-amber-400 transition text-xs"><i class="fas fa-arrow-left mr-1"></i>賽程總覽</button>
                    <span class="text-yellow-400 font-black text-sm serif-font"><i class="fas fa-eye mr-1"></i>觀戰中心</span>
                    <span class="text-amber-400 font-mono text-xs">第 ${champState.roundNum} 輪</span>
                </div>

                <!-- 場次快速切換列 -->
                <div class="flex-shrink-0 px-3 py-2 bg-black/40 border-b border-slate-800/60 overflow-x-auto">
                    <div class="flex gap-1.5 min-w-max">
                        ${sortedMatches.map(m => {
                            const isSelected = m.matchId === mid;
                            const statusColor = m.status === 'done' ? 'text-emerald-400 border-emerald-500/50' :
                                               m.status === 'playing' ? 'text-amber-300 border-amber-500/60' :
                                               'text-slate-400 border-slate-600/40';
                            const statusDot = m.status === 'done' ? '✅' : m.status === 'playing' ? '⚔️' : '⏳';
                            const playerNames = Object.values(m.players || {}).map(p => p.name).join(' vs ');
                            return `<button onclick="champState.observingMatchId='${m.matchId}'; render();"
                                class="flex flex-col items-start px-2.5 py-1.5 rounded-lg border text-left transition-all flex-shrink-0
                                    ${isSelected ? 'bg-amber-800/50 border-amber-500/70' : 'bg-slate-800/40 hover:border-amber-500/40 ' + statusColor}">
                                <div class="flex items-center gap-1 text-[11px] font-bold ${isSelected ? 'text-amber-200' : ''}">
                                    <span>${statusDot}</span>
                                    <span>${m.matchId}</span>
                                </div>
                                <div class="text-[9px] text-slate-400 mt-0.5 max-w-[90px] truncate">${playerNames}</div>
                            </button>`;
                        }).join('')}
                    </div>
                </div>

                <!-- 主內容區 -->
                <div class="flex-1 overflow-y-auto p-3 flex flex-col gap-3">
                    ${!match ? `
                    <div class="flex-1 flex items-center justify-center">
                        <div class="text-slate-400 text-sm text-center">
                            <i class="fas fa-hand-pointer text-2xl mb-2 block text-amber-600/50"></i>
                            請從上方選擇要觀看的場次
                        </div>
                    </div>` : `

                    <!-- 場次標題與狀態 -->
                    <div class="rounded-xl px-4 py-3 flex items-center justify-between flex-shrink-0"
                        style="background:linear-gradient(135deg,rgba(120,53,15,0.5),rgba(15,23,42,0.8));border:1px solid rgba(251,191,36,0.3);">
                        <div>
                            <div class="text-amber-300 font-black text-sm">${match.matchId}</div>
                            <div class="text-slate-400 text-[11px] mt-0.5">
                                ${Object.keys(match.players || {}).length} 位玩家對戰
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-sm ${match.status === 'done' ? 'text-emerald-400' : match.status === 'playing' ? 'text-amber-400' : 'text-slate-400'}">
                                ${match.status === 'done' ? '✅ 已結束' : match.status === 'playing' ? '⚔️ 進行中' : '⏳ 等待開始'}
                            </div>
                            ${gs ? `<div class="text-slate-500 text-[10px] mt-0.5">牌堆剩餘 ${gs.deck ? gs.deck.length : '?'} 張</div>` : ''}
                        </div>
                    </div>

                    <!-- 玩家牌況卡片 -->
                    <div class="space-y-2">
                        <div class="text-amber-400 text-xs font-bold flex items-center gap-1.5">
                            <i class="fas fa-layer-group"></i> 玩家即時牌況
                            ${match.status === 'playing' ? '<span class="inline-block w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"></span>' : ''}
                        </div>
                        ${Object.entries(match.players || {}).map(([pid, p]) => {
                            const isWinner = match.winner === pid;
                            const pStats = gsPlayerMap[pid];
                            const handCount = pStats ? pStats.handCount : null;
                            const placedCount = handCount !== null ? (INITIAL_HAND - handCount) : null;
                            const isCurrentTurn = gs && gs.players &&
                                (() => {
                                    const matchPids = Object.keys(match.players || {});
                                    const curIdx = gs.currentPlayerIndex;
                                    return curIdx >= 0 && matchPids[curIdx] === pid;
                                })();
                            return `
                            <div class="rounded-xl p-3 border transition-all ${
                                isWinner ? 'border-emerald-500/70 bg-emerald-900/20' :
                                match.status === 'done' && !isWinner ? 'border-slate-700/40 bg-slate-900/30 opacity-60' :
                                isCurrentTurn ? 'border-amber-400/70 bg-amber-900/15' :
                                'border-slate-700/40 bg-slate-900/40'}">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        ${isCurrentTurn ? '<span class="text-amber-400 text-xs animate-pulse">▶</span>' : '<span class="w-3"></span>'}
                                        <span class="font-bold text-white text-sm">${p.name}</span>
                                        ${isWinner ? '<span class="text-yellow-400 text-xs font-bold">🏆 獲勝</span>' : ''}
                                        ${match.status === 'done' && !isWinner && match.winner ? '<span class="text-slate-500 text-xs">淘汰</span>' : ''}
                                    </div>
                                    <div class="text-xs text-amber-400 font-bold">
                                        ${isCurrentTurn ? '<span class="text-amber-300 font-bold">出牌中</span>' :
                                          match.status === 'playing' ? '<span class="text-slate-400">等待</span>' : ''}
                                    </div>
                                </div>
                                ${gs ? `
                                <div class="mt-2 flex gap-3">
                                    <div class="flex-1 bg-black/30 rounded-lg px-2 py-1.5 text-center">
                                        <div class="text-[10px] text-slate-400 mb-0.5">手牌剩餘</div>
                                        <div class="font-black text-lg ${handCount === 0 ? 'text-emerald-400' : handCount !== null && handCount <= 2 ? 'text-amber-400' : 'text-white'}">
                                            ${handCount !== null ? handCount : '–'}
                                            <span class="text-[11px] text-slate-500 font-normal">張</span>
                                        </div>
                                    </div>
                                    <div class="flex-1 bg-black/30 rounded-lg px-2 py-1.5 text-center">
                                        <div class="text-[10px] text-slate-400 mb-0.5">已排列</div>
                                        <div class="font-black text-lg text-indigo-300">
                                            ${placedCount !== null ? placedCount : '–'}
                                            <span class="text-[11px] text-slate-500 font-normal">張</span>
                                        </div>
                                    </div>
                                </div>` : `
                                <div class="mt-1.5 text-slate-600 text-[10px] text-center">
                                    ${match.status === 'pending' ? '比賽尚未開始' : '等待資料同步...'}
                                </div>`}
                            </div>`;
                        }).join('')}
                    </div>

                    <!-- 獲勝者公告（比賽結束時顯示） -->
                    ${match.status === 'done' && match.winner ? `
                    <div class="rounded-xl p-4 text-center border-2 border-yellow-400/60 flex-shrink-0"
                        style="background:linear-gradient(135deg,rgba(120,53,15,0.8),rgba(30,15,0,0.9));">
                        <div style="font-size:2rem;">🏆</div>
                        <div class="text-yellow-300 font-black text-sm mt-1">本組獲勝者</div>
                        <div class="text-yellow-100 font-black text-2xl mt-1">
                            ${match.players?.[match.winner]?.name || match.winner}
                        </div>
                        <div class="text-emerald-400 text-xs mt-1">晉級下一輪！</div>
                    </div>` : ''}

                    <!-- 時間軸進度（若有資料） -->
                    ${gs && gs.timeline && gs.timeline.length > 0 ? `
                    <div class="glass-panel rounded-xl p-3 border border-slate-700/30">
                        <div class="text-slate-400 text-xs font-bold mb-1.5">
                            <i class="fas fa-stream mr-1"></i>公共時間軸 — ${gs.timeline.length} 張已排列
                        </div>
                        <div class="text-slate-500 text-[10px]">
                            牌堆剩餘 ${gs.deck ? gs.deck.length : 0} 張 ／ 第 ${gs.roundNum || 1} 回合
                        </div>
                    </div>` : ''}
                    `}
                </div>
            </div>`;
        };

        // 監聽玩家端的比賽完成，上報結果到Firebase
        async function champReportMatchResult(winnerId) {
            if (!champState.currentMatchId || !champState.roomCode) return;
            const db = window.firebaseDB;
            const match = champState.bracket?.[champState.currentMatchId];
            const winnerName = match?.players?.[winnerId]?.name || winnerId;
            const updates = {};
            updates[`rooms/${champState.roomCode}/bracket/${champState.currentMatchId}/status`] = 'done';
            updates[`rooms/${champState.roomCode}/bracket/${champState.currentMatchId}/winner`] = winnerId;
            // 寫入勝者等待區
            updates[`rooms/${champState.roomCode}/waiting_winners/${winnerId}`] = {
                name: winnerName,
                matchId: champState.currentMatchId,
                arrivedAt: Date.now()
            };
            await window.firebaseUpdate(window.firebaseRef(db, '/'), updates);
        }

        // Hook into existing endGame to report champion match result
        const _originalEndGame = endGame;
        window.endGame = function(winner) {
            _originalEndGame(winner);
            // If in champ mode, report result
            if (champState.inChampGame && champState.currentMatchId) {
                // Find winner's firebase pid
                const match = champState.bracket?.[champState.currentMatchId];
                if (match) {
                    // Match by name
                    const winnerFirebasePid = Object.entries(match.players||{}).find(([pid,p]) => p.name === winner.name)?.[0];
                    if (winnerFirebasePid) {
                        champReportMatchResult(winnerFirebasePid);
                    }
                }
                // Sync final game state (任何玩家都可寫入，不再限 host)
                champSyncGameState({ screen: 'gameover', winners: [winner ? winner.id : null] });
                champState.inChampGame = false;
                champState.isChampGameHost = false;
                champState.myGamePlayerIndex = -1;
            }
        };

        const render = () => {
            const app = document.getElementById('app');
            const header = document.getElementById('game-header');
            const noHeaderScreens = ['menu', 'setup', 'soloSetup', 'ultimateSetup', 'gallery', 'leaderboard', 'ultimateLeaderboard', 'soloOver', 'ultimateOver', 'champMenu', 'champCreate', 'champJoin', 'champRoom', 'champLobby', 'champWarRoom', 'champWarRoomSetup', 'champWarRoomLobby', 'champBracket', 'champBracketTree', 'champObserve'];
            if (noHeaderScreens.includes(state.screen)) {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
            }

            if (state.screen === 'menu') app.innerHTML = renderMenu();
            else if (state.screen === 'setup') app.innerHTML = renderSetup();
            else if (state.screen === 'soloSetup') app.innerHTML = renderSoloSetup();
            else if (state.screen === 'soloPlay') {
                app.innerHTML = renderSoloPlay();
                const scroll = document.getElementById('timelineContainer');
                if(scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'soloOver') app.innerHTML = renderSoloOver();
            else if (state.screen === 'leaderboard') {
                audioManager.switchToLobbyBGM();
                // Show loading state first, then fetch from Firebase and re-render
                app.innerHTML = '<div class="absolute inset-0 flex items-center justify-center bg-[#090d16]"><div class="text-amber-400 text-lg font-bold animate-pulse">🏆 載入排行榜中…</div></div>';
                getLeaderboard().then(lb => { _soloLBCache = lb; app.innerHTML = renderLeaderboard(); });
            }
            else if (state.screen === 'ultimateLeaderboard') {
                audioManager.switchToLobbyBGM();
                app.innerHTML = '<div class="absolute inset-0 flex items-center justify-center" style="background:#090d16"><div style="color:#f87171" class="text-lg font-bold animate-pulse">🐉 載入排行榜中…</div></div>';
                getUltimateLB().then(lb => { _ultLBCache = lb; app.innerHTML = renderUltimateLeaderboard(); });
            }
            else if (state.screen === 'play') {
                app.innerHTML = renderGameTable();
                const scroll = document.getElementById('timelineContainer');
                if (scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'gameover') app.innerHTML = renderGameTable() + renderGameOver();
            else if (state.screen === 'gallery') app.innerHTML = renderGallery();
            else if (state.screen === 'ultimateSetup') app.innerHTML = renderUltimateSetup();
            else if (state.screen === 'ultimatePlay') app.innerHTML = renderUltimatePlay();
            else if (state.screen === 'ultimateOver') app.innerHTML = renderUltimateOver();
            else if (state.screen === 'champMenu') app.innerHTML = renderChampMenu();
            else if (state.screen === 'champCreate') app.innerHTML = renderChampCreate();
            else if (state.screen === 'champJoin') app.innerHTML = renderChampJoin();
            else if (state.screen === 'champRoom') app.innerHTML = renderChampRoom();
            else if (state.screen === 'champWarRoom') app.innerHTML = renderChampWarRoom();
            else if (state.screen === 'champWarRoomSetup') app.innerHTML = renderChampWarRoomSetup();
            else if (state.screen === 'champWarRoomLobby') app.innerHTML = renderChampWarRoomLobby();
            else if (state.screen === 'champBracket') app.innerHTML = renderChampBracket();
            else if (state.screen === 'champObserve') app.innerHTML = renderChampObserve();
            else if (state.screen === 'champBracketTree') app.innerHTML = renderChampBracketTree();
        };


        // ===== 自適應縮放系統 v2（全平台適配）=====
        // 判斷是否為「flex 填滿」模式：
        //   - 直向（portrait）任何裝置 → 不縮放
        //   - 橫向但寬度 < 1024px（小平板、手機橫屏）→ 不縮放
        //   - 橫向且寬度 >= 1024px（桌機、大平板橫屏）→ 等比縮放
        function isMobileMode() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const isPortrait = vh > vw;
            return isPortrait || vw < 1024;
        }

        // 取得安全可視高度（考慮 iOS Safari 工具列）
        function safeVH() {
            return window.visualViewport ? window.visualViewport.height : window.innerHeight;
        }
        function safeVW() {
            return window.visualViewport ? window.visualViewport.width : window.innerWidth;
        }

        // 基準設計尺寸（桌機橫向縮放用）
        // 設計高度調高到 768，確保平板橫屏也不會切邊
        const LANDSCAPE_DESIGN_H = 768;
        const LANDSCAPE_DESIGN_W_MIN = 1024;

        function applyScale() {
            const vw = safeVW();
            const vh = safeVH();
            const root = document.getElementById('scale-root');
            const app = document.getElementById('app');

            if (isMobileMode()) {
                // ===== 手機/平板直向/小螢幕：取消縮放，flex 填滿 =====
                root.style.width       = vw + 'px';
                root.style.height      = vh + 'px';
                root.style.transform   = 'none';
                root.style.left        = '0px';
                root.style.top         = '0px';
                root.style.position    = 'fixed';
                root.style.display     = 'flex';
                root.style.flexDirection = 'column';
                if (app) {
                    app.style.position  = 'relative';
                    app.style.flex      = '1';
                    app.style.width     = '100%';
                    app.style.height    = '';
                    app.style.minHeight = '0';
                    app.style.inset     = '';
                    app.style.overflow  = 'hidden';
                }
            } else {
                // ===== 桌機/大平板橫向：等比例縮放至填滿視窗 =====
                root.style.display       = 'block';
                root.style.flexDirection = '';
                if (app) {
                    app.style.position  = 'absolute';
                    app.style.flex      = '';
                    app.style.width     = '';
                    app.style.height    = '';
                    app.style.minHeight = '';
                    app.style.inset     = '0';
                    app.style.overflow  = '';
                }
                // 動態計算設計寬度（配合螢幕比例）
                const designH = LANDSCAPE_DESIGN_H;
                const designW = Math.max(LANDSCAPE_DESIGN_W_MIN, Math.round((vw / vh) * designH));
                // 縮放比：同時確保寬高都能放進螢幕
                const scale = Math.min(vw / designW, vh / designH);

                const scaledW = designW * scale;
                const scaledH = designH * scale;
                root.style.width     = designW + 'px';
                root.style.height    = designH + 'px';
                root.style.transform = `scale(${scale})`;
                root.style.position  = 'fixed';
                root.style.left      = ((vw - scaledW) / 2) + 'px';
                root.style.top       = ((vh - scaledH) / 2) + 'px';
            }
        }

        // 監聽 visualViewport（iOS Safari 動態工具列）
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', applyScale);
        }
        // 初始化＆監聽 resize / orientationchange
        applyScale();
        window.addEventListener('resize', applyScale);
        window.addEventListener('orientationchange', () => { setTimeout(applyScale, 200); });
        // ===== 縮放系統結束 =====

        window.onload = () => { applyScale(); render(); };
        window.addEventListener('resize', () => {
            applyScale();
            if (['play','gameover','menu','soloPlay','ultimatePlay','champRoom','champLobby','champWarRoomLobby','champBracket','champBracketTree','champObserve'].includes(state.screen)) render();
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                applyScale();
                render();
            }, 300);
        });
    </script>
</body>
</html>
