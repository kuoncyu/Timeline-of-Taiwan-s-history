            ultimateDifficulty: 2,
            // 卡牌系統
            ultimateCards: [],         // 手牌（最多3張）
            ultimateCardMilestone: 0,  // 下次獲得卡牌的門檻（答對幾題）
            ultimateActiveCard: null,  // 正在使用的卡牌效果
            ultimateCardEffect: null,  // 當前生效中的效果
            ultimateChoiceOptions: null, // 當前選擇題選項
            ultimateRangeHint: null,     // 當前年代範圍提示
            ultimatePlayerHP: 3,         // 玩家血量（最多3格）
            ultimatePlayerStreakForHP: 0 // 連續答對計數（每3題+1血）
        };


        // 新增：退出邏輯處理
        const handleHomeClick = () => {
            audioManager.playSFX('select');
            document.getElementById('confirm-modal').style.display = 'flex';
        };


        const closeConfirmModal = () => {
            audioManager.playSFX('click');
            document.getElementById('confirm-modal').style.display = 'none';
        };


        const confirmQuitGame = () => {
            audioManager.playSFX('click');
            stopTimer();
            if (state.extremeCountdownInterval) { clearInterval(state.extremeCountdownInterval); state.extremeCountdownInterval = null; }
            audioManager.switchToLobbyBGM();
            state.screen = 'menu';
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('confirm-modal').style.display = 'none';
            render();
        };


        const shuffle = (array) => { for(let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; };
        const formatYear = (year) => year < 0 ? `西元前 ${Math.abs(year)} 年` : `西元 ${year} 年`;
        const formatCardYear = (card) => {
            const base = card.year < 0 ? `西元前 ${Math.abs(card.year)} 年` : `西元 ${card.year} 年`;
            return card.month ? `${base} ${card.month} 月` : base;
        };
        const formatTime = (seconds) => `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;


        const startTimer = () => { clearInterval(state.gameTimerInterval); state.gameSeconds = 0; state.gameTimerInterval = setInterval(() => { state.gameSeconds++; document.getElementById('game-timer').innerText = formatTime(state.gameSeconds); }, 1000); };
        const stopTimer = () => clearInterval(state.gameTimerInterval);


        const showToast = (message, isSuccess, duration = 3000) => {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess ? `<i class="fas fa-check-circle mr-2 text-green-400"></i> ${message}` : `<i class="fas fa-times-circle mr-2 text-red-400"></i> ${message}`;
            toast.className = `px-6 py-2 rounded-full text-white font-bold text-sm transition-all duration-300 shadow-2xl glass-panel border-b-2 pointer-events-none ${isSuccess ? 'border-green-500' : 'border-red-500'}`;
            toast.style.cssText = 'position:absolute;top:48px;left:50%;z-index:100;opacity:1;transform:translateX(-50%) translateY(0);';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(-10px)'; }, duration);
        };


        const startGame = (playerCount, selectedPeriods, aiDifficulty, questionDifficulty) => {
            audioManager.playSFX('click');
            let filteredCards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if (filteredCards.length < playerCount * 4 + 1) return alert('題庫不足！請增加時代或降低難度。');
            
            state.aiDifficulty = parseFloat(aiDifficulty);
            state.selectedPeriods = selectedPeriods;
            state.questionDifficulty = questionDifficulty;
            state.deck = shuffle([...filteredCards]);
            state.timeline = [state.deck.pop()];
            state.players = [];
            
            let icons = shuffle([...ANIMAL_ICONS]);
            
            if (state.isVsAI) {
                state.players.push({ id: 0, name: '玩家 1', icon: icons[0], isAI: false, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: 'BL' });
                state.players.push({ id: 1, name: '玩家 2 (AI)', icon: icons[1], isAI: true, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: 'TR' });
            } else {
                const corners = ['BL', 'BR', 'TL', 'TR']; // 依序分配給 1, 2, 3, 4
                for(let i = 0; i < playerCount; i++) {
                    state.players.push({ id: i, name: `玩家 ${i + 1}`, icon: icons[i], isAI: false, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: corners[i] });
                }
            }
            
            state.currentPlayerIndex = 0; state.roundNum = 1; state.selectedCardId = null; state.previewCard = null;
            state.roundFinishers = []; state.deathMatchPlayers = null; state.deathMatchCorrect = []; state.firstMatchDone = false;
            state.isExtremeDeath = false; state.extremeCountdown = 5; state.extremeSkipped = [];
            if (state.extremeCountdownInterval) { clearInterval(state.extremeCountdownInterval); state.extremeCountdownInterval = null; }
            document.getElementById('display-round').innerText = `第 1 回合`;
            document.getElementById('game-deck-count').innerText = state.deck.length;
            document.getElementById('game-header').classList.remove('hidden');
            
            startTimer(); audioManager.switchToGameBGM(); state.screen = 'play'; transitionToTurn();
        };


        const transitionToTurn = () => {
            state.selectedCardId = null; state.previewCard = null;
            // 清除上一輪倒數
            if (state.extremeCountdownInterval) {
                clearInterval(state.extremeCountdownInterval);
                state.extremeCountdownInterval = null;
            }
            if (state.players[state.currentPlayerIndex].isAI) { render(); setTimeout(executeAITurn, 1800); }
            else {
                render();
                // 極限殊死對戰：啟動 5 秒倒數
                if (state.isExtremeDeath && state.deathMatchPlayers && state.deathMatchPlayers.includes(state.players[state.currentPlayerIndex].id)) {
                    startExtremeCountdown();
                }
            }
        };

        const startExtremeCountdown = () => {
            state.extremeCountdown = 5;
            updateCountdownDisplay();
            state.extremeCountdownInterval = setInterval(() => {
                state.extremeCountdown--;
                updateCountdownDisplay();
                if (state.extremeCountdown <= 0) {
                    clearInterval(state.extremeCountdownInterval);
                    state.extremeCountdownInterval = null;
                    // 時間到，視為放棄
                    handleExtremeTimeout();
                }
            }, 1000);
        };

        const updateCountdownDisplay = () => {
            const el = document.getElementById('extreme-countdown-num');
            if (el) {
                el.textContent = state.extremeCountdown;
                el.className = state.extremeCountdown <= 2
                    ? 'text-5xl font-black countdown-number countdown-danger'
                    : 'text-5xl font-black countdown-number text-amber-300';
            }
            const bar = document.getElementById('extreme-timer-bar');
            if (bar) {
                const pct = (state.extremeCountdown / 5) * 100;
                bar.style.width = pct + '%';
                bar.style.background = state.extremeCountdown <= 2 ? '#ef4444' : '#f59e0b';
            }
        };

        const handleExtremeTimeout = () => {
            const p = state.players[state.currentPlayerIndex];
            if (!state.extremeSkipped) state.extremeSkipped = [];
            state.extremeSkipped.push(p.id);
            showToast(`⏰ ${p.name} 超時！本回合放棄`, false, 2000);
            audioManager.playSFX('wrong');
            state.selectedCardId = null;
            render();
            setTimeout(endTurn, 1500);
        };


        const executeAITurn = () => {
            const ai = state.players[state.currentPlayerIndex];
            if (!ai.hand.length) return endTurn();
            const card = ai.hand[Math.floor(Math.random() * ai.hand.length)];
            state.selectedCardId = card.id; render(); 

            setTimeout(() => {
                // 找出所有合法插入位置
                const aiCardVal = card.year * 100 + (card.month || 0);
                const aiTlVal = (c) => c.year * 100 + (c.month || 0);
                let valid = [];
                for (let i = 0; i <= state.timeline.length; i++) {
                    if (i === 0 && aiCardVal <= aiTlVal(state.timeline[0])) valid.push(i);
                    else if (i === state.timeline.length && aiCardVal >= aiTlVal(state.timeline[i-1])) valid.push(i);
                    else if (i > 0 && i < state.timeline.length && aiCardVal >= aiTlVal(state.timeline[i-1]) && aiCardVal <= aiTlVal(state.timeline[i])) valid.push(i);
                }

                let idx;
                if (valid.length === 0) {
                    // 理論上不應發生，但若有重複年份造成無合法位置，找最接近的位置
                    let minDiff = Infinity;
                    idx = 0;
                    for (let i = 0; i <= state.timeline.length; i++) {
                        const ref = i === 0 ? state.timeline[0].year : state.timeline[i-1].year;
                        const diff = Math.abs(card.year - ref);
                        if (diff < minDiff) { minDiff = diff; idx = i; }
                    }
                } else if (Math.random() < state.aiDifficulty) {
                    // 高難度：從合法位置中選
                    idx = valid[Math.floor(Math.random() * valid.length)];
                } else {
                    // 低難度：故意選錯（從非合法位置選，若全都合法就隨機）
                    const allPositions = Array.from({length: state.timeline.length + 1}, (_, i) => i);
                    const wrong = allPositions.filter(i => !valid.includes(i));
                    idx = wrong.length ? wrong[Math.floor(Math.random() * wrong.length)] : valid[Math.floor(Math.random() * valid.length)];
                }
                handleGapClick(idx, true);
            }, 1000);
        };


        // 殊死戰輔助：給所有殊死戰玩家各補一張牌
        const dealDeathMatchCards = () => {
            // 檢查牌是否足夠
            const needed = state.deathMatchPlayers.length;
            if (state.deck.length < needed && !state.isExtremeDeath) {
                // 牌不夠 → 收回所有人手牌、時間軸以外的牌，重洗，進入極限殊死對戰
                enterExtremeDeath();
                return;
            }
            state.deathMatchPlayers.forEach(pid => {
                const p = state.players.find(x => x.id === pid);
                if (p && state.deck.length) p.hand = [state.deck.pop()];
                else if (p) p.hand = [];
            });
            document.getElementById('game-deck-count').innerText = state.deck.length;
        };

        // 進入極限殊死對戰：收回所有手牌、重洗、5秒倒數
        const enterExtremeDeath = () => {
            state.isExtremeDeath = true;
            // 全數收回：依原本選擇的時代與難度範圍重洗
            const filteredCards = ALL_CARDS.filter(c =>
                (state.selectedPeriods || []).includes(c.period) &&
                c.level <= (state.questionDifficulty || 99)
            );
            state.deck = shuffle([...filteredCards]);
            // 清空時間軸，只保留第一張錨點牌
            const anchor = state.timeline[0];
            state.timeline = anchor ? [anchor] : [];
            if (anchor) state.deck = state.deck.filter(c => c.id !== anchor.id);
            // 清空所有人手牌
            state.players.forEach(p => { p.hand = []; });
            // 給殊死戰玩家各發一張
            state.deathMatchPlayers.forEach(pid => {
                const p = state.players.find(x => x.id === pid);
                if (p && state.deck.length) p.hand = [state.deck.pop()];
            });
            state.firstMatchDone = false;
            document.getElementById('game-deck-count').innerText = state.deck.length;
            document.getElementById('display-round').innerText = `💀 極限殊死對戰`;
            showToast('💀 牌全數收回重洗！極限殊死對戰！每人限 5 秒！', false, 4000);
            audioManager.playSFX('wrong');
        };

        // 進入殊死戰：清空所有人手牌，僅保留殊死戰玩家，各抽一張
        const enterDeathMatch = (finisherIds) => {
            showToast(`⚔️ ${finisherIds.length} 人同時清牌！殊死戰開始！`, true, 4000);
            audioManager.playSFX('correct');
            state.deathMatchPlayers = finisherIds;
            state.deathMatchCorrect = []; // 本殊死戰回合答對者
            // 清空所有人手牌
            state.players.forEach(p => { p.hand = []; });
            dealDeathMatchCards();
            // 從第一位殊死戰玩家開始
            const firstIdx = state.players.findIndex(p => p.id === finisherIds[0]);
            if (firstIdx !== -1) state.currentPlayerIndex = firstIdx;
            document.getElementById('display-round').innerText = `⚔️ 殊死戰`;
            transitionToTurn();
        };

        const handleGapClick = (insertIndex, isAITurn = false) => {
            const p = state.players[state.currentPlayerIndex];
            if (!isAITurn && p.isAI) return; 
            if (!state.selectedCardId) return showToast("請先點選一張手牌！", false) || audioManager.playSFX('wrong');

            // 極限殊死戰：玩家出牌，清除倒數
            if (state.isExtremeDeath && state.extremeCountdownInterval) {
                clearInterval(state.extremeCountdownInterval);
                state.extremeCountdownInterval = null;
            }

            const cIdx = p.hand.findIndex(c => c.id === state.selectedCardId);
            const card = p.hand[cIdx];

            // 比較函式：同年時以 month 細分（無 month 視為 0）
            const cardVal = card.year * 100 + (card.month || 0);
            const tlVal = (c) => c.year * 100 + (c.month || 0);
            let ok = false;
            if (insertIndex === 0) ok = cardVal <= tlVal(state.timeline[0]);
            else if (insertIndex === state.timeline.length) ok = cardVal >= tlVal(state.timeline[insertIndex-1]);
            else ok = cardVal >= tlVal(state.timeline[insertIndex-1]) && cardVal <= tlVal(state.timeline[insertIndex]);

            if (ok) {
                audioManager.playSFX('correct');
                showToast(`🎯 ${p.name} 排列正確！`, true);
                state.timeline.splice(insertIndex, 0, card);
                p.hand.splice(cIdx, 1);
                if (!state.firstMatchDone) { state.firstMatchDone = true; }
                // 殊死戰：記錄答對者
                if (state.deathMatchPlayers) {
                    if (!state.deathMatchCorrect) state.deathMatchCorrect = [];
                    state.deathMatchCorrect.push(p.id);
                }
            } else {
                audioManager.playSFX('wrong');
                showToast(`❌ 答錯！【${card.title}】發生於 ${formatCardYear(card)}`, false, 4000);
                // 殊死戰答錯：牌放回牌堆，手牌清空（不補牌）
                if (state.deathMatchPlayers) {
                    state.deck.unshift(card); shuffle(state.deck);
                    p.hand.splice(cIdx, 1);
                } else {
                    state.deck.unshift(card); shuffle(state.deck); p.hand.splice(cIdx, 1);
                    if (state.deck.length) p.hand.push(state.deck.pop());
                }
            }
            
            state.selectedCardId = null; state.previewCard = null;
            document.getElementById('game-deck-count').innerText = state.deck.length;
            render();

            // 一般模式：清牌登記等回合結束
            if (!state.deathMatchPlayers && !p.hand.length) {
                if (!state.roundFinishers.includes(p.id)) state.roundFinishers.push(p.id);
            }
            setTimeout(endTurn, 2000);
        };

        const endTurn = () => {
            // ── 殊死戰模式 ──
            if (state.deathMatchPlayers) {
                // 找下一位殊死戰玩家
                let next = (state.currentPlayerIndex + 1) % state.players.length;
                let tries = 0;
                while (!state.deathMatchPlayers.includes(state.players[next].id) && tries < state.players.length) {
                    next = (next + 1) % state.players.length; tries++;
                }
                // 判斷是否完成一輪（回到起始位置）
                const firstDeathIdx = state.players.findIndex(p => p.id === state.deathMatchPlayers[0]);
                const wrapsRound = next === firstDeathIdx || state.deathMatchPlayers.length === 1;

                if (wrapsRound) {
                    // 殊死戰回合結算
                    const correct = (state.deathMatchCorrect || []).slice();
                    const skipped = (state.extremeSkipped || []).slice();
                    state.deathMatchCorrect = [];
                    state.extremeSkipped = [];

                    if (correct.length === 1) {
                        // 唯一答對者獲勝
                        endGame(state.players.find(p => p.id === correct[0]));
                        return;
                    }
                    if (correct.length === 0) {
                        // 全部答錯/超時，繼續殊死戰，各抽一張
                        if (state.isExtremeDeath) {
                            showToast('💀 無人答對！繼續極限殊死對戰！', false, 3000);
                        } else {
                            showToast('⚔️ 無人答對！繼續殊死拼殺！', false, 3000);
                        }
                    } else {
                        // 多人答對，淘汰答錯者，縮小殊死戰名單
                        state.deathMatchPlayers = correct;
                        if (state.deathMatchPlayers.length === 1) {
                            endGame(state.players.find(p => p.id === state.deathMatchPlayers[0]));
                            return;
                        }
                        if (state.isExtremeDeath) {
                            showToast(`💀 ${correct.length} 人答對！繼續極限殊死對戰！`, true, 3000);
                        } else {
                            showToast(`⚔️ ${correct.length} 人答對！繼續殊死拼殺！`, true, 3000);
                        }
                    }
                    // 所有殊死戰玩家再抽一張（可能觸發極限模式）
                    dealDeathMatchCards();
                    // 從殊死戰第一人重新開始
                    state.currentPlayerIndex = state.players.findIndex(p => p.id === state.deathMatchPlayers[0]);
                    transitionToTurn();
                    return;
                }
                state.currentPlayerIndex = next;
                transitionToTurn();
                return;
            }

            // ── 一般模式 ──
            let next = (state.currentPlayerIndex + 1) % state.players.length;
            const wrapsRound = next <= state.currentPlayerIndex;
            state.currentPlayerIndex = next;

            if (wrapsRound) {
                const finishers = state.roundFinishers.slice();
                state.roundFinishers = [];
                if (finishers.length >= 2) {
                    enterDeathMatch(finishers);
                    return;
                } else if (finishers.length === 1) {
                    endGame(state.players.find(p => p.id === finishers[0]));
                    return;
                }
                document.getElementById('display-round').innerText = `第 ${++state.roundNum} 回合`;
            }
            transitionToTurn();
        };

        const endGame = (winner) => {
            stopTimer();
            if (state.extremeCountdownInterval) { clearInterval(state.extremeCountdownInterval); state.extremeCountdownInterval = null; }
            audioManager.playSFX('win');
            setTimeout(() => audioManager.switchToResultBGM(), 1500);
            state.winners = [winner]; state.screen = 'gameover'; render();
        };


        const openPreview = (cardId, isCurrentPlayer) => {
            audioManager.playSFX('select');
            let found = null;
            state.players.forEach(p => {
                const c = p.hand.find(x => x.id === cardId);
                if (c) {
                    const isOwner = p.id === state.players[state.currentPlayerIndex].id;
                    // 冠軍模式：只有我自己的牌才算 owner
                    const champOwner = champState.inChampGame ? (p.id === champState.myGamePlayerIndex) : true;
                    found = { card: c, isOwner: isOwner && champOwner };
                }
            });
            if(found) { state.previewCard = found; render(); }
        };


        const confirmSelectCard = () => {
            audioManager.playSFX('click'); state.selectedCardId = state.previewCard.card.id; state.previewCard = null; render();
            showToast(`請選擇中央的「發光隙縫」插入史料`, true, 3000);

        // --- 畫面渲染 ---
        
        // 渲染極小化手牌 (公開正面)
        const renderMiniCard = (card, isCurrentActive, isOwnerActive) => {
            const isSelected = state.selectedCardId === card.id;

                    <div class="h-[60%] w-full bg-slate-900 flex items-center justify-center">
                        <img src="${renderWikiImage(card.wiki)}" data-wiki="${card.wiki}" class="object-cover w-full h-full opacity-0 transition-opacity" onerror="this.src='${noPicSvg}'; this.classList.remove('opacity-0');"/>
                    </div>

                    <p class="font-bold text-xs sm:text-sm text-amber-950 serif-font leading-tight line-clamp-2" title="${card.title}">${card.title}</p>
                </div>
                <div class="h-[55%] w-full flex flex-col items-center justify-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=')]">
                    ${showYear
                        ? `<p class="font-black text-sm sm:text-base text-amber-800 drop-shadow">${formatCardYear(card)}</p>
                           <p class="text-[9px] text-amber-700 mt-1 font-bold bg-amber-200/50 px-1.5 rounded">${ALL_PERIODS.find(p=>p.id===card.period).name.slice(0,2)}</p>`
                        : `<p class="font-black text-sm sm:text-base text-amber-800/40 drop-shadow select-none">？年</p>
                           <p class="text-[9px] text-amber-700/40 mt-1 font-bold bg-amber-200/30 px-1.5 rounded">待揭曉</p>`
                    }
                </div>
            </div>
        `};


        const renderGap = (index, showHighlight) => `
            <div class="flex items-center justify-center px-1 shrink-0 cursor-pointer group h-full" onclick="${champState.inChampGame ? `champHandleGapClick(${index})` : `handleGapClick(${index})`}">
                <div class="w-8 sm:w-12 h-28 sm:h-32 border-2 border-dashed rounded-lg flex items-center justify-center transition-all ${showHighlight ? 'gap-pulse border-amber-400' : 'border-emerald-700/40 bg-black/10 group-hover:bg-amber-500/15 group-hover:border-amber-400/50'}">
                    <i class="fas fa-plus text-[10px] sm:text-xs ${showHighlight ? 'text-amber-300' : 'text-emerald-800 group-hover:text-amber-400'}"></i>
                </div>
            </div>
        `;


        // 偵測橫向/直向模式
        const isLandscape = () => window.innerWidth > window.innerHeight;

        // 渲染四角玩家
        // 橫向：玩家狀態靠左，手牌在狀態右側（水平排列），面板貼近上下邊
        // 直向：狀態在上，手牌在下（原本樣式）
        const renderCornerPlayer = (p, activePId) => {
            if(!p) return '';
            const isActive = p.id === activePId;
            const landscape = isLandscape();

            // 冠軍爭霸戰：判斷「我」是否是這個玩家
            const isMe = champState.inChampGame && (p.id === champState.myGamePlayerIndex);
            const isMyTurn = champState.inChampGame ? (isActive && isMe) : isActive;
            const canInteract = champState.inChampGame ? isMe : true;

            // 殊死戰狀態
            const inDeathMatch = state.deathMatchPlayers !== null;
            const isEliminated = inDeathMatch && !state.deathMatchPlayers.includes(p.id);
            const hasPlayedDeath = inDeathMatch && state.deathMatchPlayers.includes(p.id) && p.hand.length === 0 && !isActive;
            const deathCorrect = inDeathMatch && (state.deathMatchCorrect || []).includes(p.id);
            
            let deathBadge = '';
            if (isEliminated) {
                deathBadge = `<span class="text-[7px] text-slate-500 font-bold">☠️ 淘汰</span>`;
            } else if (hasPlayedDeath) {
                deathBadge = deathCorrect
                    ? `<span class="text-[7px] text-green-400 font-bold animate-pulse">✅ 答對</span>`
                    : `<span class="text-[7px] text-red-400 font-bold">❌ 答錯</span>`;
            } else if (inDeathMatch && state.deathMatchPlayers.includes(p.id) && !isActive) {
                deathBadge = state.isExtremeDeath
                    ? `<span class="text-[7px] text-orange-400 font-bold animate-pulse">💀 5秒</span>`
                    : `<span class="text-[7px] text-amber-400/70 font-bold">⚔️ 待出</span>`;
            }

            // 冠軍爭霸戰：非我的回合顯示等待狀態
            let champBadge = '';
            if (champState.inChampGame && isActive && !isMe) {
                champBadge = `<span class="text-[7px] text-amber-400 animate-pulse font-bold">⚔️ 對手回合</span>`;
            } else if (champState.inChampGame && isActive && isMe) {
                champBadge = `<span class="text-[7px] text-emerald-400 animate-bounce font-bold">👆 你的回合</span>`;
            } else if (champState.inChampGame && !isActive && isMe) {
                champBadge = `<span class="text-[7px] text-slate-400 font-bold">⏳ 等待中</span>`;
            }

            // 定位
            let posClass = '';
            if (landscape) {

                if(p.corner === 'TR') posClass = 'top-10 right-1';
                if(p.corner === 'BL') posClass = 'bottom-1 left-1';
                if(p.corner === 'BR') posClass = 'bottom-1 right-1';
            } else {
                if(p.corner === 'TL') posClass = 'top-[40px] left-1 sm:left-2';
                if(p.corner === 'TR') posClass = 'top-[40px] right-1 sm:right-2';
                if(p.corner === 'BL') posClass = 'bottom-1 sm:bottom-2 left-1 sm:left-2';
                if(p.corner === 'BR') posClass = 'bottom-1 sm:bottom-2 right-1 sm:right-2';
            }

            const colorStyles = [

                { bg: 'bg-blue-950/70', border: 'border-blue-600/50', iconTxt: 'text-blue-400', nameBg: 'bg-blue-900/60' },
                { bg: 'bg-green-950/70', border: 'border-green-600/50', iconTxt: 'text-green-400', nameBg: 'bg-green-900/60' },
                { bg: 'bg-yellow-950/70', border: 'border-yellow-600/50', iconTxt: 'text-yellow-400', nameBg: 'bg-yellow-900/60' }

            const avatarStyle = isActive

            // 冠軍模式：我的陣地有特殊高亮（即使不是當前回合）

            const activeContainerStyle = isEliminated
                ? ''
                : isActive ? `ring-2 ring-amber-500/50 shadow-[0_0_20px_rgba(245,158,11,0.2)] scale-[1.02] z-30 ${meHighlight}` : `opacity-90 ${meHighlight}`;

            // 在冠軍模式下，非我的牌不能點擊
            const cardInteract = canInteract;

                        <div class="flex flex-row items-center justify-center gap-2 w-full px-1">

                                    ${!champBadge && !deathBadge && isActive && !p.isAI && !champState.inChampGame ? `<span class="text-[8px] text-amber-400 animate-bounce font-bold"><i class="fas fa-hand-point-up mr-0.5"></i>你的回合</span>` : ''}

        const renderGameTable = () => {
            const activeId = state.players[state.currentPlayerIndex].id;
            const hasSelection = state.selectedCardId !== null;


            return `
                <div class="absolute inset-0 mahjong-table table-border pointer-events-none">
                    
                    <!-- 四角玩家 -->
                    ${state.players.map(p => renderCornerPlayer(p, activeId)).join('')}


                    <!-- 中央時間軸海 (最大化拉長) -->

                icon: '🗳️',
                nodes: [67, 70, 71, 73, 74, 76, 77, 78, 79, 80, 82],
                edges: [
                    { from: 67, to: 71, label: '外交孤立激化民主訴求' },
                    { from: 70, to: 71, label: '斷交同年美麗島事件' },
                    { from: 71, to: 73, label: '民主運動催生反對黨' },
                    { from: 73, to: 74, label: '民進黨壓力下解嚴' },
                    { from: 74, to: 76, label: '解嚴後開放報禁' },
                    { from: 76, to: 77, label: '蔣逝後開放黨禁' },
                    { from: 77, to: 78, label: '多黨後終止動員戡亂' },
                    { from: 78, to: 79, label: '回歸憲政進行國會改選' },
                    { from: 79, to: 80, label: '國會改選後首次總統直選' },
                    { from: 80, to: 82, label: '直選確立後完成政黨輪替' },
                ]
            },
        ];

        window.galleryRelationView = false;

        window.openRelationGraph = () => {
            audioManager.playSFX('select');
            window.galleryRelationView = true;
            render();
        };

        window.closeRelationGraph = () => {
            audioManager.playSFX('click');
            window.galleryRelationView = false;
            render();
        };

        window.selectedRelationId = null;

        window.renderRelationGraph = () => {
            const rel = HISTORY_RELATIONS.find(r => r.id === window.selectedRelationId);
            if (!rel) {
                // 時期定義（含顏色與排序）
                const PERIOD_META = [
                    { id: 'prehistoric', name: '史前時代', order: 0, headerBg: 'linear-gradient(90deg,#78350f44,#92400e22,transparent)', borderColor: '#a16207', textColor: '#fbbf24', badgeBg: '#a1620760', icon: '🪨' },
                    { id: 'dutch',       name: '荷西時期', order: 1, headerBg: 'linear-gradient(90deg,#1d4ed844,#1e40af22,transparent)', borderColor: '#3b82f6', textColor: '#93c5fd', badgeBg: '#3b82f660', icon: '🌊' },
                    { id: 'ming',        name: '明鄭時期', order: 2, headerBg: 'linear-gradient(90deg,#dc262644,#b91c1c22,transparent)', borderColor: '#ef4444', textColor: '#fca5a5', badgeBg: '#dc262660', icon: '⚔️' },
                    { id: 'qing',        name: '清治時期', order: 3, headerBg: 'linear-gradient(90deg,#7c3aed44,#6d28d922,transparent)', borderColor: '#8b5cf6', textColor: '#c4b5fd', badgeBg: '#7c3aed60', icon: '🏛️' },
                    { id: 'japanese',    name: '日治時期', order: 4, headerBg: 'linear-gradient(90deg,#b4530944,#d9770622,transparent)', borderColor: '#f97316', textColor: '#fed7aa', badgeBg: '#b4530960', icon: '🏯' },
                    { id: 'modern',      name: '戰後與現代', order: 5, headerBg: 'linear-gradient(90deg,#0e7490 44,#06617444,transparent)', borderColor: '#06b6d4', textColor: '#a5f3fc', badgeBg: '#0e749060', icon: '🗳️' },
                    { id: 'cross',       name: '跨時期主題', order: 6, headerBg: 'linear-gradient(90deg,#37415144,#1f293722,transparent)', borderColor: '#6b7280', textColor: '#d1d5db', badgeBg: '#37415160', icon: '🔗' },
                ];

                // 判斷每個主題的主要時期（以節點卡片中最多的 period 為主，若跨多時期則標 cross）
                const getRelationPeriod = (r) => {
                    const nodeCards = r.nodes.map(nid => ALL_CARDS.find(c => c.id === nid)).filter(Boolean);
                    const periodCount = {};
                    nodeCards.forEach(c => { periodCount[c.period] = (periodCount[c.period]||0)+1; });
                    const periods = Object.keys(periodCount);
                    if (periods.length === 0) return 'cross';
                    if (periods.length === 1) return periods[0];
                    // 判斷是否明顯跨時期（超過2個不同時期）
                    if (periods.length >= 3) return 'cross';
                    // 2個時期：以數量多者為主
                    return periods.sort((a,b) => periodCount[b]-periodCount[a])[0];
                };

                // 取得主題的最早年份（用於同時期內排序）
                const getRelationMinYear = (r) => {
                    const nodeCards = r.nodes.map(nid => ALL_CARDS.find(c => c.id === nid)).filter(Boolean);
                    const years = nodeCards.map(c => c.year);
                    return years.length ? Math.min(...years) : 0;
                };

                // 為每個主題附加時期資訊，並按時期→年份排序
                const relationsWithPeriod = HISTORY_RELATIONS.map(r => ({
                    ...r,
                    _period: getRelationPeriod(r),
                    _minYear: getRelationMinYear(r),
                })).sort((a, b) => {
                    const orderA = (PERIOD_META.find(p => p.id === a._period) || {order:99}).order;
                    const orderB = (PERIOD_META.find(p => p.id === b._period) || {order:99}).order;
                    if (orderA !== orderB) return orderA - orderB;
                    return a._minYear - b._minYear;
                });

                // 按時期分組
                const groups = {};
                relationsWithPeriod.forEach(r => {
                    if (!groups[r._period]) groups[r._period] = [];
                    groups[r._period].push(r);
                });

                const orderedPeriodIds = PERIOD_META.map(p => p.id).filter(pid => groups[pid]);

                return `
                <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 shadow-lg z-10 shrink-0 flex items-center gap-3">
                        <button onclick="window.closeRelationGraph();" class="text-slate-400 hover:text-white transition px-3 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>回圖鑑</button>
                        <h2 class="text-xl font-bold text-amber-500 serif-font"><i class="fas fa-project-diagram mr-2"></i>歷史關聯圖</h2>
                        <span class="text-xs text-slate-400 ml-2 hidden sm:inline">依時代排列，選擇主題查看事件前因後果</span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 sm:p-6">
                        <div class="max-w-5xl mx-auto pb-10 space-y-8">
                            ${orderedPeriodIds.map(pid => {
                                const pmeta = PERIOD_META.find(p => p.id === pid);
                                const rels = groups[pid];
                                return `
                                <!-- 時期標題 -->
                                <div>
                                    <div class="flex items-center gap-3 mb-3 pb-2 rounded-lg px-3 py-2" style="background:${pmeta.headerBg};border-left:3px solid ${pmeta.borderColor};">
                                        <span class="text-xl">${pmeta.icon}</span>
                                        <span class="font-black text-base serif-font" style="color:${pmeta.textColor};">${pmeta.name}</span>
                                        <span class="text-[10px] ml-1 px-2 py-0.5 rounded-full font-bold" style="background:${pmeta.badgeBg};color:${pmeta.textColor};">${rels.length} 個主題</span>
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                        ${rels.map(r => {
                                            const nodeCards = r.nodes.map(nid => ALL_CARDS.find(c => c.id === nid)).filter(Boolean);
                                            const years = nodeCards.map(c => c.year).sort((a,b)=>a-b);
                                            const yearStart = years.length ? (years[0] < 0 ? '西元前'+Math.abs(years[0])+'年' : years[0]+'年') : '';
                                            const yearEnd = years.length ? (years[years.length-1] < 0 ? '西元前'+Math.abs(years[years.length-1])+'年' : years[years.length-1]+'年') : '';
                                            return `
                                            <div onclick="audioManager.playSFX('select'); window.selectedRelationId='${r.id}'; render();"
                                                class="cursor-pointer rounded-xl border p-3 sm:p-4 hover:-translate-y-1 transition-all hover:shadow-lg group relative overflow-hidden"
                                                style="background:${r.color}15; border-color:${r.color}50;">
                                                <!-- 時期色條 -->
                                                <div class="absolute top-0 left-0 right-0 h-0.5" style="background:linear-gradient(90deg,${pmeta.borderColor},transparent);"></div>
                                                <div class="flex items-start gap-2.5 mb-2">
                                                    <span class="text-xl shrink-0">${r.icon}</span>
                                                    <div class="min-w-0">
                                                        <h3 class="font-bold text-white text-sm group-hover:text-amber-300 transition-colors leading-tight">${r.theme}</h3>
                                                        <p class="text-[10px] mt-0.5" style="color:${r.color}bb;">${nodeCards.length} 個事件串聯</p>
                                                    </div>
                                                </div>
                                                <div class="flex flex-wrap gap-1 mb-2">
                                                    ${nodeCards.slice(0,4).map(c => `<span class="text-[9px] px-1.5 py-0.5 rounded font-bold text-white" style="background:${r.color}60;">${c.title.slice(0,6)}</span>`).join('')}
                                                    ${nodeCards.length > 4 ? `<span class="text-[9px] px-1.5 py-0.5 rounded text-slate-400">+${nodeCards.length-4}</span>` : ''}
                                                </div>
                                                <div class="flex items-center gap-1 text-[9px]" style="color:${pmeta.textColor}99;">
                                                    <i class="fas fa-clock text-[8px]"></i>
                                                    <span>${yearStart}${yearStart !== yearEnd ? ' → ' + yearEnd : ''}</span>
                                                </div>
                                            </div>`;
                                        }).join('')}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            }

            // 單一主題的節點+邊線顯示
            const nodeCards = rel.nodes.map(nid => ALL_CARDS.find(c => c.id === nid)).filter(Boolean);
            const sortedCards = [...nodeCards].sort((a,b) => (a.year*100+(a.month||0)) - (b.year*100+(b.month||0)));
            
            return `
            <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 shadow-lg z-10 shrink-0 flex items-center gap-3">
                    <button onclick="window.selectedRelationId=null; render();" class="text-slate-400 hover:text-white transition px-3 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>返回主題</button>
                    <span class="text-lg">${rel.icon}</span>
                    <h2 class="text-base sm:text-xl font-bold text-white serif-font">${rel.theme}</h2>
                </div>
                <div class="flex-1 overflow-y-auto p-4 sm:p-6 pb-10">
                    <!-- 說明文字 -->
                    <p class="text-xs text-slate-400 text-center mb-5">箭頭代表因果關係方向，由前因指向後果</p>
                    <!-- 流程圖：垂直排列+連線 -->
                    <div class="max-w-2xl mx-auto relative">
                        ${sortedCards.map((card, idx) => {
                            // 找以此卡為起點的邊
                            const outEdges = rel.edges.filter(e => e.from === card.id);
                            const imgSrc = renderWikiImage(card.wiki);
                            const periodName = ALL_PERIODS.find(p => p.id === card.period)?.name || '';
                            return `
                            <div class="flex flex-col items-center">
                                <!-- 節點卡片 -->
                                <div onclick="openGalleryModal(${card.id});"
                                    class="cursor-pointer w-full rounded-xl border p-3 sm:p-4 flex gap-3 items-center hover:-translate-y-0.5 transition-all hover:shadow-lg"
                                    style="background:${rel.color}18; border-color:${rel.color}50; max-width:500px;">
                                    <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-lg overflow-hidden shrink-0 bg-slate-800 border-2" style="border-color:${rel.color}60;">
                                        <img src="${imgSrc}" data-wiki="${card.wiki}" class="w-full h-full object-cover transition-opacity" style="opacity:${wikiImageCache[card.wiki] ? '1' : '0.3'};" onerror="this.src='${noPicSvg}';" onload="this.style.opacity='1';"/>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 mb-0.5 flex-wrap">
                                            <span class="font-black text-white text-sm sm:text-base">${card.title}</span>
                                            <span class="text-[9px] px-1.5 py-0.5 rounded font-bold text-white shrink-0" style="background:${rel.color}80;">${formatCardYear(card)}</span>
                                            <span class="text-[9px] text-slate-400 shrink-0">${periodName}</span>
                                        </div>
                                        <p class="text-[10px] sm:text-xs text-slate-400 leading-relaxed line-clamp-2">${card.desc}</p>
                                    </div>
                                    <div class="shrink-0 text-[9px] text-slate-600"><i class="fas fa-info-circle"></i></div>
                                </div>
                                ${outEdges.length > 0 ? outEdges.map(edge => {
                                    const toCard = nodeCards.find(c => c.id === edge.to);
                                    if (!toCard) return '';
                                    return `
                                    <!-- 連線箭頭 -->
                                    <div class="flex flex-col items-center my-1" style="max-width:500px;width:100%;">
                                        <div class="w-0.5 h-4" style="background:${rel.color}60;"></div>
                                        <div class="flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold border" style="color:${rel.color};border-color:${rel.color}40;background:${rel.color}12;">
                                            <i class="fas fa-arrow-down text-[8px]"></i>
                                            ${edge.label}
                                            <i class="fas fa-arrow-down text-[8px]"></i>
                                        </div>
                                        <div class="w-0.5 h-4" style="background:${rel.color}60;"></div>
                                    </div>`;
                                }).join('') : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            </div>`;
        };

        const renderGallery = () => {
            // 打開圖鑑時立即預抓所有圖片
            setTimeout(prefetchAllWikiImages, 100);

            // 如果是關聯圖視圖
            if (window.galleryRelationView) {
                return window.renderRelationGraph();
            }

            const filteredCards = [...ALL_CARDS]
                .filter(c => window.galleryPeriodFilter === 'all' || c.period === window.galleryPeriodFilter)
                .filter(c => {
                    const q = window.gallerySearchQuery.trim().toLowerCase();
                    if (!q) return true;
                    return c.title.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || String(c.year).includes(q);
                })
                .sort((a,b) => (a.year*100+(a.month||0)) - (b.year*100+(b.month||0)));

            const tabs = [{ id: 'all', name: '全部' }, ...ALL_PERIODS];

            return `
            <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                <!-- 頂部標題列 -->
                <div class="bg-slate-900 border-b border-slate-700 px-4 pt-4 pb-0 shadow-lg z-10 shrink-0">
                    <div class="flex items-center justify-between mb-3">
                        <button onclick="audioManager.playSFX('click'); window.galleryPeriodFilter='all'; window.gallerySearchQuery=''; window.galleryRelationView=false; window.selectedRelationId=null; state.screen='menu'; document.getElementById('game-header').classList.add('hidden'); render();" class="text-slate-400 hover:text-white transition px-3 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>返回</button>
                        <h2 class="text-xl font-bold text-amber-500 serif-font"><i class="fas fa-book-open mr-2"></i>史料圖鑑</h2>
                    <div class="flex items-center gap-2">
                        <!-- 歷史關聯圖按鈕 -->
                        <button onclick="window.openRelationGraph();"
                            class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold transition-all hover:scale-[1.03] border"
                            style="background:linear-gradient(135deg,#7c3aed22,#4f46e522);border-color:#7c3aed60;color:#a78bfa;">
                            <i class="fas fa-project-diagram text-[11px]"></i>
                            <span class="hidden sm:inline">歷史關聯圖</span>
                            <span class="sm:hidden">關聯</span>
                        </button>
                        <!-- 搜尋列 -->
                        <div class="relative w-36 sm:w-56">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                            <input
                                type="text"
                                id="gallery-search"
                                placeholder="搜尋事件、年份…"
                                value="${window.gallerySearchQuery}"
                                oninput="window.gallerySearchQuery=this.value; render(); const el=document.getElementById('gallery-search'); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length);}"
                                class="w-full bg-slate-800 border border-slate-600 focus:border-amber-500 rounded-lg pl-8 pr-3 py-2 text-white text-xs outline-none transition"
                            />
                        </div>
                    </div>
                    </div>
                    <!-- 時期篩選 Tabs -->
                    <div class="flex gap-1 overflow-x-auto pb-0 hide-scrollbar" style="scrollbar-width:none;">
                        ${tabs.map(t => `
                            <button onclick="audioManager.playSFX('click'); window.galleryPeriodFilter='${t.id}'; render();"
                                class="shrink-0 px-3 py-2 text-xs font-bold rounded-t-lg transition-all border-b-2 ${window.galleryPeriodFilter===t.id ? 'border-amber-500 text-amber-400 bg-amber-500/10' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}">
                                ${t.name}
                            </button>
                        `).join('')}
                        <div class="ml-auto shrink-0 flex items-center pb-1 text-[10px] text-slate-500 pr-1">
                            共 <span class="text-amber-400 font-bold mx-1">${filteredCards.length}</span> 筆
                        </div>
                    </div>
                </div>

                <!-- 卡片列表 -->
                <div class="flex-1 overflow-y-auto p-4 sm:p-8">
                    ${filteredCards.length === 0 ? `
                        <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-3">
                            <i class="fas fa-search text-5xl text-slate-700"></i>
                            <p class="text-base">找不到符合的史料</p>
                            <button onclick="window.gallerySearchQuery=''; window.galleryPeriodFilter='all'; render();" class="text-amber-400 text-sm hover:underline">清除篩選</button>
                        </div>
                    ` : `
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6 max-w-7xl mx-auto pb-12">
                        ${filteredCards.map(card => `
                            <div onclick="openGalleryModal(${card.id});"
                                class="bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700 hover:border-amber-500/70 hover:shadow-amber-500/10 hover:shadow-xl transition-all hover:-translate-y-1 group cursor-pointer relative">
                                <!-- 點擊提示 -->
                                <div class="absolute top-2 right-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="bg-amber-500/90 text-black text-[9px] font-bold px-1.5 py-0.5 rounded shadow flex items-center gap-1">
                                        <i class="fas fa-info-circle text-[8px]"></i> 介紹
                                    </span>
                                </div>
                                <div class="h-32 sm:h-40 bg-slate-900 relative">
                                    <img src="${renderWikiImage(card.wiki)}" data-wiki="${card.wiki}" class="w-full h-full object-cover transition-opacity duration-500" onerror="this.src='${noPicSvg}';"/>
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent group-hover:from-amber-950/80 transition-all"></div>
                                    <div class="absolute bottom-2 left-2 right-2 flex justify-between items-end">
                                        <span class="text-[10px] font-bold bg-amber-600/80 text-white px-1.5 py-0.5 rounded backdrop-blur-sm shadow">${formatCardYear(card)}</span>
                                        <span class="text-[10px] text-slate-300 bg-black/60 px-1.5 py-0.5 rounded backdrop-blur-sm">${ALL_PERIODS.find(p=>p.id===card.period).name.slice(0,2)}</span>
                                    </div>
                                </div>
                                <div class="p-3">
                                    <h3 class="font-bold text-sm text-slate-100 mb-1 group-hover:text-amber-400 transition-colors line-clamp-1 flex items-center gap-1" title="${card.title}">
                                        ${card.title}
                                        <i class="fas fa-chevron-right text-[8px] text-slate-600 group-hover:text-amber-500/70 transition-colors ml-auto shrink-0"></i>
                                    </h3>
                                    <p class="text-[10px] text-slate-400 line-clamp-3 leading-relaxed" title="${card.desc}">${card.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>`}
                </div>
            </div>
            `;
        };



        // ===== 無限挑戰模式邏輯 =====
        const startSoloInfinite = (selectedPeriods, questionDifficulty) => {
            audioManager.playSFX('click');
            let cards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if(cards.length < 5) return alert('題庫不足！請增加時代或降低難度。');
            state.isSoloInfinite = true;
            state.deck = shuffle([...cards]);
            state.timeline = [state.deck.pop()]; // 起始一張（已在renderSoloPlay中以compact模式顯示）
            state.soloPlaced = 0;
            state.soloFailed = false;
            state.soloFailedCard = null;
            state.soloDifficulty = questionDifficulty;
            state.soloCard = state.deck.pop(); // 第一張待放牌
            state.selectedCardId = state.soloCard ? state.soloCard.id : null;
            startTimer();
            audioManager.switchToGameBGM();
            state.screen = 'soloPlay';
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('display-round').innerText = '無限挑戰';
            document.getElementById('game-deck-count').innerText = state.deck.length;
            render();
        };

        const handleSoloGapClick = (insertIndex) => {
            if(!state.soloCard || state.soloFailed) return;
            const card = state.soloCard;
            const cardVal2 = card.year * 100 + (card.month || 0);
            const tlVal2 = (c) => c.year * 100 + (c.month || 0);
            let ok = false;
            if(insertIndex === 0) ok = cardVal2 <= tlVal2(state.timeline[0]);
            else if(insertIndex === state.timeline.length) ok = cardVal2 >= tlVal2(state.timeline[insertIndex-1]);
            else ok = cardVal2 >= tlVal2(state.timeline[insertIndex-1]) && cardVal2 <= tlVal2(state.timeline[insertIndex]);

            if(ok) {
                audioManager.playSFX('correct');
                state.timeline.splice(insertIndex, 0, card);
                state.soloPlaced++;
                showToast(`🎯 正確！已成功放置 ${state.soloPlaced} 張`, true, 2000);
                // 抽下一張
                if(state.deck.length > 0) {
                    setTimeout(() => {
                        audioManager.playSFX('card');
                        state.soloCard = state.deck.pop();
                        state.selectedCardId = state.soloCard.id;
                        document.getElementById('game-deck-count').innerText = state.deck.length;
                        render();
                    }, 800);
                } else {
                    // 牌庫清空 = 通關
                    state.soloCard = null;
                    setTimeout(() => endSoloGame(true), 1000);
                }
            } else {
                // 答錯立即結束
                audioManager.playSFX('wrong');
                audioManager.playSFX('gameover');
                audioManager.switchToResultBGM();
                state.soloFailed = true;
                state.soloFailedCard = card;
                state.screen = 'soloOver';
                stopTimer();
                showToast(`❌ 答錯！【${card.title}】發生於 ${formatCardYear(card)}`, false, 5000);
                // 震動提示
                document.getElementById('app').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('app').classList.remove('shake');
                    render();
                }, 600);
            }
        };

        const endSoloGame = (cleared) => {
            stopTimer();
            audioManager.playSFX(cleared ? 'win' : 'gameover');
            audioManager.switchToResultBGM();
            state.soloFailed = !cleared;
            state.screen = 'soloOver';
            render();
        };


        // ===== 究極挑戰模式 =====
        // 階段定義：[起始題號(1-based), 結束題號, 模式]
        // 模式: 'choice2' | 'choice3' | 'choice4' | 'range5' | 'range10' | 'range20' | 'free'
        const ULTIMATE_PHASES = [
            { start: 1,  end: 10,  mode: 'choice2',  label: '二選一',      beastColor: 'gray'  },
            { start: 11, end: 20,  mode: 'choice3',  label: '三選一',      beastColor: 'white' },
            { start: 21, end: 30,  mode: 'choice4',  label: '四選一',      beastColor: 'green' },
            { start: 31, end: 50,  mode: 'range5',   label: '5年內提示',   beastColor: 'yellow'},
            { start: 51, end: 70,  mode: 'range10',  label: '10年內提示',  beastColor: 'red'   },
            { start: 71, end: 90,  mode: 'range20',  label: '20年內提示',  beastColor: 'blue'  },
            { start: 91, end: 100, mode: 'free',     label: '直接輸入',    beastColor: 'black' },
        ];
        const getUltimatePhase = (qNum) => ULTIMATE_PHASES.find(p => qNum >= p.start && qNum <= p.end) || ULTIMATE_PHASES[ULTIMATE_PHASES.length-1];

        const startUltimate = (selectedPeriods, questionDifficulty) => {
            audioManager.playSFX('click');
            let cards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if(cards.length < 5) return alert('題庫不足！請增加時代或降低難度。');
            state.isUltimate = true;
            state.ultimateDeck = shuffle([...cards]);
            state.ultimateHP = 100;       // 百分比血量，100滴
            state.ultimateAnswered = 0;
            state.ultimateCorrect = 0;
            state.ultimateCorrectStreak = 0;
            state.ultimateCard = state.ultimateDeck.pop();
            state.ultimateInput = '';
            state.ultimateIsBC = false;
            state.ultimateLastResult = null;
            state.ultimateBeastAnim = 'idle';
            state.ultimateDifficulty = questionDifficulty;
            state.ultimateCards = [];
            state.ultimateCardMilestone = 10;
            state.ultimateActiveCard = null;
            state.ultimateCardEffect = null;
            // 根據目前題號生成選項
            state.ultimateChoiceOptions = null;
            state.ultimatePlayerHP = 3;
            state.ultimatePlayerStreakForHP = 0;
            startTimer();
            audioManager.switchToGameBGM();
            state.screen = 'ultimatePlay';
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('display-round').innerText = '厲始魔王';
            document.getElementById('game-deck-count').innerText = state.ultimateDeck.length;
            // 第一題先生成選項
            generateUltimateChoiceOptions();
            render();
        };

        // 根據目前階段生成選項
        const PREHISTORIC_YEARS = [-50000, -40000, -30000, -5000, -4000, -3000, -2500, -2000, -1500, 0, 500];

        const generateUltimateChoiceOptions = () => {
            const card = state.ultimateCard;
            if(!card) return;
            const phase = getUltimatePhase(state.ultimateAnswered + 1);
            const correctYear = card.year;
            const mode = phase.mode;
            const isPrehistoric = card.period === 'prehistoric';

            if(mode === 'choice2' || mode === 'choice3' || mode === 'choice4') {
                const count = mode === 'choice2' ? 2 : mode === 'choice3' ? 3 : 4;
                let options = new Set([correctYear]);

                if(isPrehistoric) {
                    // 史前：從其他史前年代中挑誘答（排除正確答案）
                    const otherYears = shuffle(PREHISTORIC_YEARS.filter(y => y !== correctYear));
                    for(let i = 0; i < otherYears.length && options.size < count; i++) {
                        options.add(otherYears[i]);
                    }
                    // 若史前年代不夠，補隨機偏移
                    if(options.size < count) {
                        const range = 10000;
                        let attempts = 0;
                        while(options.size < count && attempts < 200) {
                            const offset = (Math.floor(Math.random() * 9) + 1) * 1000 * (Math.random() < 0.5 ? 1 : -1);
                            const candidate = correctYear + offset;
                            if(!PREHISTORIC_YEARS.includes(candidate)) options.add(candidate);
                            attempts++;
                        }
                    }
                } else {
                    const range = 40;
                    let attempts = 0;
                    while(options.size < count && attempts < 200) {
                        const offset = Math.floor(Math.random() * range * 2) - range;
                        if(offset !== 0) {
                            const candidate = Math.min(correctYear + offset, 2025);
                            if(candidate !== correctYear) options.add(candidate);
                        }
                        attempts++;
                    }
                }
                state.ultimateChoiceOptions = shuffle([...options]);

            } else if(mode === 'range5' || mode === 'range10' || mode === 'range20') {
                state.ultimateChoiceOptions = null;

                if(isPrehistoric) {
                    // 史前範圍提示：用兩個相鄰史前年代包夾正確答案
                    const sorted = [...PREHISTORIC_YEARS].sort((a, b) => a - b);
                    // 找出所有不等於正確答案的年代，從中找包夾對
                    let lo = null, hi = null;
                    // 找比 correctYear 小的最大值（lo）和比 correctYear 大的最小值（hi）
                    const loCandidates = sorted.filter(y => y < correctYear);
                    const hiCandidates = sorted.filter(y => y > correctYear);
                    if(loCandidates.length > 0 && hiCandidates.length > 0) {
                        // 多個候選時，為增加難度可隨機選（但必須包夾正確答案）
                        // lo 從最靠近的 1~2 個裡隨機；hi 同理
                        const loPool = loCandidates.slice(-Math.min(2, loCandidates.length));
                        const hiPool = hiCandidates.slice(0, Math.min(2, hiCandidates.length));
                        lo = loPool[Math.floor(Math.random() * loPool.length)];
                        hi = hiPool[Math.floor(Math.random() * hiPool.length)];
                    } else if(loCandidates.length > 0) {
                        // 正確答案是最大值，取最後兩個 lo
                        lo = loCandidates[loCandidates.length - 2] ?? loCandidates[loCandidates.length - 1];
                        hi = correctYear + Math.abs(correctYear - lo);
                    } else {
                        // 正確答案是最小值，取前兩個 hi
                        hi = hiCandidates[1] ?? hiCandidates[0];
                        lo = correctYear - Math.abs(hi - correctYear);
                    }
                    state.ultimateRangeHint = { lo, hi, delta: Math.round((hi - lo) / 2), correctYear, isPrehistoric: true };
                } else {
                    // 一般範圍提示（原本邏輯）
                    const delta = mode === 'range5' ? 5 : mode === 'range10' ? 10 : 20;
                    const offset = Math.floor(Math.random() * (delta + 1));
                    let lo = correctYear - offset;
                    let hi = lo + delta * 2;
                    // 確保 hi 不超過 2025，若超出則整體往前平移（lo 同步縮減）
                    if(hi > 2025) {
                        const overflow = hi - 2025;
                        hi = 2025;
                        lo = Math.min(lo, lo - overflow);
                    }
                    state.ultimateRangeHint = { lo, hi, delta, correctYear };
                }
            } else {
                state.ultimateChoiceOptions = null;
                state.ultimateRangeHint = null;
            }
        };

        window.ultimateNumPress = (val) => {
            audioManager.playSFX('click');
            if(val === 'BC') {
                state.ultimateIsBC = !state.ultimateIsBC;
            } else if(val === '⌫') {
                state.ultimateInput = state.ultimateInput.slice(0,-1);
            } else if(val === 'OK') {
                confirmUltimateAnswer();
                return;
            } else {
                if(state.ultimateInput.length < 6) state.ultimateInput += val;
            }
            const disp = document.getElementById('ult-input-display');
            if(disp) updateUltimateDisplay();
        };

        const updateUltimateDisplay = () => {
            const disp = document.getElementById('ult-input-display');
            if(!disp) return;
            const val = state.ultimateInput || '＿';
            const prefix = state.ultimateIsBC ? '<span class="text-purple-300">西元前 </span>' : '<span class="text-blue-300">西元 </span>';
            disp.innerHTML = prefix + '<span class="text-white font-black text-2xl">' + val + '</span>' + (state.ultimateInput ? '<span class="text-amber-400"> 年</span>' : '');
        };

        const confirmUltimateAnswer = () => {
            const card = state.ultimateCard;
            if(!card) return;
            const phase = getUltimatePhase(state.ultimateAnswered + 1);
            const mode = phase.mode;
            // 選擇題模式不走這（走 selectChoiceAnswer）
            if(mode === 'choice2' || mode === 'choice3' || mode === 'choice4') return;
            if(!state.ultimateInput) return;

            let guessYear = state.ultimateIsBC ? -parseInt(state.ultimateInput) : parseInt(state.ultimateInput);
            // 範圍提示題：判斷是否在範圍內即算對
            if((mode === 'range5' || mode === 'range10' || mode === 'range20') && state.ultimateRangeHint) {
                const hint = state.ultimateRangeHint;
                if(guessYear >= hint.lo && guessYear <= hint.hi) {
                    processUltimateAnswer(hint.correctYear); // 傳入正確答案讓判斷通過
                } else {
                    processUltimateAnswer(guessYear);
                }
            } else {
                processUltimateAnswer(guessYear);
            }
        };

        // 選擇題選項點擊
        window.selectChoiceAnswer = (year) => {
            audioManager.playSFX('click');
            processUltimateAnswer(year);
        };

        const processUltimateAnswer = (guessYear) => {
            const card = state.ultimateCard;
            if(!card) return;

            const correct = guessYear === card.year;
            state.ultimateAnswered++;
            state.ultimateLastResult = correct ? 'correct' : 'wrong';

            if(correct) {
                audioManager.playSFX('correct');
                state.ultimateCorrect++;
                state.ultimateCorrectStreak++;
                state.ultimatePlayerStreakForHP++;
                // 答對扣魔王血量（100滴血，答對1題扣1滴）
                state.ultimateHP = Math.max(0, state.ultimateHP - 1);
                state.ultimateBeastAnim = 'idle';
                const phaseNow = getUltimatePhase(state.ultimateAnswered);
                const isRangeMode = phaseNow && (phaseNow.mode==='range5'||phaseNow.mode==='range10'||phaseNow.mode==='range20');
                // 每連續答對3題加一滴血（最多3格）
                if(state.ultimatePlayerStreakForHP >= 3) {
                    state.ultimatePlayerStreakForHP = 0;
                    if(state.ultimatePlayerHP < 3) {
                        state.ultimatePlayerHP++;
                        showToast(isRangeMode ? `✅ 命中範圍！正確答案是 ${formatCardYear(card)}　❤️ 連續3題！恢復一滴血！` : `✅ 正確！已對魔王造成傷害 ${state.ultimateCorrect}/100　❤️ 連續3題！恢復一滴血！`, true, 2500);
                    } else {
                        showToast(isRangeMode ? `✅ 命中範圍！正確答案是 ${formatCardYear(card)}　🔥 連續3題！(血量已滿)` : `✅ 正確！已對魔王造成傷害 ${state.ultimateCorrect}/100　🔥 連續3題！(血量已滿)`, true, 2500);
                    }
                } else {
                    showToast(isRangeMode ? `✅ 命中範圍！正確答案是 ${formatCardYear(card)}` : `✅ 正確！已對魔王造成傷害 ${state.ultimateCorrect}/100`, true, 2000);
                }

                // 每答對10題獲得抽卡機會
                if(state.ultimateCorrect >= state.ultimateCardMilestone) {
                    state.ultimateCardMilestone += 10;
                    if(state.ultimateCards.length < 3) {
                        const newCard = drawUltimateCard();
                        state.ultimateCards.push(newCard);
                        showToast(`🃏 獲得卡牌：【${newCard.name}】！（已存 ${state.ultimateCards.length}/3 張）`, true, 3000);
                    } else {
                        showToast(`🃏 答對10題但手牌已滿（3/3），無法再得卡！`, false, 2500);
                    }
                }
            } else {
                audioManager.playSFX('wrong');
                state.ultimateCorrectStreak = 0;
                state.ultimatePlayerStreakForHP = 0; // 中斷連續，重置
                state.ultimatePlayerHP = Math.max(0, state.ultimatePlayerHP - 1);
                state.ultimateBeastAnim = 'attack';
                const hint = state.ultimateRangeHint;
                const hintStr = hint ? `（範圍提示：${hint.lo < 0 ? '西元前'+Math.abs(hint.lo) : hint.lo}～${hint.hi < 0 ? '西元前'+Math.abs(hint.hi) : hint.hi} 年）` : '';
                const hpRemain = state.ultimatePlayerHP > 0 ? `　💔 剩餘血量：${'❤️'.repeat(state.ultimatePlayerHP)}${'🖤'.repeat(3-state.ultimatePlayerHP)}` : `　💀 血量耗盡！`;
                showToast(`❌ 答錯！正確：${formatCardYear(card)}${hintStr}${hpRemain}`, false, 3500);
            }

            // 清除卡牌效果
            state.ultimateCardEffect = null;
            state.ultimateChoiceOptions = null;
            state.ultimateRangeHint = null;

            // 清空輸入
            state.ultimateInput = '';
            state.ultimateIsBC = false;

            // 玩家血量耗盡 → 遊戲結束
            if(state.ultimatePlayerHP <= 0) {
                state.ultimateCard = null;
                state.ultimateBeastAnim = 'idle';
                setTimeout(() => {
                    state.screen = 'ultimateOver';
                    stopTimer();
                    audioManager.switchToResultBGM();
                    render();
                }, 1200);
                render();
                return;
            }

            // 檢查是否達到100題（魔王血量歸零）或牌庫已空
            if(state.ultimateHP <= 0 || state.ultimateAnswered >= 100) {
                // 通關！
                state.ultimateCard = null;
                state.ultimateBeastAnim = 'idle';
                setTimeout(() => {
                    state.screen = 'ultimateOver';
                    stopTimer();
                    audioManager.switchToResultBGM();
                    render();
                }, 800);
                return;
            }

            if(state.ultimateDeck.length > 0) {
                state.ultimateCard = state.ultimateDeck.pop();
                document.getElementById('game-deck-count').innerText = state.ultimateDeck.length;
                // 根據新題號生成新選項
                const prevPhase = getUltimatePhase(state.ultimateAnswered);
                const nextPhase = getUltimatePhase(state.ultimateAnswered + 1);
                if(prevPhase && nextPhase && prevPhase.mode !== nextPhase.mode) {
                    setTimeout(() => showToast(`🔥 階段突破！進入【${nextPhase.label}】— 魔王變身！`, true, 3000), 300);
                }
                generateUltimateChoiceOptions();
            } else {
                // 牌庫空了也算結束
                state.ultimateCard = null;
                setTimeout(() => {
                    state.screen = 'ultimateOver';
                    stopTimer();
                    audioManager.switchToResultBGM();
                    render();
                }, 800);
                return;
            }

            // 動畫後恢復 idle
            const animDur = correct ? 400 : 750;
            setTimeout(() => {
                if(state.screen === 'ultimatePlay') {
                    state.ultimateBeastAnim = 'idle';
                    render();
                }
            }, animDur);

            render();
        };

        // 卡牌池定義
        const ULTIMATE_CARD_POOL = [
            { id: 'choice4', name: '四選一', icon: '🎯', desc: '本題顯示4個選項，從中選擇正確年份', color: '#2563eb' },
            { id: 'range',   name: '年代範圍', icon: '📅', desc: '本題顯示±10年的年代範圍作為提示', color: '#7c3aed' },
            { id: 'pass',    name: 'Pass卡', icon: '⏭️', desc: '跳過本題，不扣血、不算錯', color: '#059669' },
            { id: 'half',    name: '去蕪存菁', icon: '✂️', desc: '排除本題最不可能的2個錯誤年代（配合四選一）', color: '#d97706' },
        ];

        const drawUltimateCard = () => {
            return ULTIMATE_CARD_POOL[Math.floor(Math.random() * ULTIMATE_CARD_POOL.length)];
        };

        // 使用卡牌
        window.useUltimateCard = (idx) => {
            const card = state.ultimateCards[idx];
            if(!card || !state.ultimateCard) return;
            audioManager.playSFX('select');

            if(card.id === 'pass') {
                // 直接跳題，不扣血
                state.ultimateCards.splice(idx, 1);
                showToast(`⏭️ 使用 Pass！跳過本題`, true, 2000);
                state.ultimateInput = '';
                state.ultimateIsBC = false;
                state.ultimateCardEffect = null;
                if(state.ultimateDeck.length > 0) {
                    state.ultimateCard = state.ultimateDeck.pop();
                    document.getElementById('game-deck-count').innerText = state.ultimateDeck.length;
                } else {
                    state.ultimateCard = null;
                    setTimeout(() => { state.screen = 'ultimateOver'; stopTimer(); render(); }, 800);
                    return;
                }
                render();
                return;
            }

            if(card.id === 'choice4') {
                // 生成4選1選項
                const correct = state.ultimateCard.year;
                const isPrehistoric = state.ultimateCard.period === 'prehistoric';
                let options = new Set([correct]);
                if(isPrehistoric) {
                    const otherYears = shuffle(PREHISTORIC_YEARS.filter(y => y !== correct));
                    for(let i = 0; i < otherYears.length && options.size < 4; i++) {
                        options.add(otherYears[i]);
                    }
                } else {
                    const range = 30;
                    let attempts = 0;
                    while(options.size < 4 && attempts < 100) {
                        const offset = Math.floor(Math.random() * range * 2) - range;
                        if(offset !== 0) {
                            const candidate = Math.min(correct + offset, 2025);
                            if(candidate !== correct) options.add(candidate);
                        }
                        attempts++;
                    }
                }
                const opts = shuffle([...options]);
                state.ultimateCardEffect = { type: 'choice4', options: opts };
                state.ultimateCards.splice(idx, 1);
                showToast('🎯 四選一已啟動！請選擇正確年份', true, 2000);
                render();
                return;
            }

            if(card.id === 'range') {
                const correct = state.ultimateCard.year;
                const lo = correct - 10;
                const hi = correct + 10;
                state.ultimateCardEffect = { type: 'range', lo, hi };
                state.ultimateCards.splice(idx, 1);
                showToast(`📅 年代範圍：${lo < 0 ? '西元前'+Math.abs(lo) : lo} ～ ${hi < 0 ? '西元前'+Math.abs(hi) : hi} 年`, true, 3000);
                render();
                return;
            }

            if(card.id === 'half') {
                // 去蕪存菁：若有 choice4 效果就移除2個錯誤選項，否則提示
                if(state.ultimateCardEffect && state.ultimateCardEffect.type === 'choice4') {
                    const correct = state.ultimateCard.year;
                    let opts = state.ultimateCardEffect.options.filter(o => o !== correct);
                    opts = shuffle(opts).slice(0, 1); // 只保留1個錯誤
                    state.ultimateCardEffect.options = shuffle([correct, ...opts]);
                    state.ultimateCards.splice(idx, 1);
                    showToast('✂️ 去蕪存菁！刪去2個錯誤選項', true, 2000);
                } else {
                    showToast('✂️ 去蕪存菁需搭配四選一卡使用！', false, 2000);
                    return;
                }
                render();
                return;
            }
        };

        // 四選一選項點擊（舊卡牌效果保留相容）
        window.selectChoice4Answer = (year) => {
            audioManager.playSFX('click');
            const isBC = year < 0;
            state.ultimateInput = String(Math.abs(year));
            state.ultimateIsBC = isBC;
            state.ultimateCardEffect = null; // 清除效果，進入正常確認流程
            processUltimateAnswer(year);
        };

        // 渲染究極挑戰設定頁
        const renderUltimateSetup = () => `
            <div class="setup-outer absolute inset-0 flex flex-col items-center justify-center p-4 overflow-y-auto z-10" style="background:radial-gradient(ellipse at center,#1a0505 0%,#0a0202 100%);">
                <div class="setup-panel glass-panel p-6 sm:p-10 rounded-2xl w-full max-w-lg animate-scale-up relative my-auto" style="border-color:rgba(239,68,68,0.35);">
                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; render();" class="absolute top-3 left-4 text-slate-400 hover:text-red-400 transition text-sm z-10"><i class="fas fa-arrow-left mr-1"></i> 返回</button>
                    <div class="setup-title-area text-center mb-4 mt-6">
                        <div class="setup-icon text-6xl mb-2 animate-pulse">🐉</div>
                        <div>
                            <h2 class="text-2xl font-bold serif-font" style="color:#f87171;">究極挑戰模式</h2>
                            <p class="text-slate-400 text-xs mt-2 leading-relaxed setup-desc-long">100題挑戰，答對一題扣魔王一滴血<br>玩家有❤️❤️❤️三格血量，答錯扣一滴血，血量耗盡即失敗<br>連續答對3題可回復一滴血（最多三格）<br>共100滴血 · 7個階段逐漸增難<br>二選一→三選一→四選一→年代提示→直接輸入</p>
                            <p class="text-slate-400 text-xs mt-1 hidden landscape-desc">❤️❤️❤️三命制 · 答對扣魔王血 · 100題通關</p>
                        </div>
                    </div>
                    <div class="setup-body-grid grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                        <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                            <label class="block text-red-400 font-bold mb-2 text-xs"><i class="fas fa-layer-group mr-1"></i>考驗難度</label>
                            <select id="ultQDiff" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-xs">
                                <option value="1">簡易</option>
                                <option value="2" selected>中等 (常規)</option>
                                <option value="3">極難 (含冷門)</option>
                            </select>
                        </div>
                        <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                            <label class="block text-red-400 font-bold mb-2 text-xs"><i class="fas fa-skull-crossbones mr-1"></i>規則說明</label>

        // 厲始魔王 SVG — 支援顏色主題

            red:    { body: '#1a0505', stroke: '#dc2626', wing: '#3b0a0a', head: '#2d0808', horn: '#7f1d1d', glow: '#ef444477' },

            <line x1="54" y1="62" x2="52" y2="68" stroke="${t.stroke}" stroke-width="1.5"/>
            <line x1="60" y1="64" x2="60" y2="70" stroke="${t.stroke}" stroke-width="1.5"/>
            <line x1="66" y1="62" x2="68" y2="68" stroke="${t.stroke}" stroke-width="1.5"/>
            <path d="M80 90 Q95 100 88 110 Q85 102 78 98Z" fill="${t.horn}" stroke="${t.stroke}" stroke-width="1"/>

        // 渲染究極挑戰遊戲畫面

                    ${streak >= 3 ? `<span class="text-xs font-bold streak-glow" style="color:#fbbf24;">🔥 連續答對 ${streak} 題！</span>` : '<div></div>'}

                <!-- 選擇題區域 -->

                <!-- 年份輸入框（范圍提示／直接輸入題用） -->
                ${needsNumpad ? `
                <div class="mx-4 mb-2 shrink-0">

        const renderUltimateOver = () => {

        // ── 房間等待室 ──

            champUnsubscribeAll();
            const db = window.firebaseDB;

            const unsub = window.firebaseOnValue(roomRef, (snap) => {
                if (!snap.exists()) return;

                // 偵測自己是否被踢除（非戰情中心才檢查）
                if (!champState.isWarRoom && champState.playerId) {
                    const players = data.players || {};
                    if (!players[champState.playerId]) {
                        // 自己被踢了：解除監聽、重置狀態、回主畫面
                        champUnsubscribeAll();
                        champState = { players: {}, unsubscribes: [], isHost: false, isWarRoom: false, roomCode: null, playerId: null, bracket: null, roundNum: 1 };
                        state.screen = 'champMenu';
                        render();

                        const overlay = document.createElement('div');

                                    style="background:linear-gradient(135deg,#78350f,#92400e);border:1px solid rgba(251,191,36,0.4);color:#fbbf24;font-weight:bold;padding:10px 32px;border-radius:10px;cursor:pointer;font-size:0.9rem;">

                // Step 1: bracket revealed (grouped) → show tree to players
                if ((data.status === 'grouped' || data.status === 'playing') && data.bracket) {
                    champState.bracket = data.bracket;
                    champSetMyCurrentMatch();

                    // Step 2: match_start fired → auto-launch game
                    if (data.match_start && data.status === 'playing' && champState.currentMatchId) {
                        if (state.screen !== 'play' && state.screen !== 'gameover') {

                            champStartMyGame();

                        champListenMyMatch();

                if (state.screen === 'champRoom') render();

            champState.unsubscribes.push(unsub);
