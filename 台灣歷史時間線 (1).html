<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台灣歷史時間軸 - 四角爭霸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap');


        :root {
            --table-green: radial-gradient(circle, #064e3b 0%, #022c22 80%, #02140f 100%);
            --wood-border: linear-gradient(135deg, #78350f 0%, #451a03 50%, #1c1917 100%);
        }


        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #090d16;
            overscroll-behavior: none;
            overflow: hidden;
            color: #f8fafc;
        }


        .serif-font { font-family: 'Noto Serif TC', serif; }


        /* 麻將桌底色與木質感邊框 */
        .mahjong-table {
            background: var(--table-green);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            position: relative;
        }


        .table-border {
            border: 10px solid #292524;
            border-image: var(--wood-border) 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }


        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }


        /* 迷你卡牌與緊湊堆疊 */
        .mini-card-container {
            transition: all 0.2s ease-out;
            margin-left: -12px; /* 縮小重疊距離適應並列 */
        }
        .mini-card-container:first-child { margin-left: 0; }
        .mini-card-container:hover {
            transform: translateY(-8px);
            z-index: 30;
        }
        
        .mini-card {
            transition: all 0.3s ease;
            box-shadow: -4px 0 10px rgba(0,0,0,0.4);
        }
        .mini-card:hover {
            border-color: #fbbf24;
            box-shadow: -2px 10px 20px rgba(245, 158, 11, 0.5);
        }


        /* 中間公海時間軸 */
        .timeline-scroll {
            scroll-behavior: smooth;
        }
        .timeline-scroll::-webkit-scrollbar { height: 8px; }
        .timeline-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.6); border-radius: 4px; }


        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 25px rgba(245, 158, 11, 0.9); }
        }
        .gap-pulse {
            animation: pulse-gold 1.5s infinite;
            background: rgba(245, 158, 11, 0.25) !important;
            border-color: #f59e0b !important;
        }


        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-scale-up { animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col select-none text-slate-100">


    <!-- 全螢幕輔助 -->
    <div id="fs-helper" class="fixed inset-0 bg-black/90 z-[110] flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
        <div class="glass-panel p-8 sm:p-12 rounded-3xl max-w-md border border-amber-500/30">
            <i class="fas fa-expand text-6xl text-amber-500 mb-6 animate-pulse"></i>
            <h2 class="text-3xl font-black mb-4 serif-font text-yellow-400">進入歷史牌局</h2>
            <p class="text-slate-300 mb-8">為確保「四角對戰佈局」完美呈現，請點擊下方開啟全螢幕模式。</p>
            <button onclick="requestStartGame()" class="bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-4 px-10 rounded-xl text-lg shadow-lg">
                開啟並載入遊戲
            </button>
        </div>
    </div>


    <!-- 頂部資訊列 (極簡) -->
    <div id="game-header" class="hidden bg-black/80 border-b border-emerald-900/50 text-white px-4 py-2 shadow-lg flex justify-between items-center z-[60] absolute top-0 w-full h-[40px]">
        <div class="flex items-center gap-3">
            <span class="text-amber-400 font-bold text-sm tracking-widest" id="display-round">第 1 回合</span>
            <button onclick="handleHomeClick()" class="w-7 h-7 flex items-center justify-center text-[12px] text-slate-400 hover:text-white border border-slate-600 hover:border-amber-500 rounded bg-slate-800 transition-all shadow-inner group" title="返回主畫面">
                <i class="fas fa-home group-hover:scale-110"></i>
            </button>
        </div>
        <div class="flex items-center gap-4 text-xs font-mono">
            <div class="text-amber-300"><i class="fas fa-clock mr-1"></i><span id="game-timer">00:00</span></div>
            <div class="text-slate-300 border-l border-slate-600 pl-4"><i class="fas fa-layer-group mr-1"></i>剩餘: <span id="game-deck-count" class="font-bold">0</span></div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="audioManager.toggle()" id="btn-audio" class="text-amber-500 hover:text-amber-300 px-2"><i class="fas fa-volume-mute"></i></button>
            <button onclick="toggleFullscreen()" class="text-slate-400 hover:text-white px-2"><i class="fas fa-expand"></i></button>
        </div>
    </div>


    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-2 rounded-full text-white font-bold text-sm opacity-0 transition-all duration-300 pointer-events-none shadow-2xl glass-panel"></div>


    <!-- 遊戲容器 -->
    <div id="app" class="flex-1 w-full h-full relative"></div>


    <!-- 自定義確認對話框 (抽離至全域) -->
    <div id="confirm-modal" class="fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="glass-panel p-6 sm:p-8 rounded-2xl max-w-sm w-full border border-amber-500/30 shadow-2xl animate-scale-up text-center">
            <div class="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                <i class="fas fa-door-open text-3xl text-amber-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 serif-font">結束當前牌局？</h3>
            <p class="text-slate-400 text-sm mb-6 leading-relaxed">目前的遊戲進度將會遺失，確定要返回主畫面嗎？</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-sm transition-colors">
                    繼續比賽
                </button>
                <button onclick="confirmQuitGame()" class="flex-1 py-3 px-4 rounded-xl bg-gradient-to-r from-red-600 to-orange-700 hover:from-red-500 hover:to-orange-600 text-white font-bold text-sm shadow-lg transition-all">
                    確定退出
                </button>
            </div>
        </div>
    </div>


    <script>
        // --- Web Audio ---
        const audioManager = {
            ctx: null, isMuted: true, bgmSequence: null, nextNoteTime: 0, currentNoteIndex: 0,
            scale: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25], 
            melodyPattern: [0, 2, 4, -1, 3, 5, 4, -1, 2, 4, 6, 5, 4, 2, 0, -1],
            tempo: 75,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            toggle() {
                this.init(); if (this.ctx.state === 'suspended') this.ctx.resume();
                this.isMuted = !this.isMuted;
                document.querySelector('#btn-audio i').className = this.isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
                this.isMuted ? this.stopBGM() : (this.playSFX('select'), this.startBGM());
            },
            createPluckSound(freq, time, vol = 0.1) {
                if(this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 1.2);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(time); osc.stop(time + 1.5);
            },
            playSFX(event) {
                if(this.isMuted || !this.ctx) return;
                const t = this.ctx.currentTime;
                if(event==='click') this.createPluckSound(392, t, 0.1);
                else if(event==='select') this.createPluckSound(523.25, t, 0.15);
                else if(event==='correct') [523.25, 659.25, 783.99].forEach((f, i) => this.createPluckSound(f, t + i*0.08, 0.15));
                else if(event==='wrong') {
                    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, t); osc.frequency.exponentialRampToValueAtTime(60, t + 0.25);
                    gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(t); osc.stop(t + 0.25);
                }
                else if(event==='win') [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50].forEach((f, i) => this.createPluckSound(f, t + i*0.08, 0.2));
            },
            scheduleNote() {
                while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    let note = this.melodyPattern[this.currentNoteIndex];
                    if (note !== -1) this.createPluckSound(this.scale[note], this.nextNoteTime, 0.03);
                    this.nextNoteTime += 60.0 / this.tempo;
                    this.currentNoteIndex = (this.currentNoteIndex + 1) % this.melodyPattern.length;
                }
                this.bgmSequence = requestAnimationFrame(() => this.scheduleNote());
            },
            startBGM() { if (this.isMuted || !this.ctx) return; if(this.bgmSequence) cancelAnimationFrame(this.bgmSequence); this.nextNoteTime = this.ctx.currentTime + 0.1; this.scheduleNote(); },
            stopBGM() { if(this.bgmSequence) cancelAnimationFrame(this.bgmSequence); }
        };


        // --- 全螢幕與狀態 ---
        async function requestStartGame() {
            try {
                if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            } catch (err) { console.warn("Fullscreen API blocked, continuing in windowed mode."); }
            document.getElementById('fs-helper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('fs-helper').style.display = 'none';
                document.getElementById('game-header').classList.remove('hidden');
                audioManager.init();
            }, 300);
        }


        async function toggleFullscreen() {
            audioManager.playSFX('click');
            try {
                if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
                else await document.exitFullscreen();
            } catch (err) {}
        }


        const wikiImageCache = {}; const fetchingWiki = new Set();
        const noPicSvg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='200' viewBox='0 0 150 200'><rect width='150' height='200' fill='%231e293b'/><text x='75' y='110' font-family='sans-serif' font-size='12' text-anchor='middle' fill='%2364748b'>史料無影像</text></svg>";
        function renderWikiImage(wikiTitle) {
            if (!wikiTitle) return noPicSvg;
            if (wikiImageCache[wikiTitle]) return wikiImageCache[wikiTitle];
            if (!fetchingWiki.has(wikiTitle)) {
                fetchingWiki.add(wikiTitle);
                fetch(`https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=300&origin=*`)
                    .then(res => res.json()).then(data => {
                        const pid = Object.keys(data.query.pages)[0];
                        wikiImageCache[wikiTitle] = data.query.pages[pid]?.thumbnail?.source || noPicSvg;
                        document.querySelectorAll(`img[data-wiki="${wikiTitle}"]`).forEach(img => { img.src = wikiImageCache[wikiTitle]; img.classList.remove('opacity-0'); });
                    }).catch(() => { wikiImageCache[wikiTitle] = noPicSvg; });
            }
            return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='200' viewBox='0 0 150 200'><rect width='150' height='200' fill='%230f172a'/></svg>";
        }


        // --- 113 題完整歷史題庫 ---
        const ALL_PERIODS = [
            { id: 'prehistoric', name: '史前時代' }, { id: 'dutch', name: '荷西時期' }, 
            { id: 'ming', name: '明鄭時期' }, { id: 'qing', name: '清治時期' }, 
            { id: 'japanese', name: '日治時期' }, { id: 'modern', name: '戰後與現代' }
        ];


        const ALL_CARDS = [
            { id: 1, title: '長濱文化', year: -50000, period: 'prehistoric', level: 1, wiki: '長濱文化', desc: '台灣已知最古老的舊石器時代人類遺址，採集漁獵為主。' },
            { id: 2, title: '大坌坑文化', year: -5000, period: 'prehistoric', level: 1, wiki: '大坌坑文化', desc: '新石器時代早期，特徵為粗繩紋陶，已有初級農業。' },
            { id: 3, title: '圓山文化', year: -3000, period: 'prehistoric', level: 2, wiki: '圓山遺址', desc: '新石器時代中期，以貝塚與有段石錛聞名。' },
            { id: 4, title: '卑南文化', year: -1500, period: 'prehistoric', level: 1, wiki: '卑南遺址', desc: '新石器時代晚期，以大量石板棺與精美玉器聞名。' },
            { id: 5, title: '十三行文化', year: 500, period: 'prehistoric', level: 1, wiki: '十三行遺址', desc: '鐵器時代代表，有煉鐵技術與瑪瑙珠。' },
            { id: 6, title: '網形文化', year: -40000, period: 'prehistoric', level: 3, wiki: '網形遺址', desc: '發現於苗栗的舊石器時代晚期文化。' },
            { id: 7, title: '蔦松文化', year: 500, period: 'prehistoric', level: 3, wiki: '蔦松文化', desc: '鐵器時代中南部代表，一般認為是西拉雅族的祖先。' },
            { id: 8, title: '八仙洞遺址', year: -30000, period: 'prehistoric', level: 2, wiki: '八仙洞遺址', desc: '位於台東長濱鄉的海蝕洞群，出土豐富舊石器。' },
            { id: 9, title: '營埔文化', year: -1500, period: 'prehistoric', level: 3, wiki: '營埔遺址', desc: '中部地區新石器時代晚期代表，特徵為黑陶。' },
            { id: 10, title: '沈有容諭退紅毛番', year: 1604, period: 'dutch', level: 3, wiki: '沈有容諭退紅毛番韋麻郎等', desc: '明朝將領沈有容在澎湖勸退荷蘭將領韋麻郎。' },
            { id: 11, title: '荷印公司建熱蘭遮城', year: 1624, period: 'dutch', level: 1, wiki: '熱蘭遮城', desc: '荷蘭人於大員(今安平)建立據點，開啟統治。' },
            { id: 12, title: '西班牙建聖薩爾瓦多城', year: 1626, period: 'dutch', level: 2, wiki: '聖薩爾瓦多城', desc: '西班牙於和平島建城以對抗荷蘭貿易。' },
            { id: 13, title: '濱田彌兵衛事件', year: 1628, period: 'dutch', level: 3, wiki: '濱田彌兵衛事件', desc: '日本朱印船船長與荷蘭公司因貿易利益發生的衝突。' },
            { id: 14, title: '麻豆溪事件', year: 1629, period: 'dutch', level: 3, wiki: '麻豆溪事件', desc: '麻豆社原住民襲殺荷蘭士兵的武裝衝突。' },
            { id: 15, title: '新港文書', year: 1636, period: 'dutch', level: 2, wiki: '新港文書', desc: '傳教士用羅馬拼音書寫西拉雅語，教導原住民識字。' },
            { id: 16, title: '大肚王國全盛期', year: 1640, period: 'dutch', level: 3, wiki: '大肚王國', desc: '台灣中部原住民跨部落的聯盟政權，曾與荷蘭簽訂和約。' },
            { id: 17, title: '郭懷一事件', year: 1652, period: 'dutch', level: 1, wiki: '郭懷一事件', desc: '漢人農民不滿荷蘭高壓統治與重稅而發起的武裝抗暴。' },
            { id: 18, title: '普羅民遮城建立', year: 1653, period: 'dutch', level: 2, wiki: '普羅民遮城', desc: '因應郭懷一事件，荷蘭建立赤崁樓加強防禦。' },
            { id: 19, title: '鄭成功驅逐荷蘭人', year: 1662, period: 'ming', level: 1, wiki: '鄭成功攻台之役', desc: '結束荷蘭統治，開啟漢人政權在台時期。' },
            { id: 20, title: '實施屯田制', year: 1662, period: 'ming', level: 2, wiki: '臺灣明鄭時期', desc: '寓兵於農，分派軍隊至各地開墾。' },
            { id: 21, title: '東寧之變', year: 1662, period: 'ming', level: 3, wiki: '東寧之變', desc: '鄭成功死後，鄭經在權力鬥爭中勝出。' },
            { id: 22, title: '全臺首學落成', year: 1665, period: 'ming', level: 1, wiki: '臺南孔子廟', desc: '陳永華倡議建立台南孔廟，推動儒學。' },
            { id: 23, title: '三藩之亂(鄭經西征)', year: 1674, period: 'ming', level: 3, wiki: '三藩之亂', desc: '鄭經響應耿精忠起事，跨海出兵福建。' },
            { id: 24, title: '施琅攻台(澎湖海戰)', year: 1683, period: 'ming', level: 1, wiki: '澎湖海戰', desc: '擊敗鄭軍，明鄭政權滅亡。' },
            { id: 25, title: '台灣納入清朝版圖', year: 1684, period: 'qing', level: 1, wiki: '臺灣清治時期', desc: '設台灣府，隸屬福建省，頒布渡台禁令。' },
            { id: 26, title: '康熙台灣輿圖', year: 1704, period: 'qing', level: 3, wiki: '康熙臺灣輿圖', desc: '清代最早繪製的單幅台灣全圖。' },
            { id: 27, title: '朱一貴事件', year: 1721, period: 'qing', level: 1, wiki: '朱一貴事件', desc: '清代台灣第一場大型民變。' },
            { id: 28, title: '藍鼎元撰《東征集》', year: 1722, period: 'qing', level: 3, wiki: '藍鼎元', desc: '記載平定朱一貴事件及治台方略的重要文獻。' },
            { id: 29, title: '大甲西社抗清', year: 1731, period: 'qing', level: 3, wiki: '大甲西社抗清事件', desc: '中部平埔族不滿勞役過重爆發的抗清行動。' },
            { id: 30, title: '瑠公圳開工', year: 1740, period: 'qing', level: 2, wiki: '瑠公圳', desc: '郭錫瑠為灌溉台北盆地開鑿的水利工程。' },
            { id: 31, title: '林爽文事件', year: 1786, period: 'qing', level: 1, wiki: '林爽文事件', desc: '天地會發起，清代規模最大的民變。' },
            { id: 32, title: '吳沙入墾蘭陽平原', year: 1796, period: 'qing', level: 2, wiki: '吳沙', desc: '帶領移民大規模進入宜蘭開墾。' },
            { id: 33, title: '海盜蔡牽亂台', year: 1805, period: 'qing', level: 3, wiki: '蔡牽', desc: '知名海盜蔡牽襲擊台灣沿海並自稱鎮海威武王。' },
            { id: 34, title: '噶瑪蘭廳設立', year: 1812, period: 'qing', level: 2, wiki: '噶瑪蘭廳', desc: '將蘭陽平原正式納入清朝版圖。' },
            { id: 35, title: '曹公圳開鑿', year: 1837, period: 'qing', level: 3, wiki: '曹公圳', desc: '高屏地區重要水利工程。' },
            { id: 36, title: '台灣開港通商', year: 1860, period: 'qing', level: 1, wiki: '天津條約', desc: '開放淡水、安平、打狗、雞籠為通商口岸。' },
            { id: 37, title: '戴潮春事件', year: 1862, period: 'qing', level: 2, wiki: '戴潮春事件', desc: '清治時期歷時最久的民變事件。' },

        // --- 狀態與遊戲邏輯 ---
        const ANIMAL_ICONS = ['fa-dog', 'fa-cat', 'fa-dragon', 'fa-frog', 'fa-hippo', 'fa-otter', 'fa-fish', 'fa-spider'];
        
        let state = {
            screen: 'menu', mode: 'normal', isVsAI: false, aiDifficulty: 0.7,
            deck: [], timeline: [], players: [], currentPlayerIndex: 0, 
            selectedCardId: null, previewCard: null, roundNum: 1, winners: [],
            gameSeconds: 0, gameTimerInterval: null
        };


        // 新增：退出邏輯處理
        const handleHomeClick = () => {
            audioManager.playSFX('select');
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        };


        const closeConfirmModal = () => {
            audioManager.playSFX('click');
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
        };


        const confirmQuitGame = () => {
            audioManager.playSFX('click');
            stopTimer();
            state.screen = 'menu';
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
            render();
        };


        const shuffle = (array) => { for(let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; };
        const formatYear = (year) => year < 0 ? `西元前 ${Math.abs(year)} 年` : `西元 ${year} 年`;
        const formatTime = (seconds) => `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;


        const startTimer = () => { clearInterval(state.gameTimerInterval); state.gameSeconds = 0; state.gameTimerInterval = setInterval(() => { state.gameSeconds++; document.getElementById('game-timer').innerText = formatTime(state.gameSeconds); }, 1000); };
        const stopTimer = () => clearInterval(state.gameTimerInterval);


        const showToast = (message, isSuccess, duration = 3000) => {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess ? `<i class="fas fa-check-circle mr-2 text-green-400"></i> ${message}` : `<i class="fas fa-times-circle mr-2 text-red-400"></i> ${message}`;
            toast.className = `fixed top-12 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-2 rounded-full text-white font-bold text-sm transition-all duration-300 shadow-2xl glass-panel border-b-2 ${isSuccess ? 'border-green-500' : 'border-red-500'}`;
            toast.style.opacity = '1'; toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translate(-50%, -10px)'; }, duration);
        };


        const startGame = (playerCount, selectedPeriods, aiDifficulty, questionDifficulty) => {
            audioManager.playSFX('click');
            let filteredCards = ALL_CARDS.filter(c => selectedPeriods.includes(c.period) && c.level <= questionDifficulty);
            if (filteredCards.length < playerCount * 4 + 1) return alert('題庫不足！請增加時代或降低難度。');
            
            state.aiDifficulty = parseFloat(aiDifficulty);
            state.deck = shuffle([...filteredCards]);
            state.timeline = [state.deck.pop()];
            state.players = [];
            
            let icons = shuffle([...ANIMAL_ICONS]);
            
            if (state.isVsAI) {
                state.players.push({ id: 0, name: '玩家 1', icon: icons[0], isAI: false, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: 'BL' });
                state.players.push({ id: 1, name: '玩家 2 (AI)', icon: icons[1], isAI: true, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: 'TR' });
            } else {
                const corners = ['BL', 'BR', 'TL', 'TR']; // 依序分配給 1, 2, 3, 4
                for(let i = 0; i < playerCount; i++) {
                    state.players.push({ id: i, name: `玩家 ${i + 1}`, icon: icons[i], isAI: false, hand: Array.from({length:4}, ()=>state.deck.pop()), corner: corners[i] });
                }
            }
            
            state.currentPlayerIndex = 0; state.roundNum = 1; state.selectedCardId = null; state.previewCard = null;
            document.getElementById('display-round').innerText = `第 1 回合`;
            // 移除原本的模式顯示文字更新
            document.getElementById('game-deck-count').innerText = state.deck.length;
            
            startTimer(); state.screen = 'play'; transitionToTurn();
        };


        const transitionToTurn = () => {
            state.selectedCardId = null; state.previewCard = null;
            if (state.players[state.currentPlayerIndex].isAI) { render(); setTimeout(executeAITurn, 1800); }
            else render();
        };


        const executeAITurn = () => {
            const ai = state.players[state.currentPlayerIndex];
            if (!ai.hand.length) return endTurn();
            const card = ai.hand[Math.floor(Math.random() * ai.hand.length)];
            state.selectedCardId = card.id; render(); 

            setTimeout(() => {
                // 找出所有合法插入位置
                let valid = [];
                for (let i = 0; i <= state.timeline.length; i++) {
                    if (i === 0 && card.year <= state.timeline[0].year) valid.push(i);
                    else if (i === state.timeline.length && card.year >= state.timeline[i-1].year) valid.push(i);
                    else if (i > 0 && i < state.timeline.length && card.year >= state.timeline[i-1].year && card.year <= state.timeline[i].year) valid.push(i);
                }

                let idx;
                if (valid.length === 0) {
                    // 理論上不應發生，但若有重複年份造成無合法位置，找最接近的位置
                    let minDiff = Infinity;
                    idx = 0;
                    for (let i = 0; i <= state.timeline.length; i++) {
                        const ref = i === 0 ? state.timeline[0].year : state.timeline[i-1].year;
                        const diff = Math.abs(card.year - ref);
                        if (diff < minDiff) { minDiff = diff; idx = i; }
                    }
                } else if (Math.random() < state.aiDifficulty) {
                    // 高難度：從合法位置中選
                    idx = valid[Math.floor(Math.random() * valid.length)];
                } else {
                    // 低難度：故意選錯（從非合法位置選，若全都合法就隨機）
                    const allPositions = Array.from({length: state.timeline.length + 1}, (_, i) => i);
                    const wrong = allPositions.filter(i => !valid.includes(i));
                    idx = wrong.length ? wrong[Math.floor(Math.random() * wrong.length)] : valid[Math.floor(Math.random() * valid.length)];
                }
                handleGapClick(idx, true);
            }, 1000);
        };


        const handleGapClick = (insertIndex, isAITurn = false) => {
            const p = state.players[state.currentPlayerIndex];
            if (!isAITurn && p.isAI) return; 
            if (!state.selectedCardId) return showToast("請先點選一張手牌！", false) || audioManager.playSFX('wrong');


            const cIdx = p.hand.findIndex(c => c.id === state.selectedCardId);
            const card = p.hand[cIdx];


            let ok = false;
            if (insertIndex === 0) ok = card.year <= state.timeline[0].year;
            else if (insertIndex === state.timeline.length) ok = card.year >= state.timeline[insertIndex-1].year;
            else ok = card.year >= state.timeline[insertIndex-1].year && card.year <= state.timeline[insertIndex].year;


            if (ok) {
                audioManager.playSFX('correct'); showToast(`🎯 ${p.name} 排列正確！`, true);
                state.timeline.splice(insertIndex, 0, card); p.hand.splice(cIdx, 1);
            } else {
                audioManager.playSFX('wrong'); showToast(`❌ 答錯！【${card.title}】發生於 ${formatYear(card.year)}`, false, 4000);
                state.deck.unshift(card); shuffle(state.deck); p.hand.splice(cIdx, 1);
                if (state.deck.length) p.hand.push(state.deck.pop());
            }
            
            state.selectedCardId = null; state.previewCard = null;
            document.getElementById('game-deck-count').innerText = state.deck.length;
            render();
            if (!p.hand.length) setTimeout(() => endGame(p), 1500); else setTimeout(endTurn, 2000);
        };


        const endTurn = () => {
            state.currentPlayerIndex = (state.currentPlayerIndex + 1) % state.players.length;
            if (state.currentPlayerIndex === 0) document.getElementById('display-round').innerText = `第 ${++state.roundNum} 回合`;
            transitionToTurn();
        };


        const endGame = (winner) => { stopTimer(); audioManager.playSFX('win'); state.winners = [winner]; state.screen = 'gameover'; render(); };


        const openPreview = (cardId, isCurrentPlayer) => {
            audioManager.playSFX('select');
            let found = null;
            state.players.forEach(p => { const c = p.hand.find(x => x.id === cardId); if(c) found = {card: c, isOwner: p.id === state.players[state.currentPlayerIndex].id}; });

                    <div class="bg-slate-900/80 rounded-xl p-4 mb-8 border border-slate-700">
                        <div class="flex justify-between items-center text-sm text-slate-300 mb-2"><span>歷時回合</span><span class="font-bold text-white">${state.roundNum} 回合</span></div>
                        <div class="flex justify-between items-center text-sm text-slate-300 mb-2"><span>耗費時間</span><span class="font-bold text-white">${formatTime(state.gameSeconds)}</span></div>
                        <div class="flex justify-between items-center text-sm text-slate-300"><span>公海史料</span><span class="font-bold text-white">${state.timeline.length} 張</span></div>
                    </div>


                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; document.getElementById('game-header').classList.add('hidden'); render();" class="w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-4 rounded-xl shadow-lg text-lg tracking-widest">返回主選單</button>
                </div>
            </div>
        `;


        const renderGallery = () => {
            const sortedCards = [...ALL_CARDS].sort((a,b) => a.year - b.year);
            return `
            <div class="absolute inset-0 bg-[#090d16] flex flex-col z-50">
                <div class="bg-slate-900 border-b border-slate-700 p-4 flex items-center justify-between shadow-lg z-10 shrink-0">
                    <button onclick="audioManager.playSFX('click'); state.screen='menu'; render();" class="text-slate-400 hover:text-white transition px-4 py-2 bg-slate-800 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>返回</button>
                    <h2 class="text-xl font-bold text-amber-500 serif-font">史料圖鑑 (${ALL_CARDS.length} 題)</h2>
                    <div class="w-20"></div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 sm:p-8">
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6 max-w-7xl mx-auto pb-12">
                        ${sortedCards.map(card => `
                            <div class="bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700 hover:border-amber-500/50 transition-all hover:-translate-y-1 group">
                                <div class="h-32 sm:h-40 bg-slate-900 relative">
                                    <img src="${renderWikiImage(card.wiki)}" data-wiki="${card.wiki}" class="w-full h-full object-cover opacity-0 transition-opacity duration-500" onerror="this.src='${noPicSvg}';"/>
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
                                    <div class="absolute bottom-2 left-2 right-2 flex justify-between items-end">
                                        <span class="text-[10px] font-bold bg-amber-600/80 text-white px-1.5 py-0.5 rounded backdrop-blur-sm shadow">${formatYear(card.year)}</span>
                                        <span class="text-[10px] text-slate-300 bg-black/60 px-1.5 py-0.5 rounded backdrop-blur-sm">${ALL_PERIODS.find(p=>p.id===card.period).name.slice(0,2)}</span>
                                    </div>
                                </div>
                                <div class="p-3">
                                    <h3 class="font-bold text-sm text-slate-100 mb-1 group-hover:text-amber-400 transition-colors line-clamp-1" title="${card.title}">${card.title}</h3>
                                    <p class="text-[10px] text-slate-400 line-clamp-3 leading-relaxed" title="${card.desc}">${card.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
            `;
        };


        const render = () => {
            const app = document.getElementById('app');
            if (state.screen === 'menu') app.innerHTML = renderMenu();
            else if (state.screen === 'setup') app.innerHTML = renderSetup();
            else if (state.screen === 'play') {
                app.innerHTML = renderGameTable();
                const scroll = document.getElementById('timelineContainer');
                if (scroll) scroll.scrollLeft = (scroll.scrollWidth - scroll.clientWidth) / 2;
            }
            else if (state.screen === 'gameover') app.innerHTML = renderGameTable() + renderGameOver();
            else if (state.screen === 'gallery') app.innerHTML = renderGallery();
        };


        window.onload = render;
        window.addEventListener('resize', () => { if (state.screen === 'play' || state.screen === 'gameover') render(); });
    </script>
</body>
</html>
