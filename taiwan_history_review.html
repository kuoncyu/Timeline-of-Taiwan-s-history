<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣史蹟資料複習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(255,255,255,0.07);
    --gold: #c8963e;
    --gold-light: #e8b86d;
    --gold-dim: rgba(200,150,62,0.15);
    --red: #c0392b;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --text-muted: #4a4540;

    --prehistoric: #6b7cad;
    --dutch:       #4a9e8a;
    --ming:        #c05e3c;
    --qing:        #8b7355;
    --japanese:    #b05a7a;
    --modern:      #4a7fb5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(200,150,62,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(74,127,181,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,15,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1rem, 4vw, 3rem);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 0 0.8rem;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .site-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: clamp(1.1rem, 2.5vw, 1.6rem);
    letter-spacing: 0.08em;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    white-space: nowrap;
  }

  .site-title .subtitle {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    font-size: 0.7em;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  .search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 1rem 0.55rem 2.6rem;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: rgba(200,150,62,0.4);
    box-shadow: 0 0 0 3px rgba(200,150,62,0.08);
  }
  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-wrap svg {
    position: absolute; left: 0.75rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .count-badge {
    background: var(--gold-dim);
    border: 1px solid rgba(200,150,62,0.3);
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    font-size: 0.78rem;
    color: var(--gold-light);
    white-space: nowrap;
    font-weight: 500;
  }

  /* ── Period filter tabs ── */
  .filter-bar {
    display: flex;
    gap: 0.4rem;
    padding: 0.7rem 0 0.9rem;
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: wrap;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .period-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.38rem 0.9rem;
    border-radius: 6px;
    border: 1px solid transparent;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.82rem;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .period-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .period-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.06);
  }
  .period-btn.active {
    color: #fff;
    border-color: currentColor;
    opacity: 1;
  }
  .period-btn[data-period="all"]      { --c: var(--gold); }
  .period-btn[data-period="prehistoric"] { --c: var(--prehistoric); }
  .period-btn[data-period="dutch"]    { --c: var(--dutch); }
  .period-btn[data-period="ming"]     { --c: var(--ming); }
  .period-btn[data-period="qing"]     { --c: var(--qing); }
  .period-btn[data-period="japanese"] { --c: var(--japanese); }
  .period-btn[data-period="modern"]   { --c: var(--modern); }
  .period-btn.active { color: var(--c); border-color: var(--c); background: rgba(0,0,0,0.2); }
  .period-btn .dot { background: var(--c); opacity: 0.8; }

  /* ── Level filter ── */
  .level-filter {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.5rem 0 0.8rem;
    flex-wrap: wrap;
  }
  .level-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-right: 0.2rem;
  }
  .level-btn {
    padding: 0.28rem 0.6rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .level-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .level-btn.active {
    background: rgba(200,150,62,0.15);
    border-color: rgba(200,150,62,0.4);
    color: var(--gold-light);
  }

  /* ── Main ── */
  main {
    position: relative; z-index: 1;
    padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 3rem);
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Group by period ── */
  .period-section { margin-bottom: 3rem; }

  .period-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
    padding-bottom: 0.7rem;
    border-bottom: 1px solid var(--border);
  }
  .period-header .period-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .period-header h2 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 0.06em;
  }
  .period-header .period-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ── Card grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.85rem;
  }

  /* ── History card ── */
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .history-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--period-color, var(--gold));
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .history-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    background: var(--surface2);
  }
  .history-card:hover::before { opacity: 1; }

  .card-year {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: 0.35rem;
    font-variant-numeric: tabular-nums;
  }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    font-size: 0.98rem;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.4rem;
  }

  .card-title .wiki-icon {
    flex-shrink: 0;
    margin-top: 0.1em;
    opacity: 0;
    transition: opacity 0.15s;
    color: var(--period-color, var(--gold));
  }
  .history-card:hover .wiki-icon { opacity: 1; }

  .card-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .card-level {
    position: absolute;
    top: 0.7rem; right: 0.8rem;
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    opacity: 0.5;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state p { font-size: 0.95rem; }

  /* ── Highlight match ── */
  .highlight {
    background: rgba(200,150,62,0.25);
    color: var(--gold-light);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* ── Fade-in animation ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .period-section { animation: fadeIn 0.3s ease both; }
  .period-section:nth-child(2) { animation-delay: 0.04s; }
  .period-section:nth-child(3) { animation-delay: 0.08s; }
  .period-section:nth-child(4) { animation-delay: 0.12s; }
  .period-section:nth-child(5) { animation-delay: 0.16s; }
  .period-section:nth-child(6) { animation-delay: 0.20s; }

  /* ── Scroll-to-top ── */
  #top-btn {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    opacity: 0; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #top-btn.visible { opacity: 1; pointer-events: all; }
  #top-btn:hover { color: var(--gold-light); border-color: rgba(200,150,62,0.4); }

  @media (max-width: 600px) {
    .header-top { flex-direction: column; align-items: flex-start; }
    .search-wrap { max-width: 100%; width: 100%; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="site-title">
      📜 台灣史蹟資料
      <span class="subtitle">複習查閱</span>
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="搜尋事件名稱、年代、描述…" autocomplete="off">
    </div>
    <span class="count-badge" id="result-count">共 113 筆</span>
  </div>

  <div class="filter-bar" id="period-filter">
    <button class="period-btn active" data-period="all">
      <span class="dot"></span>全部時代
    </button>
    <button class="period-btn" data-period="prehistoric">
      <span class="dot"></span>史前時代
    </button>
    <button class="period-btn" data-period="dutch">
      <span class="dot"></span>荷西時期
    </button>
    <button class="period-btn" data-period="ming">
      <span class="dot"></span>明鄭時期
    </button>
    <button class="period-btn" data-period="qing">
      <span class="dot"></span>清治時期
    </button>
    <button class="period-btn" data-period="japanese">
      <span class="dot"></span>日治時期
    </button>
    <button class="period-btn" data-period="modern">
      <span class="dot"></span>戰後與現代
    </button>
  </div>

  <div class="level-filter">
    <span class="level-label">難度篩選：</span>
    <button class="level-btn active" data-level="all">全部</button>
    <button class="level-btn" data-level="1">★ 基礎</button>
    <button class="level-btn" data-level="2">★★ 進階</button>
    <button class="level-btn" data-level="3">★★★ 困難</button>
  </div>
</header>

<main id="main-content"></main>

<button id="top-btn" title="回到頂端" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button>

<script>
const ALL_PERIODS = [
  { id: 'prehistoric', name: '史前時代', icon: '🦴', color: 'var(--prehistoric)' },
  { id: 'dutch',       name: '荷西時期', icon: '⚓', color: 'var(--dutch)' },
  { id: 'ming',        name: '明鄭時期', icon: '⚔️', color: 'var(--ming)' },
  { id: 'qing',        name: '清治時期', icon: '🐉', color: 'var(--qing)' },
  { id: 'japanese',    name: '日治時期', icon: '🌸', color: 'var(--japanese)' },
  { id: 'modern',      name: '戰後與現代', icon: '🏙️', color: 'var(--modern)' },
];

const ALL_CARDS = [
  { id: 1,   title: '長濱文化',           year: -50000, period: 'prehistoric', level: 1, wiki: '長濱文化',           desc: '台灣已知最古老的舊石器時代人類遺址，採集漁獵為主。' },
  { id: 2,   title: '大坌坑文化',         year: -5000,  period: 'prehistoric', level: 1, wiki: '大坌坑文化',         desc: '新石器時代早期，特徵為粗繩紋陶，已有初級農業。' },
  { id: 3,   title: '圓山文化',           year: -3000,  period: 'prehistoric', level: 2, wiki: '圓山遺址',           desc: '新石器時代中期，以貝塚與有段石錛聞名。' },
  { id: 4,   title: '卑南文化',           year: -1500,  period: 'prehistoric', level: 1, wiki: '卑南遺址',           desc: '新石器時代晚期，以大量石板棺與精美玉器聞名。' },
  { id: 5,   title: '十三行文化',         year: 500,    period: 'prehistoric', level: 1, wiki: '十三行遺址',         desc: '鐵器時代代表，有煉鐵技術與瑪瑙珠。' },
  { id: 6,   title: '網形文化',           year: -40000, period: 'prehistoric', level: 3, wiki: '網形遺址',           desc: '發現於苗栗的舊石器時代晚期文化。' },
  { id: 7,   title: '蔦松文化',           year: 500,    period: 'prehistoric', level: 3, wiki: '蔦松文化',           desc: '鐵器時代中南部代表，一般認為是西拉雅族的祖先。' },
  { id: 8,   title: '八仙洞遺址',         year: -30000, period: 'prehistoric', level: 2, wiki: '八仙洞遺址',         desc: '位於台東長濱鄉的海蝕洞群，出土豐富舊石器。' },
  { id: 9,   title: '營埔文化',           year: -1500,  period: 'prehistoric', level: 3, wiki: '營埔遺址',           desc: '中部地區新石器時代晚期代表，特徵為黑陶。' },
  { id: 10,  title: '沈有容諭退紅毛番',   year: 1604,   period: 'dutch',       level: 3, wiki: '沈有容諭退紅毛番韋麻郎等', desc: '明朝將領沈有容在澎湖勸退荷蘭將領韋麻郎。' },
  { id: 11,  title: '荷印公司建熱蘭遮城', year: 1624,   period: 'dutch',       level: 1, wiki: '熱蘭遮城',           desc: '荷蘭人於大員（今安平）建立據點，開啟統治。' },
  { id: 12,  title: '西班牙建聖薩爾瓦多城', year: 1626, period: 'dutch',       level: 2, wiki: '聖薩爾瓦多城',       desc: '西班牙於和平島建城以對抗荷蘭貿易。' },
  { id: 13,  title: '濱田彌兵衛事件',     year: 1628,   period: 'dutch',       level: 3, wiki: '濱田彌兵衛事件',     desc: '日本朱印船船長與荷蘭公司因貿易利益發生的衝突。' },
  { id: 14,  title: '麻豆溪事件',         year: 1629,   period: 'dutch',       level: 3, wiki: '麻豆溪事件',         desc: '麻豆社原住民襲殺荷蘭士兵的武裝衝突。' },
  { id: 15,  title: '新港文書',           year: 1636,   period: 'dutch',       level: 2, wiki: '新港文書',           desc: '傳教士用羅馬拼音書寫西拉雅語，教導原住民識字。' },
  { id: 16,  title: '大肚王國全盛期',     year: 1640,   period: 'dutch',       level: 3, wiki: '大肚王國',           desc: '台灣中部原住民跨部落的聯盟政權，曾與荷蘭簽訂和約。' },
  { id: 17,  title: '郭懷一事件',         year: 1652,   period: 'dutch',       level: 1, wiki: '郭懷一事件',         desc: '漢人農民不滿荷蘭高壓統治與重稅而發起的武裝抗暴。' },
  { id: 18,  title: '普羅民遮城建立',     year: 1653,   period: 'dutch',       level: 2, wiki: '普羅民遮城',         desc: '因應郭懷一事件，荷蘭建立赤崁樓加強防禦。' },
  { id: 19,  title: '鄭成功驅逐荷蘭人',   year: 1662,   period: 'ming',        level: 1, wiki: '鄭成功攻台之役',     desc: '結束荷蘭統治，開啟漢人政權在台時期。' },
  { id: 20,  title: '實施屯田制',         year: 1662,   period: 'ming',        level: 2, wiki: '臺灣明鄭時期',       desc: '寓兵於農，分派軍隊至各地開墾。' },
  { id: 21,  title: '東寧之變',           year: 1662,   period: 'ming',        level: 3, wiki: '東寧之變',           desc: '鄭成功死後，鄭經在權力鬥爭中勝出。' },
  { id: 22,  title: '全臺首學落成',       year: 1665,   period: 'ming',        level: 1, wiki: '臺南孔子廟',         desc: '陳永華倡議建立台南孔廟，推動儒學。' },
  { id: 23,  title: '三藩之亂（鄭經西征）', year: 1674,  period: 'ming',       level: 3, wiki: '三藩之亂',           desc: '鄭經響應耿精忠起事，跨海出兵福建。' },
  { id: 24,  title: '施琅攻台（澎湖海戰）', year: 1683,  period: 'ming',       level: 1, wiki: '澎湖海戰',           desc: '擊敗鄭軍，明鄭政權滅亡。' },
  { id: 25,  title: '台灣納入清朝版圖',   year: 1684,   period: 'qing',        level: 1, wiki: '臺灣清治時期',       desc: '設台灣府，隸屬福建省，頒布渡台禁令。' },
  { id: 26,  title: '康熙台灣輿圖',       year: 1704,   period: 'qing',        level: 3, wiki: '康熙臺灣輿圖',       desc: '清代最早繪製的單幅台灣全圖。' },
  { id: 27,  title: '朱一貴事件',         year: 1721,   period: 'qing',        level: 1, wiki: '朱一貴事件',         desc: '清代台灣第一場大型民變。' },
  { id: 28,  title: '藍鼎元撰《東征集》', year: 1722,   period: 'qing',        level: 3, wiki: '藍鼎元',             desc: '記載平定朱一貴事件及治台方略的重要文獻。' },
  { id: 29,  title: '大甲西社抗清',       year: 1731,   period: 'qing',        level: 3, wiki: '大甲西社抗清事件',   desc: '中部平埔族不滿勞役過重爆發的抗清行動。' },

const LEVEL_STARS = { 1: '★', 2: '★★', 3: '★★★' };
const LEVEL_LABELS = { 1: '基礎', 2: '進階', 3: '困難' };

let activePeriod = 'all';
let activeLevel = 'all';
let searchQuery = '';

function formatYear(y) {
  return y < 0 ? `西元前 ${Math.abs(y).toLocaleString()} 年` : `西元 ${y} 年`;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, q) {
  if (!q) return text;
  try {
    const re = new RegExp(`(${escapeRegex(q)})`, 'gi');
    return text.replace(re, '<span class="highlight">$1</span>');
  } catch { return text; }
}

function getFiltered() {
  let cards = ALL_CARDS;
  if (activePeriod !== 'all') cards = cards.filter(c => c.period === activePeriod);
  if (activeLevel !== 'all') cards = cards.filter(c => c.level === Number(activeLevel));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    cards = cards.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.desc.toLowerCase().includes(q) ||
      String(c.year).includes(q) ||
      formatYear(c.year).includes(q)
    );
  }
  return cards;
}

function render() {
  const main = document.getElementById('main-content');
  const filtered = getFiltered();
  document.getElementById('result-count').textContent = `共 ${filtered.length} 筆`;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>找不到符合的史蹟資料，請嘗試其他關鍵字。</p></div>`;
    return;
  }

  // Group by period
  const grouped = {};
  ALL_PERIODS.forEach(p => { grouped[p.id] = []; });
  filtered.forEach(c => { if (grouped[c.period]) grouped[c.period].push(c); });

  let html = '';
  ALL_PERIODS.forEach(period => {
    const cards = grouped[period.id];
    if (!cards.length) return;

    html += `<section class="period-section">
      <div class="period-header" style="--period-color:${period.color}">
        <div class="period-icon" style="background:${period.color}22; color:${period.color}">${period.icon}</div>
        <h2 style="color:${period.color}">${period.name}</h2>
        <span class="period-count">${cards.length} 筆</span>
      </div>
      <div class="card-grid">`;

    cards.forEach(card => {
      const wikiUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(card.wiki)}`;
      const hl = q => highlight(q, searchQuery);
      html += `
        <a class="history-card" href="${wikiUrl}" target="_blank" rel="noopener"
           style="--period-color:${period.color}" title="前往維基百科：${card.wiki}">
          <div class="card-level">${LEVEL_STARS[card.level]} ${LEVEL_LABELS[card.level]}</div>
          <div class="card-year">${hl(formatYear(card.year))}</div>
          <div class="card-title">
            ${hl(card.title)}
            <svg class="wiki-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </div>
          <div class="card-desc">${hl(card.desc)}</div>
        </a>`;
    });

    html += `</div></section>`;
  });

  main.innerHTML = html;
}

// Period filter
document.getElementById('period-filter').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePeriod = btn.dataset.period;
  render();
});

// Level filter
document.querySelector('.level-filter').addEventListener('click', e => {
  const btn = e.target.closest('.level-btn');
  if (!btn) return;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeLevel = btn.dataset.level;
  render();
});

// Search
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    render();
  }, 180);
});

// Scroll-to-top btn
const topBtn = document.getElementById('top-btn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });

render();
</script>
</body>
</html>
